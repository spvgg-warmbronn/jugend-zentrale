<style>
:root{--nacht:#0A1F0E;--gd:#0E3B17;--gruen:#1B5E20;--rasen:#3E9142;--hell:#E8F2E9;--papier:#F4F6F4;--tinte:#161D17;--grau:#59645B;--linie:#D9E1DA;--signal:#C8E63C;--rot:#C0392B;--amber:#D99A2B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--papier);color:var(--tinte);font-size:15px;line-height:1.55;min-height:100vh}
h1,h2,h3,.disp{font-family:'Archivo',sans-serif;font-stretch:114%;font-weight:900;text-transform:uppercase;line-height:1.05}
button{font:inherit;cursor:pointer}
input,select,textarea{width:100%;border:1.5px solid var(--linie);border-radius:12px;padding:12px 13px;font:inherit;background:#fff;color:var(--tinte)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--rasen);box-shadow:0 0 0 3px rgba(62,145,66,.15)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grau);margin:13px 0 5px}

/* ===== Screens & Cinematik ===== */
#app{min-height:100vh;position:relative}
.screen{min-height:100vh;animation:sIn .5s cubic-bezier(.22,.9,.3,1) both;position:relative}
@keyframes sIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.raus{animation:sOut .28s ease both}
@keyframes sOut{to{opacity:0;transform:translateY(-14px)}}
.screen.fest{animation:sFest .4s ease both}
@keyframes sFest{from{opacity:0}to{opacity:1}}
.st{animation:sIn .55s cubic-bezier(.22,.9,.3,1) both}
.st1{animation-delay:.05s}.st2{animation-delay:.12s}.st3{animation-delay:.2s}.st4{animation-delay:.28s}.st5{animation-delay:.36s}
.wasser{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);width:min(78vw,430px);opacity:.05;pointer-events:none;z-index:0;filter:grayscale(35%)}
.inhalt>*{position:relative;z-index:1}
.inhalt>.wasser{position:fixed;z-index:0}

/* ===== Hero ===== */
.held{min-height:100vh;background:var(--nacht);color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
.held-bg{position:absolute;inset:-40%;background-image:linear-gradient(rgba(200,230,60,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(200,230,60,.05) 1px,transparent 1px);background-size:64px 64px;animation:drift 34s linear infinite;pointer-events:none}
@keyframes drift{to{transform:translate(64px,64px)}}
.held-halo{position:absolute;left:50%;top:30%;width:130vw;max-width:820px;aspect-ratio:1;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(62,145,66,.4),transparent 62%);pointer-events:none}
.held-kreis{position:absolute;left:50%;top:30%;width:78vw;max-width:460px;aspect-ratio:1;transform:translate(-50%,-50%);border:1.5px solid rgba(200,230,60,.22);border-radius:50%;animation:atmen 5.5s ease-in-out infinite;pointer-events:none}
@keyframes atmen{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.55}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}
.held-in{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;max-width:640px;margin:0 auto;width:100%;padding:52px 26px 30px;text-align:center}
.wappen{width:118px;margin:0 auto 20px;filter:drop-shadow(0 14px 34px rgba(0,0,0,.5));border-radius:10px;animation:schweben 6s ease-in-out infinite}
@keyframes schweben{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.eyebrow{font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--signal);display:flex;align-items:center;justify-content:center;gap:10px}
.eyebrow:before,.eyebrow:after{content:"";width:26px;height:2px;background:var(--signal)}
.held h1{font-size:clamp(36px,10.5vw,58px);margin-top:10px}
.held h1 em{font-style:normal;color:var(--signal)}
.held p.sub{margin-top:12px;color:rgba(255,255,255,.72);font-size:15px}
.rollen{margin-top:30px;display:grid;gap:12px;text-align:left}
.rolle-k{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(4px);border-radius:16px;padding:16px 18px;color:#fff;transition:transform .18s ease,background .18s ease}
.rolle-k:active{transform:scale(.975)}
.rolle-k .ic{width:44px;height:44px;border-radius:12px;background:rgba(200,230,60,.14);display:flex;align-items:center;justify-content:center;color:var(--signal);flex-shrink:0}
.rolle-k b{font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:.03em;display:block}
.rolle-k small{color:rgba(255,255,255,.62);font-size:12.5px}
.held .fuss{position:relative;z-index:2;text-align:center;padding:0 26px 30px;font-size:11.5px;color:rgba(255,255,255,.42)}

/* ===== App-Rahmen ===== */
.kopf{background:linear-gradient(160deg,var(--nacht),#12341A);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:40;box-shadow:0 6px 24px rgba(10,31,14,.28)}
.kopf-in{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.kopf img{width:38px;border-radius:6px}
.kopf .tt{flex:1;min-width:0}
.kopf .ey{font-family:'Archivo',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--signal)}
.kopf h1{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:600;flex-shrink:0}
.inhalt{max-width:640px;margin:0 auto;padding:16px 16px 104px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,31,14,.97);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tabbar-in{max-width:640px;margin:0 auto;display:flex}
.tab{flex:1;background:none;border:none;color:rgba(255,255,255,.48);padding:10px 2px 9px;font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.tab svg{width:21px;height:21px;stroke-width:2}
.tab.aktiv{color:var(--signal)}
.tab .pille{width:18px;height:3px;border-radius:2px;background:transparent;transition:background .2s}
.tab.aktiv .pille{background:var(--signal)}

/* ===== Bausteine ===== */
.karte{background:#fff;border:1px solid var(--linie);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(10,31,14,.04)}
.karte.dunkel{background:linear-gradient(155deg,var(--gd),var(--nacht));border:none;color:#fff;box-shadow:0 10px 30px rgba(10,31,14,.3)}
.sec{font-family:'Archivo',sans-serif;font-weight:900;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--rasen);display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.sec:after{content:"";flex:1;height:1px;background:var(--linie)}
.meta{display:inline-block;background:var(--hell);color:var(--gruen);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:5px;padding:3px 8px;vertical-align:middle}
.meta.sig{background:var(--signal);color:var(--gd)}
.meta.warn{background:#FDF3E3;color:var(--amber)}
.meta.rot{background:#FBE9E7;color:var(--rot)}
.btn{background:var(--gruen);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .15s ease,filter .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45}
.btn.voll{width:100%}
.btn.hell{background:var(--hell);color:var(--gruen)}
.btn.sig{background:var(--signal);color:var(--gd)}
.btn.geist{background:none;border:1.5px solid var(--linie);color:var(--grau)}
.btn.gefahr{background:none;border:1.5px solid #F0C7C0;color:var(--rot)}
.zeile{display:flex;gap:10px}.zeile>*{flex:1}
.hinweis{background:var(--hell);border-left:4px solid var(--rasen);border-radius:0 12px 12px 0;padding:12px 14px;font-size:13px;margin:12px 0}
.leer{text-align:center;padding:36px 16px;color:var(--grau)}
.leer .disp{font-size:16px;color:var(--gd);margin-bottom:6px}
.kachel{display:flex;align-items:center;gap:13px;width:100%;background:#fff;border:1px solid var(--linie);border-radius:16px;padding:15px 16px;text-align:left;margin-bottom:10px;box-shadow:0 2px 10px rgba(10,31,14,.04);transition:transform .15s}
.kachel:active{transform:scale(.98)}
.kachel .ic{width:42px;height:42px;border-radius:11px;background:var(--hell);color:var(--gruen);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kachel b{font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:var(--gd);display:block;text-transform:uppercase;letter-spacing:.02em}
.kachel small{color:var(--grau);font-size:12.5px;display:block;margin-top:1px}
.stat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.stat{background:#fff;border:1px solid var(--linie);border-radius:14px;padding:13px 6px;text-align:center}
.stat b{display:block;font-family:'Archivo',sans-serif;font-weight:900;font-size:25px;color:var(--gd);line-height:1.1}
.stat span{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--grau)}
.balken-w{background:var(--hell);border-radius:6px;height:10px;overflow:hidden}
.balken{height:100%;background:linear-gradient(90deg,var(--rasen),var(--gruen));border-radius:6px;transition:width .7s cubic-bezier(.22,.9,.3,1)}
.lz{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--linie)}
.lz:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;border:1.5px solid var(--linie);background:#fff;border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;margin:0 6px 6px 0;color:var(--grau);transition:all .15s}
.chip.an{background:var(--gd);border-color:var(--gd);color:#fff}
.seg{display:flex;background:var(--hell);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.seg button{flex:1;min-width:70px;border:none;background:none;border-radius:9px;padding:9px 4px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--grau);transition:all .2s}
.seg button.an{background:#fff;color:var(--gd);box-shadow:0 2px 8px rgba(10,31,14,.12)}
.rsvp-btns{display:flex;gap:9px}
.rsvp{flex:1;border:1.5px solid var(--linie);background:#fff;border-radius:12px;padding:12px;font-weight:800;font-size:14px;color:var(--grau);transition:all .18s}
.rsvp.ja.an{background:var(--rasen);border-color:var(--rasen);color:#fff;box-shadow:0 4px 14px rgba(62,145,66,.35)}
.rsvp.nein.an{background:var(--rot);border-color:var(--rot);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.3)}
.anw{width:40px;height:40px;border-radius:50%;border:2px solid var(--linie);background:#fff;font-weight:800;color:var(--grau);flex-shrink:0;transition:all .15s}
.anw.da{background:var(--rasen);border-color:var(--rasen);color:#fff}
.anw.fehlt{background:#FBE9E7;border-color:var(--rot);color:var(--rot)}
.typ-training{background:var(--hell);color:var(--gruen)}
.typ-spiel{background:var(--signal);color:var(--gd)}
.typ-turnier{background:#FDF3E3;color:var(--amber)}
.typ-event{background:#EDE7F6;color:#5E35B1}
.jbadge{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:22px;border-radius:6px;padding:0 6px;font-family:'Archivo',sans-serif;font-weight:900;font-size:11px;color:#fff;letter-spacing:.04em}
.monat{font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gd);margin:20px 0 8px;display:flex;align-items:center;gap:10px}
.monat:after{content:"";flex:1;height:1px;background:var(--linie)}
.kal-kopf{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kal-kopf b{font-family:'Archivo',sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:var(--gd)}
.kal-nav{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--linie);background:#fff;font-weight:800;font-size:17px;color:var(--gruen)}
.kal-wt{display:grid;grid-template-columns:repeat(7,1fr);font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--grau);text-transform:uppercase;text-align:center;margin-bottom:5px}
.kal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.kal-tag{aspect-ratio:1;border:1px solid var(--linie);border-radius:9px;background:#fff;font-size:12.5px;font-weight:600;color:var(--tinte);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;gap:2px}
.kal-tag.leer{border:none;background:none}
.kal-tag.ferien{background:#FDF6E8;border-color:#F0DFC0}
.kal-tag.heute{border:2px solid var(--rasen)}
.kal-tag.gewaehlt{background:var(--gd);color:#fff;border-color:var(--gd)}
.kal-punkte{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;padding:0 2px}
.kal-punkt{width:6px;height:6px;border-radius:50%}
.skala{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.skala .sk{width:29px;height:34px;border:1.5px solid var(--linie);border-radius:8px;background:#fff;font-weight:800;font-size:12.5px;color:var(--grau);padding:0}
.skala .sk.an{background:var(--gd);border-color:var(--gd);color:#fff}
.ferienchip{display:inline-block;background:#FDF3E3;border:1px dashed var(--amber);color:var(--amber);border-radius:8px;padding:4px 9px;font-size:11.5px;font-weight:700;margin:0 6px 6px 0}
.pitch{position:relative;background:repeating-linear-gradient(0deg,#2E7D32 0 44px,#2a7530 44px 88px);border-radius:16px;aspect-ratio:3/4;overflow:hidden;border:3px solid var(--gd);box-shadow:inset 0 0 60px rgba(0,0,0,.25)}
.pitch:before{content:"";position:absolute;left:8%;right:8%;top:50%;height:2px;background:rgba(255,255,255,.4)}
.pitch:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:27%;aspect-ratio:1;border:2px solid rgba(255,255,255,.4);border-radius:50%}
.pitch .sr{position:absolute;left:24%;width:52%;height:13%;border:2px solid rgba(255,255,255,.4)}
.pos{position:absolute;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:0}
.pos .kreis{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.13);border:2px dashed rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:11px;color:#fff;transition:all .2s}
.pos.belegt .kreis{background:var(--signal);border:2px solid #fff;color:var(--gd);font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.35)}
.pos .pname{font-size:10px;font-weight:700;color:#fff;background:rgba(10,31,14,.6);border-radius:5px;padding:1px 7px;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-grid{display:grid;grid-template-columns:1fr repeat(3,46px);gap:7px;align-items:center;font-size:13px}
.note-in{width:100%;text-align:center;padding:9px 2px;border:1.5px solid var(--linie);border-radius:9px;font-weight:800}
.phase{position:relative;padding:0 0 24px 30px}
.phase:before{content:"";position:absolute;left:8px;top:8px;bottom:0;width:2px;background:var(--linie)}
.phase:last-child:before{display:none}
.phase .pkt{position:absolute;left:0;top:4px;width:18px;height:18px;border-radius:50%;background:var(--papier);border:3px solid var(--rasen);transition:all .2s}
.phase.offen .pkt{background:var(--signal);border-color:var(--gd)}
.modal-bg{position:fixed;inset:0;background:rgba(10,31,14,.66);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:mb .25s ease}
@keyframes mb{from{opacity:0}}
.modal{background:var(--papier);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 16px calc(22px + env(safe-area-inset-bottom));animation:mh .35s cubic-bezier(.22,.9,.3,1)}
@keyframes mh{from{transform:translateY(60px);opacity:.4}}
.griff{width:42px;height:4px;background:var(--linie);border-radius:2px;margin:0 auto 14px}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:dreh .8s linear infinite;display:inline-block;vertical-align:middle}
.spinner.gruen{border-color:rgba(27,94,32,.25);border-top-color:var(--gruen)}
@keyframes dreh{to{transform:rotate(360deg)}}
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--nacht);color:#fff;border-radius:12px;padding:12px 18px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:all .3s;max-width:88vw;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.35)}
#toast.zeig{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

/* Saisonlogik: Saison startet am 1. August des Startjahres.
   Fuer Saison Y gilt (Beispiel Y=2026):
   A: Jahrgang Y-18/Y-17 · B: Y-16/Y-15 · C: Y-14/Y-13 · D: Y-12/Y-11
   E: Y-10/Y-9 · F: Y-8/Y-7 · Bambini (G): Y-6 und juenger */
var KONF = {saison:2025, ferien:[], pins:{}, inventar:{klapptore:11,kleinfeldtore:10,grossfeldtore_fest:2,mobile_tore:4,schiris:2}};
function jugendAusJahrgang(jahrgang, startjahr){
  var d = startjahr - jahrgang;

async function api(pfad,opts){
  opts=opts||{};
  var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
  if(opts.prefer)h['Prefer']=opts.prefer;
  var r=await fetch(SUPA+'/rest/v1/'+pfad,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  if(!r.ok){var t='';try{t=await r.text()}catch(e){}throw new Error('API '+r.status+': '+t.slice(0,200))}

  var txt=await r.text();
  return txt?JSON.parse(txt):null;
}

function sKindAnlegen(){
  $('#app').innerHTML=
  '<div class="screen"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">Elternbereich</div><h1>Spieler anlegen</h1></div><button class="kbtn" id="bZur">Zurück</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div class="karte st st1">'+
    '<label>Vorname</label><input id="fV" autocomplete="off">'+
    '<label>Nachname</label><input id="fN" autocomplete="off">'+
    '<label>Jahrgang (Geburtsjahr)</label><select id="fG"><option value="">Bitte wählen …</option>'+jahrgangOptionen()+'</select>'+
    '<div id="jugendVorschlag"></div>'+
    '<label>Familien-PIN (mind. 4 Zeichen)</label><input id="fP1" type="password" inputmode="numeric" placeholder="z. B. 4-stellige Zahl">'+
    '<label>PIN wiederholen</label><input id="fP2" type="password" inputmode="numeric">'+
    '<div class="hinweis">Die PIN gehört eurer Familie – mit ihr öffnet ihr euer Kind auch auf einem zweiten Handy. Bitte merken!</div>'+
    '<button class="btn voll" id="bSpeichern">Spieler anlegen</button>'+
  '</div></main></div>';
  $('#bZur').onclick=function(){zeige(sElternWahl)};
  var gewaehlteJugend=null;
  $('#fG').onchange=function(){
    var g=this.value;if(!g){$('#jugendVorschlag').innerHTML='';return}
    var jahrgang=parseInt(g.slice(0,4),10);
    var natur=jugendAusJahrgang(jahrgang,KONF.saison);
    gewaehlteJugend=natur;
    var idx=jugendIndex(natur);
    var optionen=[natur];
    for(var i=idx+1;i<JUGENDEN.length&&i<=idx+2;i++)optionen.push(JUGENDEN[i].kz);
    $('#jugendVorschlag').innerHTML='<label>Jugend (Jahrgang '+jahrgang+')</label>'+
      '<div id="jWahl">'+optionen.map(function(kz,i){
        var j=jInfo(kz);
        return '<button class="chip'+(i===0?' an':'')+'" data-kz="'+kz+'">'+jBadge(kz)+' '+esc(j.name)+(i===0?' · passend':' · hochgezogen')+'</button>';
      }).join('')+'</div>'+
      '<div style="font-size:12px;color:var(--grau)">Standard ist die zum Jahrgang passende Jugend. „Hochgezogen“ nur wählen, wenn es mit dem Trainer so besprochen ist.</div>';
    $$('#jWahl .chip').forEach(function(c){c.onclick=function(){$$('#jWahl .chip').forEach(function(x){x.classList.remove('an')});c.classList.add('an');gewaehlteJugend=c.getAttribute('data-kz')}});
  };
  $('#bSpeichern').onclick=async function(){
    var v=$('#fV').value.trim(),n=$('#fN').value.trim(),g=$('#fG').value,p1=$('#fP1').value,p2=$('#fP2').value;
    if(!v||!n){toast('Bitte Vor- und Nachname eintragen.');return}
    if(!g){toast('Bitte Jahrgang wählen.');return}
    if(p1.length<4){toast('Die PIN braucht mindestens 4 Zeichen.');return}
    if(p1!==p2){toast('Die PINs stimmen nicht überein.');return}
    var jahrgang=parseInt(g.slice(0,4),10);
    var jugend=gewaehlteJugend||jugendAusJahrgang(jahrgang,KONF.saison);
    this.disabled=true;this.innerHTML='<span class="spinner"></span> Wird angelegt …';
    try{
      var vorhandene=await api('kinder?select=id&vorname=ilike.'+encodeURIComponent(v)+'&nachname=ilike.'+encodeURIComponent(n));
      if(vorhandene.length){toast(v+' '+n+' ist schon angelegt – bitte oben die Jugend wählen.');this.disabled=false;this.textContent='Spieler anlegen';return}
      var hash=await sha256(p1);
      var rows=await api('kinder',{method:'POST',prefer:'return=representation',body:{vorname:v,nachname:n,jahrgang:jahrgang,jugend:jugend,pin_hash:hash}});
      var kind=rows[0];
      lsSet('jz_rolle','eltern');lsSet('jz_kind',kind.id);lsSet('jz_kindname',v+' '+n);lsSet('jz_kindjugend',jugend);
      S.rolle='eltern';S.kindId=kind.id;S.kindName=v+' '+n;S.kindJugend=jugend;
      toast('Willkommen in der '+jInfo(jugend).name+', '+v+'! ⚽');
      zeige(sEltern);
    }catch(e){console.error(e);toast('Speichern fehlgeschlagen – bitte Internet prüfen und erneut versuchen.');this.disabled=false;this.textContent='Spieler anlegen'}
  };
}

function sKindOeffnen(vorwahl){
  $('#app').innerHTML=
  '<div class="screen"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">Elternbereich</div><h1>Spieler öffnen</h1></div><button class="kbtn" id="bZur">Zurück</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div id="liste"><div class="leer"><span class="spinner gruen"></span></div></div></main></div>';
  $('#bZur').onclick=function(){zeige(sElternWahl)};
  S.koJugend=vorwahl||S.koJugend||null;
  (async function(){
    try{
      var kinder=await api('kinder?select=id,vorname,nachname,jugend&order=vorname');
      function render(){
        var html='';
        /* Schritt 1: Jugend waehlen */
        html+='<div class="hinweis st st1">Tippt euren Spieler an und \u00f6ffnet ihn mit eurer Familien-PIN.</div>';
        html+='<label>Jugend</label><select id="koJ"><option value="">Bitte w\u00e4hlen \u2026</option>'+JUGENDEN.map(function(j){var n=kinder.filter(function(k){return k.jugend===j.kz}).length;return '<option value="'+j.kz+'"'+(S.koJugend===j.kz?' selected':'')+'>'+esc(j.name)+' ('+n+')</option>'}).join('')+'</select>';
        /* Schritt 2: Kinder der gewaehlten Jugend */
        if(S.koJugend){
          var gr=kinder.filter(function(k){return k.jugend===S.koJugend});
          html+='<div class="sec">'+esc(jInfo(S.koJugend).name)+' \u00b7 '+gr.length+'</div>';
          if(!gr.length)html+='<div class="karte" style="color:var(--grau);font-size:13px">In dieser Jugend ist noch kein Spieler angelegt. Legt euren Spieler unten neu an.</div>';
          gr.forEach(function(k){
            html+='<button class="kachel koKind" data-id="'+k.id+'" data-name="'+esc(k.vorname+' '+k.nachname)+'" data-jugend="'+esc(k.jugend||'')+'"><span class="ic">'+IC.team+'</span><span style="flex:1"><b>'+esc(k.vorname)+' '+esc(k.nachname.charAt(0))+'.</b><small>Mit Familien-PIN \u00f6ffnen</small></span>'+jBadge(k.jugend)+'</button>';
          });
        }
        /* Kinder ohne gueltige Jugend (nur zeigen, wenn keine Jugend gewaehlt) */
        var ohne=kinder.filter(function(k){return !k.jugend||jugendIndex(k.jugend)<0});
        if(!S.koJugend&&ohne.length){
          html+='<div class="sec">Ohne Jugend</div>'+ohne.map(function(k){return '<button class="kachel koKind" data-id="'+k.id+'" data-name="'+esc(k.vorname+' '+k.nachname)+'" data-jugend=""><span class="ic">'+IC.team+'</span><span style="flex:1"><b>'+esc(k.vorname)+' '+esc(k.nachname.charAt(0))+'.</b><small>Mit Familien-PIN \u00f6ffnen</small></span></button>'}).join('');
        }
        /* Schritt 3: ganz unten neu anlegen */
        html+='<div class="sec">Nicht dabei?</div><button class="btn voll" id="koNeu">\uff0b Spieler neu anlegen</button>';
        $('#liste').innerHTML=html;
        $('#koJ').onchange=function(){S.koJugend=this.value||null;render()};
        $('#koNeu').onclick=function(){zeige(sKindAnlegen)};
        $$('#liste .koKind').forEach(function(b){b.onclick=function(){pinAbfrage(b.getAttribute('data-id'),b.getAttribute('data-name'),b.getAttribute('data-jugend'))}});
      }
      render();
    }catch(e){$('#liste').innerHTML='<div class="karte leer">Liste konnte nicht geladen werden – bitte Internet prüfen.</div>'}
  })();
  function pinAbfrage(id,name,jugend){
    var m=document.createElement('div');m.className='modal-bg';
    m.innerHTML='<div class="modal"><div class="griff"></div><div class="disp" style="font-size:18px;color:var(--gd)">Familien-PIN für '+esc(name.split(' ')[0])+'</div>'+
      '<input id="pinEin" type="password" inputmode="numeric" style="margin-top:14px;font-size:22px;text-align:center;letter-spacing:.35em;font-weight:800" placeholder="••••">'+
      '<div id="pinFehler" style="color:var(--rot);font-size:13px;margin-top:8px;display:none">PIN falsch – bitte erneut versuchen.</div>'+
      '<button class="btn voll" id="pinOk" style="margin-top:12px">Öffnen</button>'+
      '<button class="btn geist voll" id="pinAbbr" style="margin-top:8px">Abbrechen</button></div>';
    document.body.appendChild(m);
    $('#pinEin').focus();
    $('#pinAbbr').onclick=function(){m.remove()};
    m.onclick=function(e){if(e.target===m)m.remove()};
    $('#pinOk').onclick=async function(){
      var p=$('#pinEin').value;if(p.length<4){$('#pinFehler').style.display='block';return}
      this.disabled=true;
      try{
        var hash=await sha256(p);
        var rows=await api('kinder?select=id,vorname,nachname,jugend&id=eq.'+id+'&pin_hash=eq.'+hash);
        if(!rows.length){$('#pinFehler').style.display='block';this.disabled=false;return}
        lsSet('jz_rolle','eltern');lsSet('jz_kind',id);lsSet('jz_kindname',name);lsSet('jz_kindjugend',rows[0].jugend||'');
        S.rolle='eltern';S.kindId=id;S.kindName=name;S.kindJugend=rows[0].jugend||'';
        m.remove();zeige(sEltern);
      }catch(e){toast('Verbindung fehlgeschlagen.');this.disabled=false}
    };
  }
}

/* ================= ELTERN: HOME ================= */
async function sEltern(){
  $('#app').innerHTML=
  '<div class="screen"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">'+esc(jInfo(S.kindJugend).name)+' \u00b7 Saison '+saisonName(KONF.saison)+'</div><h1>'+esc(S.kindName.split(' ')[0])+'</h1></div><button class="kbtn" id="bAb">Wechseln</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div id="ehalt"><div class="leer"><span class="spinner gruen"></span></div></div></main></div>';
  $('#bAb').onclick=function(){abmelden()};
  var h=$('#ehalt');
  try{
    var res=await Promise.all([
      api('termine?select=*&order=datum.asc'),
      api('zusagen?select=termin_id,status&kind_id=eq.'+S.kindId),
      api('anwesenheit?select=termin_id,da&kind_id=eq.'+S.kindId),
      api('ziele?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=reihenfolge'),
      api('turniere?select=*&freigegeben=eq.true&order=datum.asc.nullslast'),
      api('turnier_helferbedarf?select=*'),
      api('turnier_helfer?select=*'),
      api('turnier_dateien?select=*'),
      api('turnier_kategorien?select=turnier_id,jugend,name'),
      api('helfer_anfragen?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&erledigt=eq.false&order=created_at.desc'),
      api('kinder?select=elternsprecher&id=eq.'+S.kindId),
      api('mitteilungen?select=*,mitteilung_antworten(autor,text)&ziel=eq.eltern_jugend&ziel_jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=created_at.desc&limit=20')
    ]);
    var termine=termineFuer(res[0],S.kindJugend);
    var zus={};res[1].forEach(function(z){zus[z.termin_id]=z.status});
    var anwRows=res[2];
    var ziele=res[3];
    var tFrei=res[4],tBedarfAll=res[5],tHelferAll=res[6],tDateiAll=res[7],tKatAll=res[8];
    var kz=S.kindJugend;
    /* Turniere, die diese Jugend betreffen */
    function turnierBetrifft(t){
      if(tKatAll.some(function(k){return k.turnier_id===t.id&&k.jugend===kz}))return true;
      if(tBedarfAll.some(function(b){return b.turnier_id===t.id&&(b.jugend===kz||!b.jugend)}))return true;
      if(tDateiAll.some(function(d){return d.turnier_id===t.id&&(d.jugend===kz||!d.jugend)}))return true;
      return false;
    }
    var meineTurniere=tFrei.filter(turnierBetrifft);
    var helferAnfr=res[9]||[];
    var istSprecher=(res[10]&&res[10][0]&&res[10][0].elternsprecher)||false;
    var elternMit=res[11]||[];
    S.kalJM=S.kalJM||jmVon(heute());S.elTag=S.elTag||heute();
    function terminKarte(t){
      var fer=t.typ!=='event'?inFerien(t.datum):null;
      var st=zus[t.id];
      return '<div class="karte"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="meta typ-'+t.typ+'">'+typName(t.typ)+'</span><span class="meta">'+fmtDat(t.datum)+(t.uhrzeit?' \u00b7 '+esc(t.uhrzeit):'')+'</span>'+(t.typ==='event'&&!t.jugend?'<span class="meta sig">Verein</span>':'')+(fer?'<span class="ferienchip">'+esc(fer)+'</span>':'')+'</div>'+
      '<div class="disp" style="font-size:16.5px;color:var(--gd);margin-top:7px">'+esc(terminTitel(t))+'</div>'+
      (t.ort?'<div style="font-size:12.5px;color:var(--grau);margin-top:2px">\ud83d\udccd '+esc(t.ort)+'</div>':'')+
      (t.datum>=heute()?'<div class="rsvp-btns" style="margin-top:11px"><button class="rsvp ja'+(st==='ja'?' an':'')+'" data-tid="'+t.id+'" data-st="ja">\u2713 Zusagen</button><button class="rsvp nein'+(st==='nein'?' an':'')+'" data-tid="'+t.id+'" data-st="nein">\u2717 Absagen</button></div>':'')+'</div>';
    }
    function render(){
      var ansicht=S.elAnsicht||'liste';
      var kommend=termine.filter(function(t){return t.datum>=heute()});
      var vergangen=termine.filter(function(t){return t.datum<heute()});
      var trIds={};termine.forEach(function(t){if(t.typ==='training')trIds[t.id]=true});
      var trVergangen=vergangen.filter(function(t){return t.typ==='training'}).length;
      var da=anwRows.filter(function(a){return a.da&&trIds[a.termin_id]}).length;
      var zugesagt=res[1].filter(function(z){return z.status==='ja'}).length;

      var html=fbBanner();
      /* Offene Helfer-Anfragen ganz oben */
      if(helferAnfr.length){
        html+='<div class="karte st st1" style="border-left:4px solid var(--amber)"><span class="meta warn">Helfer gesucht</span>';
        helferAnfr.forEach(function(a){
          var uebernommen=!!a.uebernommen_von;
          html+='<div class="lz"><span style="font-size:14px"><b>'+esc(a.typ)+'</b>'+(uebernommen?'<br><span style="font-size:12px;color:var(--rasen)">\u00fcbernommen von '+esc(a.uebernommen_von)+'</span>':'')+'</span>'+
          (uebernommen?(a.uebernommen_kind===S.kindId?'<button class="btn geist hfAb" data-id="'+a.id+'" style="padding:7px 11px;font-size:12px">doch nicht</button>':'<span class="meta sig">vergeben</span>'):'<button class="btn sig hfUeb" data-id="'+a.id+'" style="padding:7px 11px;font-size:12px">Ich mach\'s</button>')+'</div>';
        });
        html+='</div>';
      }
      /* Nachrichten vom Elternsprecher */
      if(elternMit.length){
        html+='<div class="sec st st1">Vom Elternsprecher</div>';
        elternMit.forEach(function(mmm){
          html+='<div class="karte st st1" style="padding:12px 16px"><b style="font-size:14px">'+esc(mmm.titel)+'</b>'+(mmm.text?'<p style="font-size:13px;color:var(--grau);margin-top:4px">'+esc(mmm.text)+'</p>':'')+'<div style="font-size:11px;color:var(--grau);margin-top:4px">'+esc(mmm.von_name||'Elternsprecher')+'</div></div>';
        });
      }
      html+='<div class="karte dunkel st st1"><span class="meta sig">'+esc(jInfo(S.kindJugend).name)+'</span>'+
        '<div class="disp" style="font-size:19px;margin-top:8px">Hallo '+esc(S.kindName.split(' ')[0])+'! \ud83d\udc4b</div>'+
        '<p style="font-size:13.5px;color:rgba(255,255,255,.75);margin-top:6px">Sagt bei jedem Termin kurz zu oder ab \u2013 so kann der Trainer verl\u00e4sslich planen.</p>'+
        '<div class="stat-g" style="margin-top:12px">'+
          '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#fff">'+kommend.length+'</b><span style="color:rgba(255,255,255,.6)">Kommende</span></div>'+
          '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#fff">'+zugesagt+'</b><span style="color:rgba(255,255,255,.6)">Zusagen</span></div>'+
          '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#fff">'+(trVergangen?Math.round(da/trVergangen*100)+'%':'\u2013')+'</b><span style="color:rgba(255,255,255,.6)">Training da</span></div>'+
        '</div></div>';

      if(istSprecher){
        html+='<div class="karte st st1" style="border-left:4px solid var(--rasen)"><span class="meta sig">Elternsprecher</span><div style="font-size:12.5px;color:var(--grau);margin:6px 0 8px">Du bist Elternsprecher der '+esc(jInfo(kz).name)+'. Schick eine Info an alle Eltern dieser Jugend \u2013 sie erscheint bei ihnen ganz oben.</div>'+
        '<input id="espTitel" placeholder="Betreff, z. B. Fahrgemeinschaft gesucht">'+
        '<textarea id="espText" rows="2" placeholder="Nachricht \u2026" style="margin-top:6px"></textarea>'+
        '<button class="btn voll" id="espSend" style="margin-top:8px">An alle Eltern senden</button></div>';
      }
      html+='<div class="seg st st2"><button id="aL" class="'+(ansicht==='liste'?'an':'')+'">Termine</button><button id="aM" class="'+(ansicht==='monat'?'an':'')+'">Monatskalender</button></div>';

      if(ansicht==='monat'){
        html+='<div class="karte st st2">'+kalenderHtml(S.kalJM,termine,typFarbe,S.elTag)+'</div>';
        var tagTermine=termine.filter(function(t){return t.datum===S.elTag});
        var fer=inFerien(S.elTag);
        html+='<div class="sec">'+fmtDat(S.elTag)+(fer?' \u00b7 '+esc(fer):'')+'</div>';
        if(!tagTermine.length)html+='<div style="font-size:13px;color:var(--grau);margin-bottom:10px">Keine Termine an diesem Tag.</div>';
        tagTermine.forEach(function(t){html+=terminKarte(t)});
      } else {
        html+='<div class="sec st st2">Kommende Termine</div>';
        if(!kommend.length)html+='<div class="karte leer st st2"><div class="disp">Gerade nichts geplant</div>Sobald der Trainer Termine anlegt, erscheinen sie hier.</div>';
        var letzterMonat='';
        kommend.forEach(function(t){
          var mon=fmtMonat(t.datum);
          if(mon!==letzterMonat){html+='<div class="monat">'+esc(mon)+'</div>';letzterMonat=mon}
          html+=terminKarte(t);
        });
      }

      if(meineTurniere.length){
        html+='<div class="sec st st3">Turniere</div>';
        meineTurniere.forEach(function(t){
          var bedarf=tBedarfAll.filter(function(b){return b.turnier_id===t.id&&(b.jugend===kz||!b.jugend)});

          '<div style="font-size:13px;color:var(--grau);margin-top:3px">'+(t.datum?fmtDat(t.datum):'Datum offen')+(t.von_zeit?' \u00b7 '+esc(t.von_zeit)+(t.bis_zeit?'\u2013'+esc(t.bis_zeit):'')+' Uhr':'')+(t.ort?' \u00b7 \ud83d\udccd '+esc(t.ort):'')+'</div>';
          if(dateien.length){
            html+='<div style="margin-top:10px">'+dateien.map(function(d){return '<a class="btn hell voll" style="text-decoration:none;margin-bottom:6px" href="'+SUPA+'/storage/v1/object/public/dateien/'+d.pfad+'" target="_blank">\ud83d\udcc4 '+esc(d.name)+'</a>'}).join('')+'</div>';
          }
          if(bedarf.length){
            html+='<div style="font-size:13px;font-weight:700;margin-top:12px;color:var(--gd)">Helfer gesucht \u2013 bitte eintragen:</div>';
            bedarf.forEach(function(bd){

      h.innerHTML=html;
      $$('.hfUeb',h).forEach(function(b){b.onclick=async function(){
        try{await api('helfer_anfragen?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{uebernommen_von:S.kindName,uebernommen_kind:S.kindId}});toast('Danke! Du hast \u00fcbernommen. \u26bd');
          var neu=await api('helfer_anfragen?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&erledigt=eq.false&order=created_at.desc');helferAnfr=neu;render();}catch(e){toast('Fehler.')}
      }});
      $$('.hfAb',h).forEach(function(b){b.onclick=async function(){
        try{await api('helfer_anfragen?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{uebernommen_von:null,uebernommen_kind:null}});
          var neu=await api('helfer_anfragen?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&erledigt=eq.false&order=created_at.desc');helferAnfr=neu;render();}catch(e){toast('Fehler.')}
      }});
      if($('#espSend'))$('#espSend').onclick=async function(){
        var titel=$('#espTitel').value.trim();if(!titel){toast('Bitte Betreff eintragen.');return}
        this.disabled=true;
        try{await api('mitteilungen',{method:'POST',body:{von_rolle:'Elternsprecher',von_name:S.kindName+' (Elternsprecher)',von_jugend:kz,ziel:'eltern_jugend',ziel_jugend:kz,titel:titel,text:$('#espText').value.trim()||null}});toast('An alle Eltern gesendet.');sEltern();}catch(e){toast('Senden fehlgeschlagen.');this.disabled=false}
      };
      $('#aL').onclick=function(){S.elAnsicht='liste';render()};
      $('#aM').onclick=function(){S.elAnsicht='monat';render()};
      if((S.elAnsicht||'liste')==='monat'){
        $('#kalZur').onclick=function(){S.kalJM=jmPlus(S.kalJM,-1);render()};
        $('#kalVor').onclick=function(){S.kalJM=jmPlus(S.kalJM,1);render()};
        $$('.kal-tag[data-datum]',h).forEach(function(b){b.onclick=function(){S.elTag=b.getAttribute('data-datum');render()}});
      }
      $$('.helferBtn',h).forEach(function(b){
        b.onclick=async function(){
          var bd=b.getAttribute('data-bd'),tid=b.getAttribute('data-tid'),jug=b.getAttribute('data-jug'),drin=b.getAttribute('data-drin')==='1';
          b.disabled=true;
          try{
            if(drin){
              await api('turnier_helfer?bedarf_id=eq.'+bd+'&kind_id=eq.'+S.kindId,{method:'DELETE'});
              toast('Ausgetragen.');
            } else {
              await api('turnier_helfer',{method:'POST',body:{turnier_id:tid,bedarf_id:bd,jugend:jug,kind_id:S.kindId,name:S.kindName}});
              toast('Eingetragen \u2013 danke f\u00fcrs Mithelfen! \u26bd');
            }
            var neu=await Promise.all([api('turnier_helferbedarf?select=*'),api('turnier_helfer?select=*')]);
            tBedarfAll=neu[0];tHelferAll=neu[1];render();
          }catch(e){toast('Nicht gespeichert.');b.disabled=false}
        };
      });
      $$('.rsvp',h).forEach(function(b){
        b.onclick=async function(){
          var tid=b.getAttribute('data-tid'),st=b.getAttribute('data-st');
          try{
            await api('zusagen?on_conflict=termin_id,kind_id',{method:'POST',prefer:'resolution=merge-duplicates',body:{termin_id:tid,kind_id:S.kindId,status:st}});
            zus[tid]=st;
            $$('.rsvp[data-tid="'+tid+'"]',h).forEach(function(x){x.classList.remove('an')});
            b.classList.add('an');
            toast(st==='ja'?'Zugesagt \u2013 bis bald! \u26bd':'Abgesagt \u2013 danke f\u00fcr die Info.');
          }catch(e){toast('Nicht gespeichert \u2013 bitte erneut tippen.')}
        };
      });
    }
    render();
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Daten konnten nicht geladen werden.</div>'}
}

  var j=jInfo(kz);
  $('#app').innerHTML=

  (async function(){
    try{
      var trainer=await api('trainer?select=id,name&jugend=eq.'+kz+'&order=name');
      var html='';
      if(trainer.length){
        html+='<div class="sec st st1">Wer bist du?</div>'+trainer.map(function(t){
          return '<button class="kachel trWahl" data-id="'+t.id+'" data-name="'+esc(t.name)+'"><span class="ic">'+IC.cone+'</span><span style="flex:1"><b>'+esc(t.name)+'</b><small>Mit persönlicher PIN anmelden</small></span></button>';
        }).join('');
      } else {
        html+='<div class="karte leer st st1"><div class="disp">Noch kein Trainer angelegt</div>Lege unten deinen persönlichen Zugang für die '+esc(j.name)+' an.</div>';
      }
      html+='<div class="sec st st2">Neu im Trainerteam?</div>'+
      '<div class="karte st st2"><label>Dein Name</label><input id="tName" placeholder="z. B. Kim">'+
      '<label>Team-Code der '+esc(j.name)+'</label><input id="tCode" type="password" inputmode="numeric" placeholder="bekommst du von der Jugendleitung">'+
      '<label>Deine persönliche PIN (mind. 4 Zeichen)</label><input id="tP1" type="password" inputmode="numeric">'+
      '<label>PIN wiederholen</label><input id="tP2" type="password" inputmode="numeric">'+
      '<button class="btn voll" id="tNeu" style="margin-top:12px">Trainer-Zugang anlegen</button>'+
      '<div style="font-size:12px;color:var(--grau);margin-top:8px">Der Team-Code schützt vor fremden Anmeldungen. Standard ist 1910 – die Jugendleitung kann ihn ändern.</div></div>';
      $('#thalt').innerHTML=html;
      $$('.trWahl').forEach(function(b){b.onclick=function(){trainerPinAbfrage(kz,b.getAttribute('data-id'),b.getAttribute('data-name'))}});
      $('#tNeu').onclick=async function(){
        var name=$('#tName').value.trim(),code=$('#tCode').value,p1=$('#tP1').value,p2=$('#tP2').value;
        if(!name){toast('Bitte Namen eintragen.');return}
        if(p1.length<4){toast('Die PIN braucht mindestens 4 Zeichen.');return}
        if(p1!==p2){toast('Die PINs stimmen nicht überein.');return}
        this.disabled=true;
        try{
          var codeHash=await sha256(code);
          if(codeHash!==KONF.pins[kz]){toast('Team-Code falsch – bitte bei der Jugendleitung nachfragen.');this.disabled=false;return}
          var hash=await sha256(p1);
          var rows=await api('trainer',{method:'POST',prefer:'return=representation',body:{jugend:kz,name:name,pin_hash:hash}});
          trainerAnmelden(kz,rows[0].id,name);
        }catch(e){console.error(e);toast('Anlegen fehlgeschlagen.');this.disabled=false}
      };
    }catch(e){$('#thalt').innerHTML='<div class="karte leer">Trainerliste konnte nicht geladen werden.</div>'}
  })();
  function trainerPinAbfrage(kz,id,name){
    var m=document.createElement('div');m.className='modal-bg';
    m.innerHTML='<div class="modal"><div class="griff"></div><div class="disp" style="font-size:18px;color:var(--gd)">PIN für '+esc(name)+'</div>'+
      '<input id="pinEin" type="password" inputmode="numeric" style="margin-top:14px;font-size:22px;text-align:center;letter-spacing:.35em;font-weight:800" placeholder="••••">'+
      '<div id="pinFehler" style="color:var(--rot);font-size:13px;margin-top:8px;display:none">PIN falsch.</div>'+
      '<button class="btn voll" id="pinOk" style="margin-top:12px">Anmelden</button>'+
      '<button class="btn geist voll" id="pinAbbr" style="margin-top:8px">Abbrechen</button></div>';
    document.body.appendChild(m);$('#pinEin').focus();
    $('#pinAbbr').onclick=function(){m.remove()};m.onclick=function(e){if(e.target===m)m.remove()};
    $('#pinOk').onclick=async function(){
      var p=$('#pinEin').value;this.disabled=true;
      try{
        var hash=await sha256(p);
        var rows=await api('trainer?select=id&id=eq.'+id+'&pin_hash=eq.'+hash);
        if(!rows.length){$('#pinFehler').style.display='block';this.disabled=false;return}
        m.remove();trainerAnmelden(kz,id,name);
      }catch(e){toast('Verbindung fehlgeschlagen.');this.disabled=false}
    };
  }
}
function trainerAnmelden(kz,id,name){

  S.rolle='trainer';S.trainerJugend=kz;S.trainerId=id;S.trainerName=name;S.trainerTab='start';
  toast('Willkommen, '+name+'!');
  zeige(sTrainer);
}

/* ---------- Trainer: Start ---------- */
async function tStart(){
  var h=$('#thalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var kz=S.trainerJugend;
  try{
    var res=await Promise.all([
      api('termine?select=*&order=datum.asc'),
      api('kinder?select=id,vorname,nachname,jahrgang,jugend,rolle&jugend=eq.'+kz+'&order=vorname'),
      api('zusagen?select=termin_id,status'),
      api('notizen?select=text,kategorie,created_at&order=created_at.desc&limit=60'),
      api('termin_uebungen?select=termin_id,uebungen(kategorien)'),
      api('nachrichten?select=*&jugend=eq.'+kz+'&order=created_at.desc&limit=8'),
      api('mitteilungen?select=*&order=created_at.desc&limit=40'),
      api('mitteilung_antworten?select=*&order=created_at.asc')
    ]);
    var termine=termineFuer(res[0],kz);
    var kinder=res[1],zus=res[2];
    var kommend=termine.filter(function(t){return t.datum>=heute()});
    var naechster=kommend[0];
    var html='';

    /* Saisonwechsel-Assistent: Kinder, deren Jahrgang in der aktuellen Saison eine andere Jugend vorsieht */
    var wechsler=kinder.filter(function(k){return k.jahrgang&&jugendAusJahrgang(k.jahrgang,KONF.saison)!==k.jugend});
    if(wechsler.length){
      html+='<div class="karte st st1" style="border-left:4px solid var(--amber)"><span class="meta warn">Saisonwechsel</span>'+
      '<div class="disp" style="font-size:16px;color:var(--gd);margin-top:6px">'+wechsler.length+' Kind'+(wechsler.length>1?'er':'')+' zum Prüfen</div>'+
      '<p style="font-size:13px;color:var(--grau);margin-top:4px">Für Saison '+saisonName(KONF.saison)+' sieht der Jahrgang eine andere Jugend vor. Entscheide pro Kind: geht hoch oder bleibt (hochgezogen).</p>'+
      '<button class="btn voll" id="bWechsel" style="margin-top:10px">Jetzt entscheiden</button></div>';
    }

    if(naechster){
      var ja=zus.filter(function(z){return z.termin_id===naechster.id&&z.status==='ja'}).length;
      var nein=zus.filter(function(z){return z.termin_id===naechster.id&&z.status==='nein'}).length;
      var offen=Math.max(0,kinder.length-ja-nein);
      html+='<div class="karte dunkel st st1"><span class="meta sig">Nächster Termin</span>'+
      '<div class="disp" style="font-size:19px;margin-top:8px">'+esc(terminTitel(naechster))+'</div>'+
      '<div style="font-size:13px;color:rgba(255,255,255,.75);margin-top:4px">'+fmtDat(naechster.datum)+(naechster.uhrzeit?' · '+esc(naechster.uhrzeit):'')+(naechster.ort?' · '+esc(naechster.ort):'')+'</div>'+
      '<div class="stat-g" style="margin-top:12px">'+
        '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#C8E63C">'+ja+'</b><span style="color:rgba(255,255,255,.6)">Zusagen</span></div>'+
        '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#fff">'+nein+'</b><span style="color:rgba(255,255,255,.6)">Absagen</span></div>'+
        '<div class="stat" style="background:rgba(255,255,255,.08);border:none"><b style="color:#fff">'+offen+'</b><span style="color:rgba(255,255,255,.6)">Offen</span></div>'+
      '</div></div>';
    } else {
      html+='<div class="karte leer st st1"><div class="disp">Noch nichts geplant</div>Lege unter „Termine“ Training, Spiele oder eine ganze Trainings-Serie an.</div>';
    }

    /* Trainings-Kompass (Kurzfassung) */
    var kompass=trainingsKompass(termine,res[4],res[3]);
    if(kompass.tipps.length){
      html+='<div class="sec st st2">Trainings-Kompass</div><div class="karte st st2">'+
      '<p style="font-size:13px;color:var(--grau)">Automatische Auswertung aus Trainingsabdeckung und euren Notizen – Vorschläge für die nächsten Wochen:</p>'+
      kompass.tipps.slice(0,3).map(function(t){return '<div class="lz"><span style="font-size:13.5px"><b>'+esc(t.kat)+'</b><br><span style="font-size:12px;color:var(--grau)">'+esc(t.grund)+'</span></span><span class="meta '+(t.stufe==='hoch'?'rot':'warn')+'">'+(t.stufe==='hoch'?'Priorität':'Empfohlen')+'</span></div>'}).join('')+
      '<button class="btn hell voll" id="bKompass" style="margin-top:8px">Details &amp; passende Übungen</button></div>';
    }

    html+='<div class="sec st st3">Team</div><div class="stat-g st st3">'+
      '<div class="stat"><b>'+kinder.length+'</b><span>Spieler</span></div>'+
      '<div class="stat"><b>'+kommend.length+'</b><span>Kommende</span></div>'+
      '<div class="stat"><b>'+kinder.filter(function(k){return k.rolle}).length+'</b><span>Captains</span></div></div>';

    var wuensche=res[5];
    html+='<div class="sec st st4">An die Jugendleitung</div><div class="karte st st4">'+
    '<textarea id="wText" rows="2" placeholder="Wunsch, Anregung oder Aufgabe f\u00fcr die Jugendleitung \u2026"></textarea>'+
    '<button class="btn voll" id="wSenden" style="margin-top:9px">Absenden</button>'+
    (wuensche.length?'<div style="margin-top:12px;border-top:1px solid var(--linie);padding-top:4px">'+wuensche.map(function(n){
      return '<div class="lz"><span style="font-size:13px"><b>'+esc((n.text||'').slice(0,90))+((n.text||'').length>90?'\u2026':'')+'</b><br><span style="font-size:11.5px;color:var(--grau)">'+esc(n.trainer_name||'')+' \u00b7 '+fmtDat((n.created_at||'').slice(0,10))+'</span>'+(n.antwort?'<br><span style="font-size:12.5px;color:var(--gruen)">Antwort: '+esc(n.antwort)+'</span>':'')+'</span>'+(n.erledigt?'<span class="meta">erledigt</span>':'<span class="meta warn">offen</span>')+'</div>';
    }).join('')+'</div>':'')+'</div>';

    /* Trainer-Postfach: interne Abstimmung + Mitteilungen an mich */
    var mitAlle=res[6]||[],antw=res[7]||[];

/* Kompass-Logik: Abdeckung + Notizen-Signale */
function trainingsKompass(termine,tuRows,notizen){
  var zaehler={};KATEGORIEN.forEach(function(k){zaehler[k]=0});
  var terminIds={};termine.forEach(function(t){terminIds[t.id]=true});
  tuRows.forEach(function(r){
    if(!terminIds[r.termin_id]||!r.uebungen)return;
    (r.uebungen.kategorien||[]).forEach(function(k){if(k in zaehler)zaehler[k]++});
  });
  var werte=Object.keys(zaehler).map(function(k){return zaehler[k]});
  var max=Math.max.apply(null,[1].concat(werte));
  var summe=werte.reduce(function(a,b){return a+b},0);
  var notizText=notizen.map(function(n){return (n.text||'')+' '+(n.kategorie||'')}).join(' ');
  var tipps=[];
  KATEGORIEN.forEach(function(k){
    var n=zaehler[k];
    var kw=null;for(var i=0;i<KEYWORDS.length;i++)if(KEYWORDS[i][0]===k)kw=KEYWORDS[i][1];
    var notizTreffer=kw?(notizText.match(new RegExp(kw.source,'gi'))||[]).length:0;
    if(summe>=3&&n===0)tipps.push({kat:k,grund:'In den geplanten Trainings bisher gar nicht abgedeckt.',stufe:notizTreffer?'hoch':'mittel',score:3+notizTreffer});
    else if(summe>=5&&n<=max*0.25&&notizTreffer)tipps.push({kat:k,grund:'Wenig trainiert und '+notizTreffer+'× in Notizen aufgefallen.',stufe:'hoch',score:2+notizTreffer});
    else if(notizTreffer>=2&&n<=max*0.5)tipps.push({kat:k,grund:notizTreffer+'× in euren Notizen erwähnt – lohnt einen Schwerpunkt.',stufe:'mittel',score:notizTreffer});
  });
  tipps.sort(function(a,b){return b.score-a.score});
  return {zaehler:zaehler,max:max,summe:summe,tipps:tipps};
}

    S.kalJM=S.kalJM||jmVon(heute());S.trTag=S.trTag||heute();

      var ja=zus.filter(function(z){return z.termin_id===t.id&&z.status==='ja'}).length;
      var nein=zus.filter(function(z){return z.termin_id===t.id&&z.status==='nein'}).length;

        if(vergangen.length){html+='<div class="sec">Vergangen</div>'+vergangen.map(zeile).join('')}

/* Dauerauftrag: woechentliches Training bis Saisonende, Ferien werden uebersprungen */
function serieForm(){
  var f=$('#formNeu');
  var ferienListe=KONF.ferien.map(function(x){return '<span class="ferienchip">'+esc(x.name)+'</span>'}).join('');
  f.innerHTML='<div class="karte" style="margin-top:12px"><span class="meta sig">Trainings-Serie</span>'+
    '<p style="font-size:13px;color:var(--grau);margin-top:6px">Legt jede Woche automatisch ein Training an – bis zum Saisonende ('+fmtDat(saisonEnde(KONF.saison))+'). Termine in den Ferien werden übersprungen:</p>'+
    '<div style="margin-top:8px">'+ferienListe+'</div>'+
    '<div class="zeile"><div><label>Wochentag</label><select id="sW">'+[1,2,3,4,5,6,0].map(function(w){return '<option value="'+w+'">'+WOCHENTAGE[w]+'</option>'}).join('')+'</select></div>'+
    '<div><label>Uhrzeit</label><input id="sU" type="time" value="17:30"></div></div>'+
    '<div class="zeile"><div><label>Ab Datum</label><input id="sV" type="date" value="'+heute()+'"></div>'+
    '<div><label>Bis (Standard: Saisonende)</label><input id="sB" type="date" value="'+saisonEnde(KONF.saison)+'"></div></div>'+
    '<label>Schwerpunkt (optional, für alle)</label><input id="sS" placeholder="leer lassen und später pro Woche eintragen">'+
    '<div id="sVorschau" style="margin-top:10px"></div>'+
    '<div class="zeile" style="margin-top:12px"><button class="btn geist" id="sAbbr">Abbrechen</button><button class="btn" id="sOk">Serie anlegen</button></div></div>';
  function daten(){
    var w=parseInt($('#sW').value,10),von=$('#sV').value,bis=$('#sB').value;
    var aus=[],uebersprungen=0;
    var d=new Date(von+'T12:00:00');
    while(d.getDay()!==w)d.setDate(d.getDate()+1);
    while(true){
      var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(iso>bis)break;
      if(inFerien(iso))uebersprungen++;else aus.push(iso);
      d.setDate(d.getDate()+7);
      if(aus.length+uebersprungen>120)break;
    }
    return {termine:aus,uebersprungen:uebersprungen};
  }
  function vorschau(){var x=daten();$('#sVorschau').innerHTML='<div class="hinweis">'+x.termine.length+' Trainings werden angelegt · '+x.uebersprungen+' Ferienwochen übersprungen.</div>'}
  vorschau();
  ['sW','sV','sB'].forEach(function(id){$('#'+id).onchange=vorschau});
  $('#sAbbr').onclick=function(){f.innerHTML=''};
  $('#sOk').onclick=async function(){
    var x=daten();if(!x.termine.length){toast('Kein Termin im Zeitraum.');return}
    this.disabled=true;this.innerHTML='<span class="spinner"></span> Lege '+x.termine.length+' Trainings an …';
    var sid=uuid(),uhr=$('#sU').value,schwer=$('#sS').value.trim()||null;
    var rows=x.termine.map(function(iso){return {typ:'training',datum:iso,uhrzeit:uhr,schwerpunkt:schwer,jugend:S.trainerJugend,serie_id:sid,trainer_name:S.trainerName}});
    try{await api('termine',{method:'POST',body:rows});toast(x.termine.length+' Trainings angelegt. ⚽');tTermine()}
    catch(e){console.error(e);toast('Serie konnte nicht angelegt werden.');this.disabled=false;this.textContent='Serie anlegen'}
  };
}

    async function rolleSetzen(rolle){
      try{
        if(rolle==='captain'){
          var alterCap=teamRollen.find(function(x){return x.rolle==='captain'&&x.id!==id});
          if(alterCap&&!confirm('Es gibt schon einen Captain – Rolle übertragen?'))return;
          if(alterCap)await api('kinder?id=eq.'+alterCap.id,{method:'PATCH',body:{rolle:null}});
        }
        if(rolle==='vize'){
          var vizes=teamRollen.filter(function(x){return x.rolle==='vize'&&x.id!==id});
          if(vizes.length>=2){toast('Es sind schon 2 Vize-Captains vergeben.');return}
        }
        await api('kinder?id=eq.'+id,{method:'PATCH',body:{rolle:rolle}});
        toast('Gespeichert.');kindDetail(id);
      }catch(e){toast('Nicht gespeichert.')}
    }

/* ---------- Trainer: Übungen + Kompass + PDF-Analyse ---------- */
async function tUebungen(){
  var h=$('#thalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var kz=S.trainerJugend;
  try{
    var res=await Promise.all([

      api('termine?select=*'),
      api('notizen?select=text,kategorie,created_at&order=created_at.desc&limit=60'),

    var uebungen=res[0];
    var meineTermine=termineFuer(res[2],kz);

    var nutz={};res[1].forEach(function(r){if(meineIds[r.termin_id])nutz[r.uebung_id]=(nutz[r.uebung_id]||0)+1});
    var kompass=trainingsKompass(meineTermine,res[1],res[3]);
    var zaehler=kompass.zaehler,maxZ=kompass.max;
    var bewMap={};var bewTeam={};res[4].forEach(function(b){(bewMap[b.uebung_id]=bewMap[b.uebung_id]||[]).push(b.wert);var tm=b.team||'ganze Jugend';(bewTeam[b.uebung_id]=bewTeam[b.uebung_id]||{});(bewTeam[b.uebung_id][tm]=bewTeam[b.uebung_id][tm]||[]).push(b.wert)});

/* PDF im Browser lesen und in Abschnitte zerlegen (Advance-Football-Layout) */
async function pdfAnalysieren(file){
  var buf=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:buf}).promise;
  var seite=await pdf.getPage(1);
  var tc=await seite.getTextContent();
  var items=tc.items.map(function(i){return {str:(i.str||'').trim(),x:i.transform[4],y:i.transform[5]}}).filter(function(i){return i.str});
  items=items.filter(function(i){return !/©|copyright|urheberrecht|vervielfältigung|schadensersatz|abgemahnt|strafbar|urhg|bleiben\s*vorbehalten|advance\.?football gmbh/i.test(i.str)});
  var SEK=/^(ABLAUF|COACHING|VARIATIONEN|ANPASSUNGEN|ORGANISATION|ZIELE?)$/i;
  var header=items.filter(function(i){return SEK.test(i.str)});
  var maxHy=header.length?Math.max.apply(null,header.map(function(h){return h.y})):-1;
  var titelItems=items.filter(function(i){return i.y>maxHy+2&&!SEK.test(i.str)&&!/advance\.?football/i.test(i.str)});
  titelItems.sort(function(a,b){return b.y-a.y||a.x-b.x});
  var titelZeilen=zeilen(titelItems);
  var name=titelZeilen[0]||file.name.replace(/\.pdf$/i,'');
  var untertitel=titelZeilen[1]||'';
  var cluster=[];
  header.forEach(function(hd){
    var c=cluster.find(function(c){return Math.abs(c.x-hd.x)<60});
    if(c){c.h.push(hd)}else{cluster.push({x:hd.x,h:[hd]})}
  });
  cluster.sort(function(a,b){return a.x-b.x});
  var grenzen=cluster.map(function(c,i){
    var links=i===0?-1e9:(cluster[i-1].x+c.x)/2;
    var rechts=i===cluster.length-1?1e9:(c.x+cluster[i+1].x)/2;
    return {links:links,rechts:rechts,c:c};
  });
  var sektionen={};
  items.forEach(function(it){
    if(SEK.test(it.str))return;
    var g=grenzen.find(function(g){return it.x>=g.links&&it.x<g.rechts});
    if(!g)return;
    var kandidaten=g.c.h.filter(function(hd){return hd.y>it.y});
    if(!kandidaten.length)return;
    kandidaten.sort(function(a,b){return a.y-b.y});
    var hd=kandidaten[0];
    var key=hd.str.toUpperCase();
    (sektionen[key]=sektionen[key]||[]).push(it);
  });
  function zeilen(arr){
    var out=[];var akt=[];var letztY=null;
    arr.slice().sort(function(a,b){return b.y-a.y||a.x-b.x}).forEach(function(i){
      if(letztY===null||Math.abs(i.y-letztY)<4.5){akt.push(i.str)}
      else{out.push(akt.join(' '));akt=[i.str]}
      letztY=i.y;
    });
    if(akt.length)out.push(akt.join(' '));
    return out.map(function(z){return z.replace(/\s+/g,' ').trim()}).filter(Boolean);
  }
  function block(key){return sektionen[key]?zeilen(sektionen[key]).join('\n'):''}
  var ablauf=block('ABLAUF'),coaching=block('COACHING'),variationen=block('VARIATIONEN'),anpassungen=block('ANPASSUNGEN');
  var orga=block('ORGANISATION');if(orga)ablauf=(orga+'\n'+ablauf).trim();
  var ziele=block('ZIELE')||block('ZIEL');
  var gesamt=[name,untertitel,ablauf,coaching,variationen,anpassungen,ziele].join('\n');
  var treffer=[];
  KEYWORDS.forEach(function(kw){
    var m=gesamt.match(new RegExp(kw[1].source,'gi'));
    if(m)treffer.push({k:kw[0],n:m.length});
  });
  treffer.sort(function(a,b){return b.n-a.n});
  var kategorien=treffer.slice(0,3).map(function(t){return t.k});
  var schwerpunkte=coaching.split('\n').map(function(z){return z.replace(/^[►▶\-–\s]+/,'').trim()}).filter(Boolean).slice(0,4);
  var beschreibung=(untertitel?untertitel+'. ':'')+(ziele?ziele.split('\n').join(' '):'');
  var material=materialAusText(gesamt);
  return {name:name,kategorien:kategorien,beschreibung:beschreibung.trim(),schwerpunkte:schwerpunkte,ablauf:ablauf,coaching:coaching,variationen:variationen,anpassungen:anpassungen,material:material};
}

async function jlKalender(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';

    var alle=await api('termine?select=*&order=datum.asc,uhrzeit.asc');

    function render(){
      var filter=S.jlFilter||'alle';
      var ansicht=S.jlAnsicht||'monat';
      var sicht=alle.filter(function(t){
        if(filter==='alle')return true;
        return t.jugend===filter||(t.typ==='event'&&!t.jugend&&Array.isArray(t.jugenden)&&t.jugenden.indexOf(filter)>=0);
      });

        var kommend=sicht.filter(function(t){return t.datum>=heute()});
        if(!kommend.length)html+='<div class="karte leer"><div class="disp">Nichts geplant</div>Für diese Auswahl stehen keine Termine an.</div>';

        });
      }
      h.innerHTML=html;
      $('#aM').onclick=function(){S.jlAnsicht='monat';render()};
      $('#aL').onclick=function(){S.jlAnsicht='liste';render()};
      $$('#jlFilter .chip').forEach(function(c){c.onclick=function(){S.jlFilter=c.getAttribute('data-f');render()}});
      if((S.jlAnsicht||'monat')==='monat'){
        $('#kalZur').onclick=function(){S.kalJM=jmPlus(S.kalJM,-1);render()};

        $$('.kal-tag[data-datum]',h).forEach(function(b){b.onclick=function(){S.jlTag=b.getAttribute('data-datum');render()}});

      $$('.vAdd',box).forEach(function(b){b.onclick=async function(){

      box.innerHTML=ph;

      '<div class="karte"><label>Empf\u00e4nger</label><select id="snZiel"><option value="alle_trainer">Alle Trainer</option>'+JUGENDEN.map(function(j){return '<option value="TR:'+j.kz+'">Nur Trainer '+esc(j.name)+'</option>'}).join('')+'</select>'+
      '<label>Betreff</label><input id="snTitel" placeholder="z. B. R\u00fcckmeldung Hallenzeiten">'+
      '<label>Nachricht (optional)</label><textarea id="snText" rows="3"></textarea>'+
      '<button class="btn voll" id="snSend" style="margin-top:10px">Anfrage senden</button></div>';
      /* eigene gesendete Mitteilungen */
      var meine=(await api('mitteilungen?select=*,mitteilung_antworten(autor,text,created_at)&von_rolle=eq.'+encodeURIComponent(absender)+'&order=created_at.desc&limit=20').catch(function(){return[]}));
      if(meine.length){
        sh+='<div class="sec">Gesendet</div>';
        meine.forEach(function(m){
          var ant=(m.mitteilung_antworten||[]);
          sh+='<div class="karte" style="padding:13px 16px"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="meta sig">'+(m.ziel==='trainer_jugend'?esc(jInfo(m.ziel_jugend).name):'alle Trainer')+'</span><span style="font-size:11px;color:var(--grau)">'+fmtDat((m.created_at||'').slice(0,10))+'</span></div>'+
          '<div style="font-size:14px;font-weight:600;margin-top:5px">'+esc(m.titel)+'</div>'+(m.text?'<p style="font-size:12.5px;color:var(--grau);margin-top:3px">'+esc(m.text)+'</p>':'')+
          (ant.length?'<div style="margin-top:8px;border-top:1px solid var(--linie);padding-top:6px">'+ant.map(function(a){return '<div style="font-size:12.5px;margin-bottom:4px"><b>'+esc(a.autor||'?')+':</b> '+esc(a.text)+'</div>'}).join('')+'</div>':'<div style="font-size:11.5px;color:var(--grau);margin-top:6px">Noch keine Antwort</div>')+
          '<button class="snWeg btn geist" data-id="'+m.id+'" style="margin-top:8px;padding:6px 12px;font-size:12px">L\u00f6schen</button></div>';
        });
      }
      box.innerHTML=sh;

function aufKarte(a){
  var fael=a.faellig?fmtDat(a.faellig):null;
  var spaet=a.faellig&&a.faellig<heute()&&a.status!=='erledigt';
  return '<div class="karte"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+
    (a.jugend?jBadge(a.jugend):'<span class="meta">Verein</span>')+(fael?'<span class="meta '+(spaet?'rot':'')+'">bis '+fael+'</span>':'')+(a.quelle&&a.quelle.indexOf('wfv:')===0?'<span class="meta warn">wfv</span>':'')+(a.quelle&&a.quelle.indexOf('post:')===0?'<span class="meta sig">aus Postfach</span>':'')+'</div>'+
    '<button class="aWeg" data-id="'+a.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button></div>'+
    '<div class="disp" style="font-size:15.5px;color:var(--gd);margin-top:7px'+(a.status==='erledigt'?';text-decoration:line-through;opacity:.6':'')+'">'+esc(a.titel)+'</div>'+
    (a.details?'<p style="font-size:13px;color:var(--grau);margin-top:4px">'+esc(a.details)+'</p>':'')+
    '<div class="zeile" style="margin-top:10px"><button class="btn '+(a.status==='erledigt'?'geist':'sig')+' aFertig" data-id="'+a.id+'" data-z="'+(a.status==='erledigt'?'offen':'erledigt')+'">'+(a.status==='erledigt'?'Wieder \u00f6ffnen':'Erledigt \u2713')+'</button><button class="btn geist aEdit" data-id="'+a.id+'">Bearbeiten</button></div></div>';
}
function bindAufKarten(box){
  $$('.aFertig',box).forEach(function(b){b.onclick=async function(){
    var z=b.getAttribute('data-z');
    try{await api('aufgaben?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{status:z,erledigt_am:z==='erledigt'?new Date().toISOString():null}});jlAufgaben()}catch(e){toast('Fehler.')}
  }});
  $$('.aWeg',box).forEach(function(b){b.onclick=async function(){if(!confirm('Aufgabe l\u00f6schen?'))return;try{await api('aufgaben?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});jlAufgaben()}catch(e){toast('Fehler.')}}});
  $$('.aEdit',box).forEach(function(b){b.onclick=async function(){
    try{var r=await api('aufgaben?select=*&id=eq.'+b.getAttribute('data-id'));aufForm(r[0])}catch(e){toast('Fehler.')}
  }});
}
function aufForm(a){
  var f=$('#formAuf');if(!f){return}
  f.innerHTML='<div class="karte" style="margin-top:10px"><label>Titel</label><input id="afT" value="'+esc(a?a.titel:'')+'" placeholder="z. B. Hallenzeiten anfragen">'+
  '<label>Details (optional)</label><textarea id="afD" rows="2">'+esc(a?a.details:'')+'</textarea>'+
  '<div class="zeile"><div><label>F\u00fcr</label><select id="afJ"><option value="">Verein gesamt</option>'+JUGENDEN.map(function(j){return '<option value="'+j.kz+'"'+(a&&a.jugend===j.kz?' selected':'')+'>'+esc(j.name)+'</option>'}).join('')+'</select></div>'+
  '<div><label>F\u00e4llig bis (optional)</label><input id="afF" type="date" value="'+esc(a&&a.faellig?a.faellig:'')+'"></div></div>'+
  '<div class="zeile" style="margin-top:12px"><button class="btn geist" id="afAbbr">Abbrechen</button><button class="btn" id="afOk">Speichern</button></div></div>';
  $('#afAbbr').onclick=function(){f.innerHTML=''};
  $('#afOk').onclick=async function(){
    var titel=$('#afT').value.trim();if(!titel){toast('Bitte Titel eintragen.');return}
    var body={titel:titel,details:$('#afD').value.trim()||null,jugend:$('#afJ').value||null,faellig:$('#afF').value||null};
    this.disabled=true;
    try{
      if(a)await api('aufgaben?id=eq.'+a.id,{method:'PATCH',body:body});
      else await api('aufgaben',{method:'POST',body:body});
      toast('Gespeichert.');jlAufgaben();
    }catch(e){toast('Speichern fehlgeschlagen.');this.disabled=false}
  };
}
function postKarte(n){

  '<button class="pWeg" data-id="'+n.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button></div>'+
  '<p style="font-size:14px;margin-top:8px">'+esc(n.text)+'</p>'+
  '<textarea class="pAnt" data-id="'+n.id+'" rows="2" placeholder="Kurze Antwort an das Trainerteam \u2026" style="margin-top:8px">'+esc(n.antwort||'')+'</textarea>'+

function bindPost(box){
  $$('.pSpeich',box).forEach(function(b){b.onclick=async function(){
    var id=b.getAttribute('data-id');var ta=$('.pAnt[data-id="'+id+'"]',box);

  }});
  $$('.pFertig',box).forEach(function(b){b.onclick=async function(){
    try{await api('nachrichten?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{erledigt:b.getAttribute('data-z')==='1'}});jlAufgaben()}catch(e){toast('Fehler.')}
  }});

    try{await api('aufgaben',{method:'POST',body:{titel:b.getAttribute('data-t').slice(0,120),jugend:b.getAttribute('data-j')||null,quelle:'post:'+b.getAttribute('data-id')}});toast('In Aufgaben \u00fcbernommen.');S.aufView='board';jlAufgaben()}catch(e){toast('Fehler.')}

}
/* Turniere-Uebersicht fuer die Jugendleitung */
async function jlTurniere(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var res=await Promise.all([
      api('turniere?select=*&order=datum.asc.nullslast,created_at.desc'),
      api('turnier_kategorien?select=turnier_id,name,jugend,mannschaften'),
      api('turnier_helferbedarf?select=id,turnier_id,jugend,aufgabe,plaetze'),
      api('turnier_helfer?select=bedarf_id,turnier_id,name')
    ]);
    var turniere=res[0],kats=res[1],bedarf=res[2],helfer=res[3];
    var kommend=turniere.filter(function(t){return t.status!=='archiv'&&(!t.datum||t.datum>=heute())});
    var html='<div class="hinweis st st1">\u00dcberblick \u00fcber alle Turniere. Details plant die Turnierorganisation \u2013 hier siehst du Stand, Kategorien und wer sich als Helfer eingetragen hat.</div>';
    if(!kommend.length)html+='<div class="karte leer st st1"><div class="disp">Keine Turniere geplant</div>Die Turnierorganisation legt Turniere im eigenen Bereich an.</div>';
    kommend.forEach(function(t){
      var tk=kats.filter(function(k){return k.turnier_id===t.id});
      var tb=bedarf.filter(function(b){return b.turnier_id===t.id});
      var th=helfer.filter(function(x){return x.turnier_id===t.id});
      var plaetze=tb.reduce(function(a,b){return a+(b.plaetze||0)},0);
      html+='<div class="karte st st1"><div style="display:flex;justify-content:space-between;gap:8px"><b style="font-size:16px;color:var(--gd)">'+esc(t.name)+'</b><span class="meta '+(t.freigegeben?'sig':'warn')+'">'+(t.freigegeben?'freigegeben':'in Planung')+'</span></div>'+
      '<div style="font-size:13px;color:var(--grau);margin-top:5px">'+(t.datum?fmtDat(t.datum):'Datum offen')+(t.von_zeit?' \u00b7 '+esc(t.von_zeit)+' Uhr':'')+(t.ort?' \u00b7 '+esc(t.ort):'')+'</div>'+
      (tk.length?'<div style="margin-top:8px;font-size:13px">'+tk.map(function(k){return (k.jugend?jBadge(k.jugend):'<span class="meta">'+esc(k.name)+'</span>')+(k.mannschaften?' <span style="color:var(--grau)">'+k.mannschaften+'</span>':'')}).join(' ')+'</div>':'')+
      '<div class="lz" style="margin-top:8px"><span style="font-size:13px">Helfer eingetragen</span><b>'+th.length+' / '+plaetze+'</b></div></div>';
    });
    var archiv=turniere.filter(function(t){return t.status==='archiv'||(t.datum&&t.datum<heute())});
    if(archiv.length){
      html+='<div class="sec">Vergangene \u00b7 '+archiv.length+'</div>';
      archiv.forEach(function(t){
        html+='<div class="karte" style="padding:12px 16px"><b style="font-size:14px">'+esc(t.name)+'</b> <span class="meta">'+(t.datum?fmtDat(t.datum):'')+'</span>'+
        (t.nb_teilnehmer||t.nb_umsatz||t.nb_mannschaften?'<div style="font-size:12.5px;color:var(--grau);margin-top:4px">'+(t.nb_mannschaften?t.nb_mannschaften+' Mannschaften \u00b7 ':'')+(t.nb_teilnehmer?'~'+t.nb_teilnehmer+' Teilnehmer \u00b7 ':'')+(t.nb_umsatz?'Umsatz '+esc(t.nb_umsatz):'')+'</div>':'')+
        (t.nb_text?'<p style="font-size:13px;margin-top:6px">'+esc(t.nb_text)+'</p>':'')+'</div>';
      });
    }
    h.innerHTML=html;
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Turniere konnten nicht geladen werden.</div>'}
}

/* Offene Punkte zwischen Jugendleitung und Abteilungsleitung */
async function alPunkte(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var istAL=(S.fRolle==='AL');
  try{
    var punkte=await api('al_punkte?select=*&order=status.asc,prioritaet.desc,created_at.desc');

    var fertig=punkte.filter(function(p){return p.status==='erledigt'});
    var html='<button class="btn geist st st1" id="bZur">'+IC.zurueck+' Verwaltung</button>';
    html+='<div class="hinweis st st1">'+(istAL?'Offene Punkte, die die Jugendleitung dir zugewiesen hat. Du kannst sie kommentieren und auf erledigt setzen.':'Punkte, die die Abteilungsleitung Fu\u00dfball erledigen soll. Sie sieht sie in ihrem Bereich unter \u201eMeine offenen Punkte\u201c.')+'</div>';
    if(!istAL){
      html+='<div class="karte st st1"><label>Neuer Punkt f\u00fcr die Abteilungsleitung</label><input id="pkT" placeholder="z. B. Zuschuss f\u00fcr neue Tore beantragen">'+
      '<label>Details (optional)</label><textarea id="pkD" rows="2"></textarea>'+
      '<div class="zeile"><div><label>Priorit\u00e4t</label><select id="pkP"><option value="normal">Normal</option><option value="hoch">Hoch</option><option value="niedrig">Niedrig</option></select></div>'+
      '<div><label>F\u00e4llig bis</label><input id="pkF" type="date"></div></div>'+
      '<button class="btn voll" id="pkAdd" style="margin-top:10px">Punkt senden</button></div>';
    }
    function karte(p){
      var spaet=p.faellig&&p.faellig<heute()&&p.status!=='erledigt';
      return '<div class="karte"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+
      (p.prioritaet==='hoch'?'<span class="meta rot">hoch</span>':(p.prioritaet==='niedrig'?'<span class="meta">niedrig</span>':'<span class="meta sig">normal</span>'))+
      (p.faellig?'<span class="meta '+(spaet?'rot':'')+'">bis '+fmtDat(p.faellig)+'</span>':'')+(p.status==='erledigt'?'<span class="meta">erledigt</span>':'')+'</div>'+
      (!istAL?'<button class="pkWeg" data-id="'+p.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button>':'')+'</div>'+
      '<div class="disp" style="font-size:15.5px;color:var(--gd);margin-top:7px'+(p.status==='erledigt'?';text-decoration:line-through;opacity:.6':'')+'">'+esc(p.titel)+'</div>'+
      (p.details?'<p style="font-size:13px;color:var(--grau);margin-top:4px">'+esc(p.details)+'</p>':'')+
      (p.antwort?'<div class="hinweis" style="margin-top:8px">R\u00fcckmeldung: '+esc(p.antwort)+'</div>':'')+
      (istAL?'<textarea class="pkAnt" data-id="'+p.id+'" rows="2" placeholder="R\u00fcckmeldung an die Jugendleitung \u2026" style="margin-top:8px">'+esc(p.antwort||'')+'</textarea>':'')+
      '<div class="zeile" style="margin-top:9px">'+(istAL?'<button class="btn hell pkSave" data-id="'+p.id+'">R\u00fcckmeldung</button>':'')+
      '<button class="btn '+(p.status==='erledigt'?'geist':'sig')+' pkFertig" data-id="'+p.id+'" data-z="'+(p.status==='erledigt'?'offen':'erledigt')+'">'+(p.status==='erledigt'?'Wieder \u00f6ffnen':'Erledigt \u2713')+'</button></div></div>';
    }
    html+='<div class="sec">Offen \u00b7 '+offen.length+'</div>';
    if(!offen.length)html+='<div class="karte leer"><div class="disp">Nichts offen</div>'+(istAL?'Aktuell hat die Jugendleitung dir keine Punkte zugewiesen.':'Lege oben den ersten Punkt an.')+'</div>';
    html+=offen.map(karte).join('');
    if(fertig.length)html+='<div class="sec">Erledigt \u00b7 '+fertig.length+'</div>'+fertig.map(karte).join('');
    h.innerHTML=html;
    $('#bZur').onclick=function(){jlVerwaltung()};
    if($('#pkAdd'))$('#pkAdd').onclick=async function(){
      var t=$('#pkT').value.trim();if(!t){toast('Bitte Titel eintragen.');return}
      this.disabled=true;
      try{await api('al_punkte',{method:'POST',body:{von_rolle:'JL',titel:t,details:$('#pkD').value.trim()||null,prioritaet:$('#pkP').value,faellig:$('#pkF').value||null}});toast('Punkt gesendet.');alPunkte()}
      catch(e){toast('Fehler.');this.disabled=false}
    };
    $$('.pkSave').forEach(function(b){b.onclick=async function(){
      var id=b.getAttribute('data-id');var ta=$('.pkAnt[data-id="'+id+'"]',h);
      try{await api('al_punkte?id=eq.'+id,{method:'PATCH',body:{antwort:ta.value.trim()||null}});toast('R\u00fcckmeldung gespeichert.')}catch(e){toast('Fehler.')}
    }});
    $$('.pkFertig').forEach(function(b){b.onclick=async function(){
      var z=b.getAttribute('data-z');
      try{await api('al_punkte?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{status:z,erledigt_am:z==='erledigt'?new Date().toISOString():null}});alPunkte()}catch(e){toast('Fehler.')}
    }});
    $$('.pkWeg').forEach(function(b){b.onclick=async function(){if(!confirm('Punkt l\u00f6schen?'))return;try{await api('al_punkte?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});alPunkte()}catch(e){toast('Fehler.')}}});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Punkte konnten nicht geladen werden.</div>'}
}
