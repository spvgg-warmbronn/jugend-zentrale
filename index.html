        '<div class="zeile"><div><label>Bestellt</label><input id="vkBest" type="number" inputmode="numeric" placeholder="z.\u202fB. 900"></div><div><label>Verkauft</label><input id="vkAnz" type="number" inputmode="numeric"></div></div>'+
        '<div class="zeile"><div><label>VK \u20ac/St\u00fcck</label><input id="vkVk" type="number" inputmode="decimal"></div><div><label>EK \u20ac/St\u00fcck</label><input id="vkEk" type="number" inputmode="decimal"></div></div>'+
        '<div style="font-size:11.5px;color:var(--grau);margin-top:4px">\u201eBestellt\u201c = im Voraus gekauft (wird voll als Kosten gerechnet). Leer lassen, wenn r\u00fcckgabef\u00e4hig \u2013 dann z\u00e4hlt nur das Verkaufte.</div>';
      }
    }
    if($('#vkArt')){$('#vkArt').onchange=vkFelderRender;vkFelderRender();}
    if($('#vkAdd'))$('#vkAdd').onclick=async function(){
      var name=($('#vkName')?$('#vkName').value.trim():'');
      var art=$('#vkArt').value;
      if(!name){if(art==='Spende')name='Spende';else{toast('Bitte Name eintragen.');return}}
      var body={turnier_id:id,art:art,name:name,
        anzahl:($('#vkAnz')?parseFloat($('#vkAnz').value.replace(',','.')):null)||(art==='Spende'?1:null),
        bestellt:($('#vkBest')?parseFloat($('#vkBest').value.replace(',','.')):null)||null,
        vk:($('#vkVk')?parseFloat($('#vkVk').value.replace(',','.')):null)||null,
        ek:($('#vkEk')?parseFloat($('#vkEk').value.replace(',','.')):null)||null};
      try{await api('turnier_verkauf',{method:'POST',body:body});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}
    };
    $$('.vkWeg').forEach(function(b){b.onclick=async function(){try{await api('turnier_verkauf?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}}});
    katPatch('.katF','spielfelder',true);katPatch('.katP','platztyp',true);

    if($('#bdAdd'))$('#bdAdd').onclick=async function(){
      var auf=$('#bdA').value.trim();if(!auf){toast('Bitte Aufgabe eintragen.');return}
      try{await api('turnier_helferbedarf',{method:'POST',body:{turnier_id:id,aufgabe:auf,zeit:$('#bdZ').value.trim()||null,plaetze:parseInt($('#bdP').value,10)||1,jugend:$('#bdJ').value||null}});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}
    };
    $$('.bdWeg').forEach(function(b){b.onclick=async function(){if(!confirm('Schicht l\u00f6schen?'))return;try{await api('turnier_helferbedarf?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}}});
    $$('.bdEdit').forEach(function(b){b.onclick=async function(){
      var z=prompt('Zeit der Schicht:',b.getAttribute('data-zeit')||'');
      if(z===null)return;
      var p=prompt('Wie viele Pl\u00e4tze (Personen)?',b.getAttribute('data-plaetze')||'1');
      if(p===null)return;
      var pn=Math.max(1,parseInt(p,10)||1);
      try{await api('turnier_helferbedarf?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{zeit:z.trim()||null,plaetze:pn}});toast('Schicht angepasst.');turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}
    }});

    if($('#pkAdd'))$('#pkAdd').onclick=async function(){
      var titel=$('#pkN').value.trim();if(!titel){toast('Bitte Punkt eintragen.');return}
      var z=$('#pkZ').value;var zLabel=z;
      try{
        if(z.indexOf('TR:')===0){
          var kz=z.slice(3);zLabel='Trainer '+jInfo(kz).name;
          await api('mitteilungen',{method:'POST',body:{von_rolle:'Turnierleitung',ziel:'trainer_jugend',ziel_jugend:kz,titel:'Turnier '+t.name+': '+titel,text:'Bitte um Abstimmung/Erledigung zum Turnier \u201e'+t.name+'\u201c.',quelle:'turnier:'+id}});
          toast('An die Trainer der '+jInfo(kz).name+' gesendet.');
        }
        await api('turnier_punkte',{method:'POST',body:{turnier_id:id,titel:titel,zustaendig:zLabel}});
        turnierDetail(id,vergangenModus);
      }catch(e){toast('Fehler.')}
    };
    $$('.pkF').forEach(function(b){b.onclick=async function(){try{await api('turnier_punkte?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{status:b.getAttribute('data-z')}});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}}});
    $$('.pkWeg').forEach(function(b){b.onclick=async function(){try{await api('turnier_punkte?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}}});

    if($('#dIn'))$('#dIn').onchange=async function(){
      var file=this.files&&this.files[0];this.value='';if(!file)return;
      if(file.size>15*1024*1024){toast('Datei zu gro\u00df (max 15 MB).');return}
      $('#dLbl').innerHTML='<span class="spinner" style="border-color:rgba(14,59,23,.3);border-top-color:var(--gd)"></span> L\u00e4dt \u2026';
      try{
        var ext=(file.name.split('.').pop()||'dat').toLowerCase();
        var pfad='turniere/'+id+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'.'+ext;
        var up=await fetch(SUPA+'/storage/v1/object/dateien/'+pfad,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});
        if(!up.ok)throw new Error('upload');
        await api('turnier_dateien',{method:'POST',body:{turnier_id:id,jugend:($('#dJ')?$('#dJ').value:'')||null,name:file.name,pfad:pfad}});
        toast('Hochgeladen.');turnierDetail(id,vergangenModus);
      }catch(e){toast('Upload fehlgeschlagen.');turnierDetail(id,vergangenModus)}
    };
    $$('.dWeg').forEach(function(b){b.onclick=async function(){try{await api('turnier_dateien?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});turnierDetail(id,vergangenModus)}catch(e){toast('Fehler.')}}});

    if($('#nbSave'))$('#nbSave').onclick=async function(){
      var body={nb_teilnehmer:parseInt($('#nbT').value,10)||null,nb_mannschaften:parseInt($('#nbM').value,10)||null,nb_essen_bestellt:$('#nbEb').value.trim()||null,nb_text:$('#nbTx').value.trim()||null,status:'archiv'};
      this.disabled=true;
      try{await api('turniere?id=eq.'+id,{method:'PATCH',body:body});toast('Nachbericht gespeichert.')}catch(e){toast('Fehler.');this.disabled=false}
    };
    if($('#hPdf'))$('#hPdf').onclick=function(){helferPdf(t,helfer,bedarf)};
    $('#tWeg').onclick=async function(){if(!confirm('Turnier mit allen Daten l\u00f6schen?'))return;try{await api('turniere?id=eq.'+id,{method:'DELETE'});toast('Gel\u00f6scht.');S.turnierId=null;sTurnier()}catch(e){toast('Fehler.')}};
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Turnier konnte nicht geladen werden.</div>'}
}
function helferPdf(t,helfer,bedarf){
  bedarf=bedarf||[];
  var zeilen='';
  if(bedarf.length){
    bedarf.forEach(function(bd){
      var eing=helfer.filter(function(x){return x.bedarf_id===bd.id});
      zeilen+='<tr style="background:#0E3B17"><td colspan="4" style="color:#fff;font-weight:700">'+esc(bd.aufgabe)+(bd.zeit?' \u00b7 '+esc(bd.zeit):'')+(bd.jugend?' \u00b7 '+esc(jInfo(bd.jugend).name):'')+' ('+eing.length+'/'+bd.plaetze+')</td></tr>';
      for(var i=0;i<Math.max(bd.plaetze,eing.length);i++){var e=eing[i];zeilen+='<tr><td>'+(e?esc(e.name):'&nbsp;')+'</td><td>'+esc(bd.aufgabe||'')+'</td><td>'+esc(bd.zeit||'')+'</td><td></td></tr>'}
    });
    var frei=helfer.filter(function(x){return !x.bedarf_id});
    if(frei.length){zeilen+='<tr style="background:#0E3B17"><td colspan="4" style="color:#fff;font-weight:700">Weitere Helfer</td></tr>';frei.forEach(function(x){zeilen+='<tr><td>'+esc(x.name)+'</td><td>'+esc(x.aufgabe||'')+'</td><td>'+esc(x.zeit||'')+'</td><td></td></tr>'})}
  } else {
    zeilen=helfer.length?helfer.map(function(x){return '<tr><td>'+esc(x.name)+'</td><td>'+esc(x.aufgabe||'')+'</td><td>'+esc(x.zeit||'')+'</td><td></td></tr>'}).join(''):'<tr><td colspan="4" style="text-align:center;color:#888;padding:20px">Noch keine Helfer eingetragen</td></tr>';
  }
  /* Leere Zusatzzeilen zum handschriftlichen Ergaenzen */
  var leer='';for(var i=0;i<Math.max(4,10-helfer.length);i++)leer+='<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>';
  var logoUrl=SUPA+'/functions/v1/app/logo.png';
  var html='<!doctype html><html><head><meta charset="utf-8"><title>Helferliste '+esc(t.name)+'</title>'+
  '<style>@page{size:A4;margin:16mm}body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#14210f}'+
  'header{display:flex;align-items:center;gap:14px;border-bottom:3px solid #0E3B17;padding-bottom:12px;margin-bottom:6px}'+
  'header img{width:56px;height:56px}h1{font-size:22px;margin:0;color:#0E3B17}.sub{color:#555;font-size:13px;margin-top:2px}'+
  'table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}th{background:#0E3B17;color:#fff;text-align:left;padding:9px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}'+
  'td{border:1px solid #c9d6c9;padding:11px 10px;height:26px}tr:nth-child(even) td{background:#f4f8f4}'+
  '.foot{margin-top:18px;font-size:11px;color:#888}</style></head><body>'+
  '<header><img src="'+logoUrl+'" alt=""><div><h1>Helferliste</h1><div class="sub">'+esc(t.name)+(t.datum?' \u00b7 '+fmtDat(t.datum):'')+(t.ort?' \u00b7 '+esc(t.ort):'')+'</div></div></header>'+
  '<table><thead><tr><th style="width:32%">Name</th><th style="width:34%">Aufgabe</th><th style="width:20%">Zeit</th><th style="width:14%">da \u2713</th></tr></thead><tbody>'+zeilen+leer+'</tbody></table>'+
  '<div class="foot">Spvgg 1910 Warmbronn \u00b7 Jugend-Zentrale \u00b7 erstellt am '+fmtDat(heute())+'</div>'+
  '<script>window.onload=function(){setTimeout(function(){window.print()},400)}<\/script></body></html>';
  var w=window.open('','_blank');
  if(!w){toast('Bitte Pop-ups f\u00fcr diese Seite erlauben, dann klappt der PDF-Druck.');return}
  w.document.open();w.document.write(html);w.document.close();
}

/* ---------- Turnier: Quittungen ---------- */
async function turnierQuittungen(){
  var h=$('#thalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var res=await Promise.all([
      api('turniere?select=id,name,datum&order=datum.desc.nullslast'),
      api('quittungen?select=*&order=created_at.desc&limit=50')
    ]);
    var turniere=res[0],quittungen=res[1];
    var html='<div class="hinweis st st1">Quittung f\u00fcr eine bezahlte Startgeb\u00fchr erstellen. Ausf\u00fcllen, als PDF drucken \u2013 fertig. Jede Quittung wird fortlaufend nummeriert und gespeichert.</div>';
    html+='<div class="karte st st1"><label>Turnier (optional)</label><select id="qT"><option value="">\u2013 keins \u2013</option>'+turniere.map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+(t.datum?' ('+fmtDat(t.datum)+')':'')+'</option>'}).join('')+'</select>'+
    '<div class="zeile"><div><label>Vorname</label><input id="qV" placeholder="Vorname"></div><div><label>Nachname</label><input id="qN" placeholder="Nachname"></div></div>'+
    '<label>Verein</label><input id="qVer" placeholder="z. B. TSV Nachbarort">'+
    '<div class="zeile"><div><label>Jugend</label><select id="qJ"><option value="">\u2013</option>'+JUGENDEN.map(function(j){return '<option value="'+esc(j.name)+'">'+esc(j.name)+'</option>'}).join('')+'<option value="Frauen">Frauen</option><option value="Herren">Herren</option></select></div><div><label>Betrag</label><input id="qB" placeholder="z. B. 30,00 \u20ac"></div></div>'+
    '<label>Zweck</label><input id="qZ" value="Startgeb\u00fchr" placeholder="z. B. Startgeb\u00fchr">'+
    '<button class="btn voll" id="qErstell" style="margin-top:12px">Quittung erstellen &amp; drucken</button></div>';
    html+='<div class="sec st st2">Ausgestellte Quittungen \u00b7 '+quittungen.length+'</div>';
    if(!quittungen.length)html+='<div class="karte leer st st2"><div class="disp">Noch keine Quittungen</div>Erstelle oben die erste.</div>';
    quittungen.forEach(function(q){
      html+='<div class="karte" style="padding:12px 16px"><div style="display:flex;justify-content:space-between;gap:8px"><div style="flex:1"><b style="font-size:14px">Nr. '+q.nummer+' \u00b7 '+esc((q.vorname||'')+' '+(q.nachname||''))+'</b><br><span style="font-size:12px;color:var(--grau)">'+(q.verein?esc(q.verein)+' \u00b7 ':'')+(q.jugend?esc(q.jugend)+' \u00b7 ':'')+esc(q.betrag||'')+' \u00b7 '+fmtDat(q.datum)+'</span></div>'+
      '<div style="display:flex;gap:6px;align-items:flex-start"><button class="qDruck" data-id="'+q.id+'" style="background:none;border:1px solid var(--linie);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700">Drucken</button>'+
      '<button class="qWeg" data-id="'+q.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">\u2715</button></div></div></div>';
    });
    h.innerHTML=html;
    $('#qErstell').onclick=async function(){
      var v=$('#qV').value.trim(),n=$('#qN').value.trim();
      if(!v&&!n){toast('Bitte mindestens einen Namen eintragen.');return}
      var body={vorname:v||null,nachname:n||null,verein:$('#qVer').value.trim()||null,jugend:$('#qJ').value||null,betrag:$('#qB').value.trim()||null,zweck:$('#qZ').value.trim()||'Startgeb\u00fchr',turnier_id:$('#qT').value||null,datum:heute()};
      this.disabled=true;
      try{
        var r=await api('quittungen',{method:'POST',prefer:'return=representation',body:body});
        toast('Quittung Nr. '+r[0].nummer+' gespeichert.');
        quittungPdf(r[0]);
        turnierQuittungen();
      }catch(e){console.error(e);toast('Fehler beim Speichern.');this.disabled=false}
    };
    $$('.qDruck').forEach(function(b){b.onclick=async function(){
      try{var r=await api('quittungen?select=*&id=eq.'+b.getAttribute('data-id'));if(r[0])quittungPdf(r[0])}catch(e){toast('Fehler.')}
    }});
    $$('.qWeg').forEach(function(b){b.onclick=async function(){if(!confirm('Quittung l\u00f6schen?'))return;try{await api('quittungen?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});turnierQuittungen()}catch(e){toast('Fehler.')}}});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Quittungen konnten nicht geladen werden.</div>'}
}
function quittungPdf(q){
  var logoUrl=SUPA+'/functions/v1/app/logo.png';
  var name=((q.vorname||'')+' '+(q.nachname||'')).trim();
  var zeile=function(l,w){return '<tr><td class="l">'+l+'</td><td class="w">'+(w||'\u2013')+'</td></tr>'};
  var html='<!doctype html><html><head><meta charset="utf-8"><title>Quittung Nr. '+q.nummer+'</title>'+
  '<style>@page{size:A4;margin:22mm}body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#14210f}'+
  'header{display:flex;align-items:center;gap:16px;border-bottom:3px solid #0E3B17;padding-bottom:14px}'+
  'header img{width:64px;height:64px}.ver{font-size:12px;color:#3E9142;font-weight:700;letter-spacing:.08em;text-transform:uppercase}'+
  'h1{font-size:26px;margin:2px 0 0;color:#0E3B17}.nr{margin-top:4px;font-size:13px;color:#555}'+
  'table{width:100%;border-collapse:collapse;margin-top:26px;font-size:15px}'+
  'td{padding:12px 4px;border-bottom:1px solid #dbe4db}td.l{color:#666;width:38%}td.w{font-weight:600}'+
  '.betrag{margin-top:28px;background:#f4f8f4;border:1.5px solid #0E3B17;border-radius:12px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}'+
  '.betrag .lab{font-size:13px;color:#555;text-transform:uppercase;letter-spacing:.06em}.betrag .val{font-size:26px;font-weight:800;color:#0E3B17}'+
  '.sig{margin-top:56px;display:flex;justify-content:space-between;gap:40px}.sig div{flex:1;border-top:1px solid #999;padding-top:6px;font-size:12px;color:#666;text-align:center}'+
  '.foot{margin-top:40px;font-size:11px;color:#999;text-align:center}</style></head><body>'+
  '<header><img src="'+logoUrl+'" alt=""><div><div class="ver">Spvgg 1910 Warmbronn</div><h1>Quittung</h1><div class="nr">Nr. '+q.nummer+' \u00b7 '+fmtDat(q.datum)+'</div></div></header>'+
  '<table>'+
  zeile('Name',esc(name))+
  zeile('Verein',esc(q.verein||''))+
  zeile('Jugend / Mannschaft',esc(q.jugend||''))+
  zeile('Zweck',esc(q.zweck||'Startgeb\u00fchr'))+
  '</table>'+
  '<div class="betrag"><span class="lab">Betrag dankend erhalten</span><span class="val">'+esc(q.betrag||'\u2013')+'</span></div>'+
  '<div class="sig"><div>Ort, Datum</div><div>Unterschrift Turnierleitung</div></div>'+
  '<div class="foot">Spvgg 1910 Warmbronn \u00b7 Jugendabteilung \u00b7 erstellt am '+fmtDat(heute())+'</div>'+
  '<script>window.onload=function(){setTimeout(function(){window.print()},400)}<\/script></body></html>';
  var w=window.open('','_blank');
  if(!w){toast('Bitte Pop-ups erlauben, dann klappt der PDF-Druck.');return}
  w.document.open();w.document.write(html);w.document.close();
}


boot();
</script>
