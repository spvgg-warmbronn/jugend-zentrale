<style>
:root{--nacht:#0A1F0E;--gd:#0E3B17;--gruen:#1B5E20;--rasen:#3E9142;--hell:#E8F2E9;--papier:#F4F6F4;--tinte:#161D17;--grau:#59645B;--linie:#D9E1DA;--signal:#C8E63C;--rot:#C0392B;--amber:#D99A2B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--papier);color:var(--tinte);font-size:15px;line-height:1.55;min-height:100vh}
h1,h2,h3,.disp{font-family:'Archivo',sans-serif;font-stretch:114%;font-weight:900;text-transform:uppercase;line-height:1.05}
button{font:inherit;cursor:pointer}
input,select,textarea{width:100%;border:1.5px solid var(--linie);border-radius:12px;padding:12px 13px;font:inherit;background:#fff;color:var(--tinte)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--rasen);box-shadow:0 0 0 3px rgba(62,145,66,.15)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grau);margin:13px 0 5px}

/* ===== Screens & Cinematik ===== */
#app{min-height:100vh;position:relative}
.screen{min-height:100vh;animation:sIn .5s cubic-bezier(.22,.9,.3,1) both;position:relative}
@keyframes sIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.raus{animation:sOut .28s ease both}
@keyframes sOut{to{opacity:0;transform:translateY(-14px)}}
.screen.fest{animation:sFest .4s ease both}
@keyframes sFest{from{opacity:0}to{opacity:1}}
.st{animation:sIn .55s cubic-bezier(.22,.9,.3,1) both}
.st1{animation-delay:.05s}.st2{animation-delay:.12s}.st3{animation-delay:.2s}.st4{animation-delay:.28s}.st5{animation-delay:.36s}
.wasser{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);width:min(78vw,430px);opacity:.05;pointer-events:none;z-index:0;filter:grayscale(35%)}
.inhalt>*{position:relative;z-index:1}
.inhalt>.wasser{position:fixed;z-index:0}

/* ===== Hero ===== */
.held{min-height:100vh;background:var(--nacht);color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
.held-bg{position:absolute;inset:-40%;background-image:linear-gradient(rgba(200,230,60,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(200,230,60,.05) 1px,transparent 1px);background-size:64px 64px;animation:drift 34s linear infinite;pointer-events:none}
@keyframes drift{to{transform:translate(64px,64px)}}
.held-halo{position:absolute;left:50%;top:30%;width:130vw;max-width:820px;aspect-ratio:1;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(62,145,66,.4),transparent 62%);pointer-events:none}
.held-kreis{position:absolute;left:50%;top:30%;width:78vw;max-width:460px;aspect-ratio:1;transform:translate(-50%,-50%);border:1.5px solid rgba(200,230,60,.22);border-radius:50%;animation:atmen 5.5s ease-in-out infinite;pointer-events:none}
@keyframes atmen{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.55}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}
.held-in{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;max-width:640px;margin:0 auto;width:100%;padding:52px 26px 30px;text-align:center}
.wappen{width:118px;margin:0 auto 20px;filter:drop-shadow(0 14px 34px rgba(0,0,0,.5));border-radius:10px;animation:schweben 6s ease-in-out infinite}
@keyframes schweben{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.eyebrow{font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--signal);display:flex;align-items:center;justify-content:center;gap:10px}
.eyebrow:before,.eyebrow:after{content:"";width:26px;height:2px;background:var(--signal)}
.held h1{font-size:clamp(36px,10.5vw,58px);margin-top:10px}
.held h1 em{font-style:normal;color:var(--signal)}
.held p.sub{margin-top:12px;color:rgba(255,255,255,.72);font-size:15px}
.rollen{margin-top:30px;display:grid;gap:12px;text-align:left}
.rolle-k{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(4px);border-radius:16px;padding:16px 18px;color:#fff;transition:transform .18s ease,background .18s ease}
.rolle-k:active{transform:scale(.975)}
.rolle-k .ic{width:44px;height:44px;border-radius:12px;background:rgba(200,230,60,.14);display:flex;align-items:center;justify-content:center;color:var(--signal);flex-shrink:0}
.rolle-k b{font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:.03em;display:block}
.rolle-k small{color:rgba(255,255,255,.62);font-size:12.5px}
.held .fuss{position:relative;z-index:2;text-align:center;padding:0 26px 30px;font-size:11.5px;color:rgba(255,255,255,.42)}

/* ===== App-Rahmen ===== */
.kopf{background:linear-gradient(160deg,var(--nacht),#12341A);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:40;box-shadow:0 6px 24px rgba(10,31,14,.28)}
.kopf-in{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.kopf img{width:38px;border-radius:6px}
.kopf .tt{flex:1;min-width:0}
.kopf .ey{font-family:'Archivo',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--signal)}
.kopf h1{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:600;flex-shrink:0}
.inhalt{max-width:640px;margin:0 auto;padding:16px 16px 104px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,31,14,.97);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tabbar-in{max-width:640px;margin:0 auto;display:flex}
.tab{flex:1;background:none;border:none;color:rgba(255,255,255,.48);padding:10px 2px 9px;font-family:'Archivo',sans-serif;font-weight:800;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.tab svg{width:21px;height:21px;stroke-width:2}
.tab.aktiv{color:var(--signal)}
.tab .pille{width:18px;height:3px;border-radius:2px;background:transparent;transition:background .2s}
.tab.aktiv .pille{background:var(--signal)}

/* ===== Bausteine ===== */
.karte{background:#fff;border:1px solid var(--linie);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(10,31,14,.04)}
.karte.dunkel{background:linear-gradient(155deg,var(--gd),var(--nacht));border:none;color:#fff;box-shadow:0 10px 30px rgba(10,31,14,.3)}
.sec{font-family:'Archivo',sans-serif;font-weight:900;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--rasen);display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.sec:after{content:"";flex:1;height:1px;background:var(--linie)}
.meta{display:inline-block;background:var(--hell);color:var(--gruen);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:5px;padding:3px 8px;vertical-align:middle}
.meta.sig{background:var(--signal);color:var(--gd)}
.meta.warn{background:#FDF3E3;color:var(--amber)}
.meta.rot{background:#FBE9E7;color:var(--rot)}
.btn{background:var(--gruen);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .15s ease,filter .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45}
.btn.voll{width:100%}
.btn.hell{background:var(--hell);color:var(--gruen)}
.btn.sig{background:var(--signal);color:var(--gd)}
.btn.geist{background:none;border:1.5px solid var(--linie);color:var(--grau)}
.btn.gefahr{background:none;border:1.5px solid #F0C7C0;color:var(--rot)}
.zeile{display:flex;gap:10px}.zeile>*{flex:1}
.hinweis{background:var(--hell);border-left:4px solid var(--rasen);border-radius:0 12px 12px 0;padding:12px 14px;font-size:13px;margin:12px 0}
.leer{text-align:center;padding:36px 16px;color:var(--grau)}
.leer .disp{font-size:16px;color:var(--gd);margin-bottom:6px}
.kachel{display:flex;align-items:center;gap:13px;width:100%;background:#fff;border:1px solid var(--linie);border-radius:16px;padding:15px 16px;text-align:left;margin-bottom:10px;box-shadow:0 2px 10px rgba(10,31,14,.04);transition:transform .15s}
.kachel:active{transform:scale(.98)}
.kachel .ic{width:42px;height:42px;border-radius:11px;background:var(--hell);color:var(--gruen);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kachel b{font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:var(--gd);display:block;text-transform:uppercase;letter-spacing:.02em}
.kachel small{color:var(--grau);font-size:12.5px;display:block;margin-top:1px}
.stat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.stat{background:#fff;border:1px solid var(--linie);border-radius:14px;padding:13px 6px;text-align:center}
.stat b{display:block;font-family:'Archivo',sans-serif;font-weight:900;font-size:25px;color:var(--gd);line-height:1.1}
.stat span{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--grau)}
.balken-w{background:var(--hell);border-radius:6px;height:10px;overflow:hidden}
.balken{height:100%;background:linear-gradient(90deg,var(--rasen),var(--gruen));border-radius:6px;transition:width .7s cubic-bezier(.22,.9,.3,1)}
.lz{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--linie)}
.lz:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;border:1.5px solid var(--linie);background:#fff;border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;margin:0 6px 6px 0;color:var(--grau);transition:all .15s}
.chip.an{background:var(--gd);border-color:var(--gd);color:#fff}
.seg{display:flex;background:var(--hell);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.seg button{flex:1;min-width:70px;border:none;background:none;border-radius:9px;padding:9px 4px;font-family:'Archivo',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--grau);transition:all .2s}
.seg button.an{background:#fff;color:var(--gd);box-shadow:0 2px 8px rgba(10,31,14,.12)}
.rsvp-btns{display:flex;gap:9px}
.rsvp{flex:1;border:1.5px solid var(--linie);background:#fff;border-radius:12px;padding:12px;font-weight:800;font-size:14px;color:var(--grau);transition:all .18s}
.rsvp.ja.an{background:var(--rasen);border-color:var(--rasen);color:#fff;box-shadow:0 4px 14px rgba(62,145,66,.35)}
.rsvp.nein.an{background:var(--rot);border-color:var(--rot);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.3)}
.anw{width:40px;height:40px;border-radius:50%;border:2px solid var(--linie);background:#fff;font-weight:800;color:var(--grau);flex-shrink:0;transition:all .15s}
.anw.da{background:var(--rasen);border-color:var(--rasen);color:#fff}
.anw.fehlt{background:#FBE9E7;border-color:var(--rot);color:var(--rot)}
.typ-training{background:var(--hell);color:var(--gruen)}
.typ-spiel{background:var(--signal);color:var(--gd)}
.typ-turnier{background:#FDF3E3;color:var(--amber)}
.typ-event{background:#EDE7F6;color:#5E35B1}
.jbadge{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:22px;border-radius:6px;padding:0 6px;font-family:'Archivo',sans-serif;font-weight:900;font-size:11px;color:#fff;letter-spacing:.04em}
.monat{font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gd);margin:20px 0 8px;display:flex;align-items:center;gap:10px}
.monat:after{content:"";flex:1;height:1px;background:var(--linie)}
.kal-kopf{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kal-kopf b{font-family:'Archivo',sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:var(--gd)}
.kal-nav{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--linie);background:#fff;font-weight:800;font-size:17px;color:var(--gruen)}
.kal-wt{display:grid;grid-template-columns:repeat(7,1fr);font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--grau);text-transform:uppercase;text-align:center;margin-bottom:5px}
.kal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.kal-tag{aspect-ratio:1;border:1px solid var(--linie);border-radius:9px;background:#fff;font-size:12.5px;font-weight:600;color:var(--tinte);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;gap:2px}
.kal-tag.leer{border:none;background:none}
.kal-tag.ferien{background:#FDF6E8;border-color:#F0DFC0}
.kal-tag.heute{border:2px solid var(--rasen)}
.kal-tag.gewaehlt{background:var(--gd);color:#fff;border-color:var(--gd)}
.kal-punkte{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;padding:0 2px}
.kal-punkt{width:6px;height:6px;border-radius:50%}
.skala{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.skala .sk{width:29px;height:34px;border:1.5px solid var(--linie);border-radius:8px;background:#fff;font-weight:800;font-size:12.5px;color:var(--grau);padding:0}
.skala .sk.an{background:var(--gd);border-color:var(--gd);color:#fff}
.ferienchip{display:inline-block;background:#FDF3E3;border:1px dashed var(--amber);color:var(--amber);border-radius:8px;padding:4px 9px;font-size:11.5px;font-weight:700;margin:0 6px 6px 0}
.pitch{position:relative;background:repeating-linear-gradient(0deg,#2E7D32 0 44px,#2a7530 44px 88px);border-radius:16px;aspect-ratio:3/4;overflow:hidden;border:3px solid var(--gd);box-shadow:inset 0 0 60px rgba(0,0,0,.25)}
.pitch:before{content:"";position:absolute;left:8%;right:8%;top:50%;height:2px;background:rgba(255,255,255,.4)}
.pitch:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:27%;aspect-ratio:1;border:2px solid rgba(255,255,255,.4);border-radius:50%}
.pitch .sr{position:absolute;left:24%;width:52%;height:13%;border:2px solid rgba(255,255,255,.4)}
.pos{position:absolute;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:0}
.pos .kreis{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.13);border:2px dashed rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:11px;color:#fff;transition:all .2s}
.pos.belegt .kreis{background:var(--signal);border:2px solid #fff;color:var(--gd);font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.35)}
.pos .pname{font-size:10px;font-weight:700;color:#fff;background:rgba(10,31,14,.6);border-radius:5px;padding:1px 7px;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-grid{display:grid;grid-template-columns:1fr repeat(3,46px);gap:7px;align-items:center;font-size:13px}
.note-in{width:100%;text-align:center;padding:9px 2px;border:1.5px solid var(--linie);border-radius:9px;font-weight:800}
.phase{position:relative;padding:0 0 24px 30px}
.phase:before{content:"";position:absolute;left:8px;top:8px;bottom:0;width:2px;background:var(--linie)}
.phase:last-child:before{display:none}
.phase .pkt{position:absolute;left:0;top:4px;width:18px;height:18px;border-radius:50%;background:var(--papier);border:3px solid var(--rasen);transition:all .2s}
.phase.offen .pkt{background:var(--signal);border-color:var(--gd)}
.modal-bg{position:fixed;inset:0;background:rgba(10,31,14,.66);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:mb .25s ease}
@keyframes mb{from{opacity:0}}
.modal{background:var(--papier);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 16px calc(22px + env(safe-area-inset-bottom));animation:mh .35s cubic-bezier(.22,.9,.3,1)}
@keyframes mh{from{transform:translateY(60px);opacity:.4}}
.griff{width:42px;height:4px;background:var(--linie);border-radius:2px;margin:0 auto 14px}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:dreh .8s linear infinite;display:inline-block;vertical-align:middle}
.spinner.gruen{border-color:rgba(27,94,32,.25);border-top-color:var(--gruen)}
@keyframes dreh{to{transform:rotate(360deg)}}
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--nacht);color:#fff;border-radius:12px;padding:12px 18px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:all .3s;max-width:88vw;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.35)}
#toast.zeig{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

/* Saisonlogik: Saison startet am 1. August des Startjahres.
   Fuer Saison Y gilt (Beispiel Y=2026):
   A: Jahrgang Y-18/Y-17 · B: Y-16/Y-15 · C: Y-14/Y-13 · D: Y-12/Y-11
   E: Y-10/Y-9 · F: Y-8/Y-7 · Bambini (G): Y-6 und juenger */
var KONF = {saison:2025, ferien:[], pins:{}, links:{advanced:''}, inventar:{klapptore:11,kleinfeldtore:10,grossfeldtore_fest:2,mobile_tore:4,schiris:2}};
function jugendAusJahrgang(jahrgang, startjahr){
  var d = startjahr - jahrgang;

async function api(pfad,opts){
  opts=opts||{};
  var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
  if(opts.prefer)h['Prefer']=opts.prefer;
  var r=await fetch(SUPA+'/rest/v1/'+pfad,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});

}

function sKindAnlegen(){
  $('#app').innerHTML=
  '<div class="screen"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">Elternbereich</div><h1>Spieler anlegen</h1></div><button class="kbtn" id="bZur">Zurück</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div class="karte st st1">'+
    '<div style="font-size:12.5px;color:var(--grau);margin-bottom:8px">Alle Felder sind Pflicht \u2013 die Angaben werden f\u00fcr Spielerpass und Spielberechtigung gebraucht.</div>'+
    '<label>Vorname <span style="color:var(--rot)">*</span></label><input id="fV" autocomplete="off">'+
    '<label>Nachname <span style="color:var(--rot)">*</span></label><input id="fN" autocomplete="off">'+
    '<label>Geburtsdatum <span style="color:var(--rot)">*</span></label><input id="fGeb" type="date">'+
    '<div id="jugendVorschlag"></div>'+
    '<label>Familien-PIN (mind. 4 Zeichen) <span style="color:var(--rot)">*</span></label><input id="fP1" type="password" inputmode="numeric" placeholder="z. B. 4-stellige Zahl">'+
    '<label>PIN wiederholen <span style="color:var(--rot)">*</span></label><input id="fP2" type="password" inputmode="numeric">'+
    '<div class="hinweis">Die PIN gehört eurer Familie – mit ihr öffnet ihr euer Kind auch auf einem zweiten Handy. Bitte merken!</div>'+
    '<button class="btn voll" id="bSpeichern">Spieler anlegen</button>'+
  '</div></main></div>';
  $('#bZur').onclick=function(){zeige(sElternWahl)};
  var gewaehlteJugend=null;
  $('#fGeb').onchange=function(){
    var g=this.value;if(!g){$('#jugendVorschlag').innerHTML='';return}
    var jahrgang=parseInt(g.slice(0,4),10);
    if(!jahrgang||jahrgang<1990||jahrgang>KONF.saison+1){$('#jugendVorschlag').innerHTML='<div class="hinweis" style="border-color:var(--rot)">Bitte ein g\u00fcltiges Geburtsdatum eintragen.</div>';return}
    var natur=jugendAusJahrgang(jahrgang,KONF.saison);
    gewaehlteJugend=natur;
    var idx=jugendIndex(natur);
    var optionen=[natur];
    for(var i=idx+1;i<JUGENDEN.length&&i<=idx+2;i++)optionen.push(JUGENDEN[i].kz);
    $('#jugendVorschlag').innerHTML='<label>Jugend (Jahrgang '+jahrgang+')</label>'+
      '<div id="jWahl">'+optionen.map(function(kz,i){
        var j=jInfo(kz);
        return '<button class="chip'+(i===0?' an':'')+'" data-kz="'+kz+'">'+jBadge(kz)+' '+esc(j.name)+(i===0?' · passend':' · hochgezogen')+'</button>';
      }).join('')+'</div>'+
      '<div style="font-size:12px;color:var(--grau)">Standard ist die zum Jahrgang passende Jugend. „Hochgezogen“ nur wählen, wenn es mit dem Trainer so besprochen ist.</div>';
    $$('#jWahl .chip').forEach(function(c){c.onclick=function(){$$('#jWahl .chip').forEach(function(x){x.classList.remove('an')});c.classList.add('an');gewaehlteJugend=c.getAttribute('data-kz')}});
  };
  $('#bSpeichern').onclick=async function(){
    var v=$('#fV').value.trim(),n=$('#fN').value.trim(),g=$('#fGeb').value,p1=$('#fP1').value,p2=$('#fP2').value;
    if(!v){toast('Bitte den Vornamen eintragen.');$('#fV').focus();return}
    if(!n){toast('Bitte den Nachnamen eintragen.');$('#fN').focus();return}
    if(!g){toast('Bitte das Geburtsdatum eintragen.');$('#fGeb').focus();return}
    var jahrgang=parseInt(g.slice(0,4),10);
    if(!jahrgang||jahrgang<1990||jahrgang>KONF.saison+1){toast('Bitte ein g\u00fcltiges Geburtsdatum eintragen.');$('#fGeb').focus();return}
    if(p1.length<4){toast('Die PIN braucht mindestens 4 Zeichen.');return}
    if(p1!==p2){toast('Die PINs stimmen nicht überein.');return}
    var jugend=gewaehlteJugend||jugendAusJahrgang(jahrgang,KONF.saison);
    this.disabled=true;this.innerHTML='<span class="spinner"></span> Wird angelegt …';
    try{
      var vorhandene=await api('kinder?select=id&vorname=ilike.'+encodeURIComponent(v)+'&nachname=ilike.'+encodeURIComponent(n));
      if(vorhandene.length){toast(v+' '+n+' ist schon angelegt – bitte oben die Jugend wählen.');this.disabled=false;this.textContent='Spieler anlegen';return}
      var hash=await sha256(p1);
      var rows=await api('kinder',{method:'POST',prefer:'return=representation',body:{vorname:v,nachname:n,jahrgang:jahrgang,geburtstag:g,jugend:jugend,pin_hash:hash,beitritt:heute()}});
      var kind=rows[0];
      lsSet('jz_rolle','eltern');lsSet('jz_kind',kind.id);lsSet('jz_kindname',v+' '+n);lsSet('jz_kindjugend',jugend);
      S.rolle='eltern';S.kindId=kind.id;S.kindName=v+' '+n;S.kindJugend=jugend;
      toast('Willkommen in der '+jInfo(jugend).name+', '+v+'! ⚽');
      zeige(sEltern);
    }catch(e){console.error(e);toast('Speichern fehlgeschlagen – bitte Internet prüfen und erneut versuchen.');this.disabled=false;this.textContent='Spieler anlegen'}
  };
}

function sKindOeffnen(vorwahl){
  $('#app').innerHTML=
  '<div class="screen"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">Elternbereich</div><h1>Spieler öffnen</h1></div><button class="kbtn" id="bZur">Zurück</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div id="liste"><div class="leer"><span class="spinner gruen"></span></div></div></main></div>';
  $('#bZur').onclick=function(){zeige(sElternWahl)};
  S.koJugend=vorwahl||S.koJugend||null;
  (async function(){
    try{
      var kinder=await api('kinder?select=id,vorname,nachname,jugend&order=vorname');
      function render(){
        var html='';
        /* Schritt 1: Jugend waehlen */
        html+='<div class="hinweis st st1">Tippt euren Spieler an und \u00f6ffnet ihn mit eurer Familien-PIN.</div>';
        html+='<label>Jugend</label><select id="koJ"><option value="">Bitte w\u00e4hlen \u2026</option>'+JUGENDEN.map(function(j){var n=kinder.filter(function(k){return k.jugend===j.kz}).length;return '<option value="'+j.kz+'"'+(S.koJugend===j.kz?' selected':'')+'>'+esc(j.name)+' ('+n+')</option>'}).join('')+'</select>';
        /* Schritt 2: Kinder der gewaehlten Jugend */
        if(S.koJugend){
          var gr=kinder.filter(function(k){return k.jugend===S.koJugend});
          html+='<div class="sec">'+esc(jInfo(S.koJugend).name)+' \u00b7 '+gr.length+'</div>';
          if(!gr.length)html+='<div class="karte" style="color:var(--grau);font-size:13px">In dieser Jugend ist noch kein Spieler angelegt. Legt euren Spieler unten neu an.</div>';
          gr.forEach(function(k){
            html+='<button class="kachel koKind" data-id="'+k.id+'" data-name="'+esc(k.vorname+' '+k.nachname)+'" data-jugend="'+esc(k.jugend||'')+'"><span class="ic">'+IC.team+'</span><span style="flex:1"><b>'+esc(k.vorname)+' '+esc(k.nachname.charAt(0))+'.</b><small>Mit Familien-PIN \u00f6ffnen</small></span>'+jBadge(k.jugend)+'</button>';
          });
        }
        /* Kinder ohne gueltige Jugend (nur zeigen, wenn keine Jugend gewaehlt) */
        var ohne=kinder.filter(function(k){return !k.jugend||jugendIndex(k.jugend)<0});
        if(!S.koJugend&&ohne.length){
          html+='<div class="sec">Ohne Jugend</div>'+ohne.map(function(k){return '<button class="kachel koKind" data-id="'+k.id+'" data-name="'+esc(k.vorname+' '+k.nachname)+'" data-jugend=""><span class="ic">'+IC.team+'</span><span style="flex:1"><b>'+esc(k.vorname)+' '+esc(k.nachname.charAt(0))+'.</b><small>Mit Familien-PIN \u00f6ffnen</small></span></button>'}).join('');
        }
        /* Schritt 3: ganz unten neu anlegen */
        html+='<div class="sec">Nicht dabei?</div><button class="btn voll" id="koNeu">\uff0b Spieler neu anlegen</button>';
        $('#liste').innerHTML=html;
        $('#koJ').onchange=function(){S.koJugend=this.value||null;render()};
        $('#koNeu').onclick=function(){zeige(sKindAnlegen)};
        $$('#liste .koKind').forEach(function(b){b.onclick=function(){pinAbfrage(b.getAttribute('data-id'),b.getAttribute('data-name'),b.getAttribute('data-jugend'))}});
      }
      render();
    }catch(e){$('#liste').innerHTML='<div class="karte leer">Liste konnte nicht geladen werden – bitte Internet prüfen.</div>'}
  })();
  function pinAbfrage(id,name,jugend){
    var m=document.createElement('div');m.className='modal-bg';
    m.innerHTML='<div class="modal"><div class="griff"></div><div class="disp" style="font-size:18px;color:var(--gd)">Familien-PIN für '+esc(name.split(' ')[0])+'</div>'+
      '<input id="pinEin" type="password" inputmode="numeric" style="margin-top:14px;font-size:22px;text-align:center;letter-spacing:.35em;font-weight:800" placeholder="••••">'+
      '<div id="pinFehler" style="color:var(--rot);font-size:13px;margin-top:8px;display:none">PIN falsch – bitte erneut versuchen.</div>'+
      '<button class="btn voll" id="pinOk" style="margin-top:12px">Öffnen</button>'+
      '<button class="btn geist voll" id="pinAbbr" style="margin-top:8px">Abbrechen</button></div>';
    document.body.appendChild(m);
    $('#pinEin').focus();
    $('#pinAbbr').onclick=function(){m.remove()};
    m.onclick=function(e){if(e.target===m)m.remove()};
    $('#pinOk').onclick=async function(){
      var p=$('#pinEin').value;if(p.length<4){$('#pinFehler').style.display='block';return}
      this.disabled=true;
      try{
        var hash=await sha256(p);
        var rows=await api('kinder?select=id,vorname,nachname,jugend&id=eq.'+id+'&pin_hash=eq.'+hash);
        if(!rows.length){$('#pinFehler').style.display='block';this.disabled=false;return}
        lsSet('jz_rolle','eltern');lsSet('jz_kind',id);lsSet('jz_kindname',name);lsSet('jz_kindjugend',rows[0].jugend||'');
        S.rolle='eltern';S.kindId=id;S.kindName=name;S.kindJugend=rows[0].jugend||'';
        m.remove();zeige(sEltern);
      }catch(e){toast('Verbindung fehlgeschlagen.');this.disabled=false}
    };
  }
}

/* ================= ELTERN: HOME ================= */
async function sEltern(){
  $('#app').innerHTML=
  '<div class="screen fest"><header class="kopf"><div class="kopf-in"><img src="'+LOGO+'"><div class="tt"><div class="ey">'+esc(jInfo(S.kindJugend).name)+' \u00b7 Saison '+saisonName(KONF.saison)+'</div><h1>'+esc(S.kindName.split(' ')[0])+'</h1></div><button class="kbtn" id="bAb">Wechseln</button></div></header>'+
  '<main class="inhalt"><img class="wasser" src="'+LOGO+'"><div id="ehalt"><div class="leer"><span class="spinner gruen"></span></div></div></main>'+
  '<nav class="tabbar"><div class="tabbar-in">'+
    '<button class="tab" data-t="start">'+IC.home+'Start<span class="pille"></span></button>'+
    '<button class="tab" data-t="termine">'+IC.kal+'Termine<span class="pille"></span></button>'+
    '<button class="tab" data-t="vergangen">'+IC.buch+'Bisher<span class="pille"></span></button>'+
    '<button class="tab" data-t="events">'+IC.flag+'Events<span class="pille"></span></button>'+
    '<button class="tab" data-t="shops">'+IC.team+'Shops<span class="pille"></span></button>'+
  '</div></nav></div>';
  $('#bAb').onclick=function(){abmelden()};
  var h=$('#ehalt');
  try{
    var res=await Promise.all([
      api('termine?select=*&order=datum.asc'),
      api('zusagen?select=termin_id,status&kind_id=eq.'+S.kindId),
      api('anwesenheit?select=termin_id,da&kind_id=eq.'+S.kindId),
      api('ziele?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=reihenfolge'),
      api('turniere?select=*&freigegeben=eq.true&freigabe_jl=eq.true&freigabe_al=eq.true&order=datum.asc.nullslast'),
      api('turnier_helferbedarf?select=*'),
      api('turnier_helfer?select=*'),
      api('turnier_dateien?select=*'),
      api('turnier_kategorien?select=turnier_id,jugend,name'),
      api('helfer_anfragen?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&erledigt=eq.false&order=created_at.desc'),
      api('kinder?select=elternsprecher,kassenwart&id=eq.'+S.kindId),
      api('mitteilungen?select=*,mitteilung_antworten(autor,text)&ziel=eq.eltern_jugend&ziel_jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=created_at.desc&limit=20'),
      api('kinder?select=id,vorname,nachname,geburtstag&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&aktiv=is.true'),
      api('waesche?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=created_at.desc'),
      api('anwesenheit?select=termin_id,kind_id,da'),
      api('zusagen?select=termin_id,kind_id,status'),
      api('kasse_eintraege?select=*&jugend=eq.'+encodeURIComponent(S.kindJugend||'')+'&order=datum.desc,created_at.desc&limit=40')
    ]);
    var termine=termineFuer(res[0],S.kindJugend);
    var zus={};res[1].forEach(function(z){zus[z.termin_id]=z.status});
    var anwRows=res[2];
    var kinderJug=res[12]||[], alleZus=res[15]||[];
    var ziele=res[3];
    var tFrei=res[4],tBedarfAll=res[5],tHelferAll=res[6],tDateiAll=res[7],tKatAll=res[8];
    var kz=S.kindJugend;
    /* Turniere, die diese Jugend betreffen */
    function turnierBetrifft(t){
      if(tKatAll.some(function(k){return k.turnier_id===t.id&&k.jugend===kz}))return true;
      if(tBedarfAll.some(function(b){return b.turnier_id===t.id&&(b.jugend===kz||!b.jugend)}))return true;
      if(tDateiAll.some(function(d){return d.turnier_id===t.id&&(d.jugend===kz||!d.jugend)}))return true;
      return false;
    }
    var meineTurniere=tFrei.filter(turnierBetrifft);
    var helferAnfr=res[9]||[];
    var istSprecher=(res[10]&&res[10][0]&&res[10][0].elternsprecher)||false;
    var istKassenwart=(res[10]&&res[10][0]&&res[10][0].kassenwart)||false;
    var elternMit=res[11]||[];
    S.kalJM=S.kalJM||jmVon(heute());S.elTag=S.elTag||heute();
    function terminKarte(t){
      var fer=t.typ!=='event'?inFerien(t.datum):null;
      var st=zus[t.id];
      return '<div class="karte"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="meta typ-'+t.typ+'">'+typName(t.typ)+'</span><span class="meta">'+fmtDat(t.datum)+(t.uhrzeit?' \u00b7 '+esc(t.uhrzeit):'')+'</span>'+(t.typ==='event'&&!t.jugend?'<span class="meta sig">Verein</span>':'')+(fer?'<span class="ferienchip">'+esc(fer)+'</span>':'')+'</div>'+
      '<div class="disp" style="font-size:16.5px;color:var(--gd);margin-top:7px">'+esc(terminTitel(t))+'</div>'+
      (t.ort?'<div style="font-size:12.5px;color:var(--grau);margin-top:2px">\ud83d\udccd '+esc(t.ort)+'</div>':'')+
      '<button class="btn geist voll elWer" data-tid="'+t.id+'" style="margin-top:9px;font-size:12.5px;padding:9px">\ud83d\udc65 Wer ist dabei?</button>'+
      '<div class="elWerBox" data-tid="'+t.id+'" style="display:none;margin-top:8px;padding:9px 11px;background:#F1F5F1;border-radius:9px"></div>'+
      (t.datum>=heute()?(anmeldungZu(t)?'<div class="hinweis" style="margin-top:11px;border-color:var(--amber)">Anmeldung geschlossen'+(st?' \u2013 ihr habt '+(st==='ja'?'zugesagt \u2713':'abgesagt \u2717'):'')+'. \u00c4nderungen bitte direkt beim Trainer melden.</div>':'<div class="rsvp-btns" style="margin-top:11px"><button class="rsvp ja'+(st==='ja'?' an':'')+'" data-tid="'+t.id+'" data-st="ja">\u2713 Zusagen</button><button class="rsvp nein'+(st==='nein'?' an':'')+'" data-tid="'+t.id+'" data-st="nein">\u2717 Absagen</button></div>'):'')+'</div>';
    }
    function render(){
      var tab=S.elTab||'start';
      var ansicht=S.elAnsicht||'liste';
      var kommend=termine.filter(function(t){return t.datum>=heute()});
      var vergangen=termine.filter(function(t){return t.datum<heute()});
      /* Anwesenheitsquote nur ueber bereits stattgefundene Trainings */
      var trVergIds={};vergangen.forEach(function(t){if(t.typ==='training')trVergIds[t.id]=true});
      var trVergangen=Object.keys(trVergIds).length;
      var da=anwRows.filter(function(a){return a.da&&trVergIds[a.termin_id]}).length;
      if(da>trVergangen)da=trVergangen;
      var zugesagt=res[1].filter(function(z){return z.status==='ja'}).length;

      var html=fbBanner();
      /* ---------- Reiter: Start ---------- */
      if(tab==='start'){
      html+=neueTermineHtml(termine);
      /* W\u00e4sche-Anfrage automatisch 2 Tage vor Spiel/Turnier starten */
      try{
        var bald=new Date(heute()+'T12:00:00');bald.setDate(bald.getDate()+2);
        var baldIso=bald.toISOString().slice(0,10);
        var autoSpiele=(termine||[]).filter(function(t){
          return (t.typ==='spiel'||t.typ==='turnier')&&t.jugend===S.kindJugend&&t.datum>=heute()&&t.datum<=baldIso
            &&!(res[13]||[]).some(function(w){return w.termin_id===t.id});
        });
        autoSpiele.forEach(function(sp,asI){
          res[13].push({termin_id:sp.id,jugend:S.kindJugend,status:'offen',id:'neu'+asI});
          api('waesche',{method:'POST',body:{termin_id:sp.id,jugend:S.kindJugend,team:sp.team||null,status:'offen'}}).catch(function(){});
        });
      }catch(e){}
      /* W\u00e4scheliste: nur wenn unser Spieler dabei war und noch nicht dran */
      (function(){
        var alleW=res[13]||[],anwAlle=res[14]||[],zusJa=res[15]||[],kinderJug=res[12]||[];
        var offene=alleW.filter(function(w){return w.status==='offen'});
        if(!offene.length)return;
        offene.forEach(function(w){
          var dabei=kinderJug.filter(function(k){
            return anwAlle.some(function(a){return a.termin_id===w.termin_id&&a.kind_id===k.id&&a.da})
                || zusJa.some(function(z){return z.termin_id===w.termin_id&&z.kind_id===k.id&&z.status==='ja'});
          });
          if(!dabei.some(function(k){return k.id===S.kindId}))return;
          var rot=waescheDran(dabei,alleW);
          var ichDran=rot.dran.some(function(k){return k.id===S.kindId});
          if(!ichDran)return;
          var letzter=rot.dran.length===1;
          var term=(termine||[]).filter(function(x){return x.id===w.termin_id})[0];
          html+='<div class="karte st st1" style="border-left:4px solid '+(letzter?'var(--rot)':'var(--amber)')+'">'+
          '<span class="meta '+(letzter?'rot':'warn')+'">Trikotw\u00e4sche</span>'+
          '<div style="font-size:15px;font-weight:800;color:var(--gd);margin-top:6px">'+(letzter?'Ihr seid als Letzte dran \u2013 diesmal seid ihr mit Waschen an der Reihe.':'Wer w\u00e4scht diesmal?')+'</div>'+
          '<div style="font-size:12.5px;color:var(--grau);margin-top:4px">'+(term?esc(terminTitel(term))+' \u00b7 '+fmtDat(term.datum):'Nach dem letzten Spiel')+
          (letzter?'':' \u00b7 angefragt bei '+rot.dran.length+' Familien, die am seltensten dran waren')+'</div>'+
          '<button class="btn sig voll waNehm" data-id="'+w.id+'" style="margin-top:9px">Wir waschen</button></div>';
        });
      })();
      /* Geburtstage in der Jugend */

function brauchtTeam(kz){return ['F','E','D','C','B','A'].indexOf(kz)>=0}
/* Anmeldung fuer Spiele/Turniere: zu ab dem Vortag oder wenn der Trainer sie schliesst */
function anmeldungZu(t){
  if(t.typ!=='spiel'&&t.typ!=='turnier')return false;
  if(t.anmeldeschluss)return true;
  var vortag=new Date(t.datum+'T12:00:00');vortag.setDate(vortag.getDate()-1);
  return heute()>=vortag.toISOString().slice(0,10);
}

/* ---- Kalender-Export (.ics) mit Merkfunktion je Nutzer ---- */
function icsZeit(datum,uhrzeit,plusMin){
  var teile=(uhrzeit||'17:00').split(':');
  var d=new Date(datum+'T00:00:00');
  d.setHours(parseInt(teile[0],10)||17,parseInt(teile[1],10)||0,0,0);
  if(plusMin)d.setMinutes(d.getMinutes()+plusMin);
  function z(n){return (n<10?'0':'')+n}
  return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'T'+z(d.getHours())+z(d.getMinutes())+'00';
}
function icsEsc(t){return String(t||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n')}
function icsBauen(termine){
  var z=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Spvgg 1910 Warmbronn//Jugend-Zentrale//DE','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  termine.forEach(function(t){
    var dauer=t.typ==='training'?90:(t.typ==='spiel'?120:180);
    z.push('BEGIN:VEVENT');
    z.push('UID:'+t.id+'@jugend-zentrale');
    z.push('DTSTAMP:'+icsZeit(heute(),'12:00'));
    z.push('DTSTART:'+icsZeit(t.datum,t.uhrzeit));
    z.push('DTEND:'+icsZeit(t.datum,t.uhrzeit,dauer));
    z.push('SUMMARY:'+icsEsc(terminTitel(t)+' \u00b7 '+jInfo(t.jugend||'').name));
    if(t.ort)z.push('LOCATION:'+icsEsc(t.ort));
    var bes=[];
    if(t.schwerpunkt)bes.push('Schwerpunkt: '+t.schwerpunkt);
    if(t.trainer_name)bes.push('Trainer: '+t.trainer_name);
    if(bes.length)z.push('DESCRIPTION:'+icsEsc(bes.join('\n')));
    z.push('BEGIN:VALARM','TRIGGER:-PT2H','ACTION:DISPLAY','DESCRIPTION:'+icsEsc(terminTitel(t)),'END:VALARM');
    z.push('END:VEVENT');
  });
  z.push('END:VCALENDAR');
  return z.join('\r\n');
}
function icsSchluessel(){return 'jz_ics_'+(S.trainerId||S.kindId||'anon')}
/* Hinweis auf neue Termine seit dem letzten Besuch (je Nutzer) */
function neueTermineHtml(termine){
  var key='jz_gesehen_'+(S.trainerId||S.kindId||'anon');
  var gesehen=[];try{gesehen=JSON.parse(lsGet(key)||'[]')}catch(e){}
  var kommend=(termine||[]).filter(function(t){return t.datum>=heute()});
  var neu=gesehen.length?kommend.filter(function(t){return gesehen.indexOf(t.id)<0}):[];
  try{lsSet(key,JSON.stringify(kommend.map(function(t){return t.id})))}catch(e){}
  if(!neu.length)return '';
  return '<div class="karte st st1" style="border-left:4px solid var(--signal);background:#FBFDF3;padding:11px 16px">'+
  '<b style="font-size:13.5px;color:var(--gd)">\ud83c\udd95 '+neu.length+' neue'+(neu.length===1?'r Termin':' Termine')+' im Kalender</b>'+
  '<div style="font-size:12px;color:var(--grau);margin-top:3px">'+neu.slice(0,3).map(function(t){return esc(terminTitel(t))+' ('+fmtDat(t.datum)+')'}).join(' \u00b7 ')+(neu.length>3?' \u2026':'')+'</div></div>';

/* ---- Aufbau-Plan: halber Platz mit Stationen aus den \u00dcbungen ---- */
function matSymbol(mk,x,y,groesse){
  var g=groesse||1;
  if(/H\u00fctchen|Stangen/.test(mk))return '<polygon points="'+x+','+(y-4*g)+' '+(x-3.5*g)+','+(y+3*g)+' '+(x+3.5*g)+','+(y+3*g)+'" fill="#D99A2B"/>';
  if(/Minitore/.test(mk))return '<rect x="'+(x-7*g)+'" y="'+(y-3*g)+'" width="'+(14*g)+'" height="'+(5*g)+'" fill="none" stroke="#fff" stroke-width="'+(1.8*g)+'"/>';
  if(/Gro\u00dfe Tore/.test(mk))return '<rect x="'+(x-11*g)+'" y="'+(y-5*g)+'" width="'+(22*g)+'" height="'+(8*g)+'" fill="none" stroke="#fff" stroke-width="'+(2.2*g)+'"/>';
  if(/B\u00e4lle/.test(mk))return '<circle cx="'+x+'" cy="'+y+'" r="'+(3.4*g)+'" fill="#fff" stroke="#0E3B17" stroke-width="1"/>';
  if(/Leibchen/.test(mk))return '<rect x="'+(x-4*g)+'" y="'+(y-4*g)+'" width="'+(8*g)+'" height="'+(8*g)+'" rx="1.5" fill="#C8E63C"/>';
  if(/Teller/.test(mk))return '<circle cx="'+x+'" cy="'+y+'" r="'+(3*g)+'" fill="none" stroke="#D99A2B" stroke-width="'+(1.6*g)+'"/>';
  if(/Koordinationsleiter/.test(mk))return '<g stroke="#fff" stroke-width="1.4" fill="none"><rect x="'+(x-9*g)+'" y="'+(y-3*g)+'" width="'+(18*g)+'" height="'+(6*g)+'"/><line x1="'+(x-3*g)+'" y1="'+(y-3*g)+'" x2="'+(x-3*g)+'" y2="'+(y+3*g)+'"/><line x1="'+(x+3*g)+'" y1="'+(y-3*g)+'" x2="'+(x+3*g)+'" y2="'+(y+3*g)+'"/></g>';
  return '<circle cx="'+x+'" cy="'+y+'" r="'+(2.5*g)+'" fill="#fff"/>';
}
function aufbauPlan(uebungen){
  var W=330,H=230;
  var stationen=uebungen.slice(0,4);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;border-radius:10px">';
  /* Rasen */
  svg+='<defs><linearGradient id="rasenG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E9142"/><stop offset="1" stop-color="#2F7434"/></linearGradient></defs>';
  svg+='<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="url(#rasenG)"/>';
  for(var i=0;i<8;i++){ if(i%2===0)svg+='<rect x="'+(i*W/8)+'" y="0" width="'+(W/8)+'" height="'+H+'" fill="#fff" opacity="0.035"/>'; }
  /* Linien: halber Platz, Mittellinie oben */
  svg+='<rect x="10" y="10" width="'+(W-20)+'" height="'+(H-20)+'" fill="none" stroke="#fff" stroke-width="2" opacity=".85"/>';
  svg+='<line x1="10" y1="10" x2="'+(W-10)+'" y2="10" stroke="#fff" stroke-width="2.5" opacity=".95"/>';
  svg+='<path d="M '+(W/2-26)+' 10 A 26 26 0 0 0 '+(W/2+26)+' 10" fill="none" stroke="#fff" stroke-width="2" opacity=".85"/>';
  svg+='<rect x="'+(W/2-55)+'" y="'+(H-52)+'" width="110" height="42" fill="none" stroke="#fff" stroke-width="2" opacity=".85"/>';
  svg+='<rect x="'+(W/2-26)+'" y="'+(H-10-4)+'" width="52" height="8" fill="none" stroke="#fff" stroke-width="2.5"/>';
  /* Stationen im Raster */
  var pos=[[0.28,0.30],[0.72,0.30],[0.28,0.68],[0.72,0.68]];
  stationen.forEach(function(u,idx){
    var cx=pos[idx][0]*W, cy=pos[idx][1]*H;
    svg+='<rect x="'+(cx-58)+'" y="'+(cy-40)+'" width="116" height="80" rx="8" fill="#0A1F0E" opacity="0.30" stroke="#C8E63C" stroke-width="1.2" stroke-dasharray="4,3"/>';
    svg+='<circle cx="'+(cx-46)+'" cy="'+(cy-30)+'" r="9" fill="#C8E63C"/>';
    svg+='<text x="'+(cx-46)+'" y="'+(cy-26.5)+'" font-size="11" font-weight="800" fill="#0E3B17" text-anchor="middle">'+(idx+1)+'</text>';
    var nm=(u.name||'').length>18?(u.name||'').slice(0,17)+'\u2026':(u.name||'');
    svg+='<text x="'+(cx-32)+'" y="'+(cy-26)+'" font-size="9" font-weight="700" fill="#fff">'+esc(nm)+'</text>';
    var mats=(u.material||[]).slice(0,4);
    mats.forEach(function(mk,mi){
      var mx=cx-36+mi*24, my=cy+12;
      svg+=matSymbol(mk,mx,my,1);
    });
    if(!mats.length)svg+='<text x="'+cx+'" y="'+(cy+15)+'" font-size="8" fill="#E8F2E9" text-anchor="middle" opacity=".8">kein Material</text>';
  });
  svg+='</svg>';
  return svg;
}
function waescheDran(berechtigte, alleWaeschen){
  if(!berechtigte.length)return {dran:[],zaehler:{},min:0};
  var z={};
  berechtigte.forEach(function(k){z[k.id]=0});
  (alleWaeschen||[]).forEach(function(w){
    if(w.kind_id&&z.hasOwnProperty(w.kind_id)&&(w.status==='uebernommen'||w.status==='erledigt'))z[w.kind_id]++;
  });
  var min=Math.min.apply(null,berechtigte.map(function(k){return z[k.id]}));
  var dran=berechtigte.filter(function(k){return z[k.id]===min});
  return {dran:dran,zaehler:z,min:min};
}
function icsHerunterladen(termine,dateiname){
  var kommende=(termine||[]).filter(function(t){return t.datum>=heute()});
  var key=icsSchluessel();
  var schon=[];
  try{schon=JSON.parse(lsGet(key)||'[]')}catch(e){schon=[]}
  var neu=kommende.filter(function(t){return schon.indexOf(t.id)<0});
  if(!neu.length){toast('Keine neuen Termine \u2013 alles schon im Kalender.');return}
  try{
    var blob=new Blob([icsBauen(neu)],{type:'text/calendar;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=dateiname||'termine.ics';
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);a.remove()},1500);
    lsSet(key,JSON.stringify(schon.concat(neu.map(function(t){return t.id}))));
    toast(neu.length+' neue'+(neu.length===1?'r Termin':' Termine')+' \u2013 Datei \u00f6ffnen und in den Kalender \u00fcbernehmen.');
  }catch(e){console.error(e);toast('Kalenderdatei konnte nicht erstellt werden.')}
}

/* Geburtstage im Fenster von -7 bis +7 Tagen */
function geburtstagsFenster(kinder,tage){
  tage=tage||7;
  var heuteD=new Date(heute()+'T12:00:00');
  var aus=[];
  (kinder||[]).forEach(function(k){
    if(!k.geburtstag)return;
    var teile=k.geburtstag.split('-');
    if(teile.length<3)return;
    var m=parseInt(teile[1],10),d=parseInt(teile[2],10);
    [heuteD.getFullYear()-1,heuteD.getFullYear(),heuteD.getFullYear()+1].forEach(function(jahr){
      var gd=new Date(jahr,m-1,d,12,0,0);
      var diff=Math.round((gd-heuteD)/86400000);
      if(diff>=-tage&&diff<=tage){
        aus.push({kind:k,tage:diff,alter:jahr-parseInt(teile[0],10),datum:gd});
      }
    });
  });
  var gesehen={};
  aus=aus.filter(function(x){if(gesehen[x.kind.id])return false;gesehen[x.kind.id]=true;return true});
  aus.sort(function(a,b){return a.tage-b.tage});
  return aus;
}
function gebText(x){
  if(x.tage===0)return 'hat heute Geburtstag';
  if(x.tage===1)return 'hat morgen Geburtstag';
  if(x.tage===-1)return 'hatte gestern Geburtstag';
  if(x.tage>1)return 'in '+x.tage+' Tagen';
  return 'vor '+Math.abs(x.tage)+' Tagen';
}

/* ================= PLATZBELEGUNG ================= */
var PLATZ_VON=15*60, PLATZ_BIS=22*60;
var PLATZ_FARBE={training:'#3E9142',fremd:'#7A6FB0',event:'#D99A2B',heimspiel:'#0E3B17',vermietung:'#B0553E'};
var PLATZ_ART={training:'Training',fremd:'Fremdnutzer',event:'Veranstaltung',heimspiel:'Heimspiel Aktive',vermietung:'Vermietung'};

function pzMin(u){var p=String(u||'').split(':');return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0)}
function pzUhr(m){m=Math.max(0,Math.min(1439,m));var h=Math.floor(m/60);return (h<10?'0':'')+h+':'+((m%60)<10?'0':'')+(m%60)}
function pzHaelfte(h){return h==='a'?'H\u00e4lfte A':(h==='b'?'H\u00e4lfte B':'ganzer Platz')}
/* Winterzeit: Rasen ist von November bis M\u00e4rz meist gesperrt */
function pzWinter(datum){var m=parseInt(String(datum).slice(5,7),10);return m>=11||m<=3}

/* Waagerechter Belegungsbalken f\u00fcr einen Platz an einem Tag */
function pzBalken(bel){
  var spanne=PLATZ_BIS-PLATZ_VON;
  var teile='';
  for(var h=PLATZ_VON;h<=PLATZ_BIS;h+=60){
    var l=(h-PLATZ_VON)/spanne*100;
    teile+='<div style="position:absolute;left:'+l+'%;top:0;bottom:0;width:1px;background:#E2E9E3"></div>';
    if(h<PLATZ_BIS)teile+='<div style="position:absolute;left:'+l+'%;bottom:-15px;font-size:9px;color:var(--grau);transform:translateX(-50%)">'+(h/60)+'</div>';
  }
  bel.forEach(function(b){
    var a=Math.max(PLATZ_VON,pzMin(b.von_zeit)), e=Math.min(PLATZ_BIS,pzMin(b.bis_zeit));
    if(e<=a)return;
    var l=(a-PLATZ_VON)/spanne*100, w=(e-a)/spanne*100;
    var oben=b.haelfte==='b'?'50%':'0';
    var hoehe=(b.haelfte==='a'||b.haelfte==='b')?'50%':'100%';
    teile+='<div title="'+esc(b.titel)+'" style="position:absolute;left:'+l+'%;width:'+w+'%;top:'+oben+';height:'+hoehe+';background:'+(PLATZ_FARBE[b.art]||'#3E9142')+';border-radius:4px;border:1px solid rgba(255,255,255,.5);overflow:hidden;padding:2px 4px;box-sizing:border-box"><span style="font-size:9px;color:#fff;font-weight:700;white-space:nowrap">'+esc(b.jugend||b.titel.slice(0,10))+'</span></div>';
  });
  return '<div style="position:relative;height:44px;background:#F1F5F1;border-radius:6px;margin:4px 0 20px">'+teile+'</div>';
}

function pzWochenStart(iso){var d=new Date(iso+'T12:00:00');var wt=(d.getDay()+6)%7;d.setDate(d.getDate()-wt);return d.toISOString().slice(0,10)}
function pzTagPlus(iso,n){var d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function pzFarbe(b){return b.jugend?jInfo(b.jugend).farbe:(PLATZ_FARBE[b.art]||'#59645B')}
/* Mitte Oktober bis Mitte April: Kunstrasen ist der sinnvolle Standard */
function pzKunstrasenZeit(datum){
  var m=parseInt(String(datum).slice(5,7),10), t=parseInt(String(datum).slice(8,10),10);
  if(m>10||m<4)return true;
  if(m===10&&t>=15)return true;
  if(m===4&&t<=15)return true;
  return false;
}
function pzStandardPlatz(datum){return pzKunstrasenZeit(datum)?'kunstrasen':'rasen'}

/* Eintrag bearbeiten \u2013 Platz, Tag, Zeit, Bereich */
function pzBearbeiten(b, plaetze, fertig){
  var m=document.createElement('div');m.className='modal-bg';
  m.innerHTML='<div class="modal"><div class="griff"></div><span class="meta sig">'+esc(PLATZ_ART[b.art]||b.art)+'</span>'+
  '<div class="disp" style="font-size:17px;color:var(--gd);margin-top:5px">'+esc(b.titel)+'</div>'+
  (b.notiz?'<div style="font-size:11.5px;color:var(--grau);margin-top:3px">'+esc(b.notiz)+'</div>':'')+
  '<label style="margin-top:10px">Platz</label><select id="edPlatz">'+plaetze.map(function(p){return '<option value="'+p.id+'"'+(p.id===b.platz_id?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select>'+
  '<div class="zeile" style="margin-top:8px"><div><label>Tag</label><input id="edDatum" type="date" value="'+esc(b.datum)+'"></div>'+
  '<div><label>Bereich</label><select id="edHaelfte"><option value="a"'+(b.haelfte==='a'?' selected':'')+'>H\u00e4lfte A</option><option value="b"'+(b.haelfte==='b'?' selected':'')+'>H\u00e4lfte B</option><option value="ganz"'+(b.haelfte==='ganz'||!b.haelfte?' selected':'')+'>Ganzer Platz</option></select></div></div>'+
  '<div class="zeile" style="margin-top:8px"><div><label>Von</label><input id="edVon" type="time" value="'+esc(b.von_zeit)+'"></div><div><label>Bis</label><input id="edBis" type="time" value="'+esc(b.bis_zeit)+'"></div></div>'+
  '<label>Bezeichnung</label><input id="edTitel" value="'+esc(b.titel)+'">'+
  '<button class="btn voll" id="edOk" style="margin-top:12px">Speichern</button>'+
  '<button class="btn geist voll" id="edAbbr" style="margin-top:7px">Abbrechen</button></div>';
  document.body.appendChild(m);
  $('#edAbbr').onclick=function(){m.remove()};m.onclick=function(e){if(e.target===m)m.remove()};
  $('#edOk').onclick=async function(){
    var v=$('#edVon').value,bz=$('#edBis').value,ti=$('#edTitel').value.trim();
    if(!v||!bz||pzMin(bz)<=pzMin(v)){toast('Bitte g\u00fcltige Zeiten eintragen.');return}
    if(!ti){toast('Bitte eine Bezeichnung eintragen.');return}
    this.disabled=true;
    try{
      await api('platz_belegung?id=eq.'+b.id,{method:'PATCH',body:{platz_id:$('#edPlatz').value,datum:$('#edDatum').value||b.datum,von_zeit:v,bis_zeit:bz,haelfte:$('#edHaelfte').value,titel:ti}});
      m.remove();toast('Ge\u00e4ndert.');if(fertig)fertig();
    }catch(e){toast('Speichern fehlgeschlagen.');this.disabled=false}
  };
}
function pzKurz(b){
  if(b.jugend)return (b.jugend==='G'?'Bam':b.jugend)+(b.team?' '+b.team.split('-')[1]:'');
  if(b.art==='heimspiel')return /2\./.test(b.titel)?'2. Mschft':'1. Mschft';
  return String(b.titel||'').slice(0,9);
}

/* Wochengitter Montag-Sonntag, 0-24 Uhr in Halbstunden */
function pzGitter(bel, montag){
  var TAGE=['Mo','Di','Mi','Do','Fr','Sa','So'];
  var daten=[];for(var i=0;i<7;i++)daten.push(pzTagPlus(montag,i));
  var proTag={};daten.forEach(function(d){proTag[d]=bel.filter(function(b){return b.datum===d})});

  var h='<div id="pzScroll" style="overflow:auto;max-height:60vh;border:1px solid var(--linie);border-radius:10px;background:#fff">'+
  '<table style="border-collapse:collapse;width:100%;min-width:500px;table-layout:fixed"><thead><tr>'+
  '<th style="position:sticky;top:0;left:0;z-index:4;background:#0E3B17;color:#fff;width:32px;font-size:9px;padding:5px 2px">Uhr</th>';
  daten.forEach(function(d,i){
    var heuteJa=d===heute();
    h+='<th style="position:sticky;top:0;z-index:3;background:'+(heuteJa?'#3E9142':'#0E3B17')+';color:#fff;font-size:10px;padding:5px 2px;font-weight:800">'+TAGE[i]+'<br><span style="font-weight:400;font-size:8.5px;opacity:.85">'+d.slice(8,10)+'.'+d.slice(5,7)+'.</span></th>';
  });
  h+='</tr></thead><tbody>';

  for(var r=0;r<48;r++){
    var von=r*30, bis=von+30;
    var vollStunde=(von%60===0);
    h+='<tr>'+
    '<td style="position:sticky;left:0;z-index:2;background:#F1F5F1;border-top:1px solid '+(vollStunde?'#D2DCD4':'#EAF0EB')+';font-size:8.5px;color:var(--grau);text-align:center;height:14px;padding:0">'+(vollStunde?pzUhr(von):'')+'</td>';
    daten.forEach(function(d){
      var treffer=proTag[d].filter(function(b){return pzMin(b.von_zeit)<bis&&pzMin(b.bis_zeit)>von});
      if(!treffer.length){
        h+='<td style="border-top:1px solid '+(vollStunde?'#D2DCD4':'#EAF0EB')+';border-left:1px solid #EAF0EB;height:14px;padding:0"></td>';
        return;
      }
      var inner=treffer.map(function(b){
        var start=(pzMin(b.von_zeit)>=von&&pzMin(b.von_zeit)<bis);
        return '<span class="pzZelle" data-id="'+b.id+'" style="flex:1;background:'+pzFarbe(b)+';color:#fff;font-size:8px;font-weight:700;line-height:14px;overflow:hidden;white-space:nowrap;text-align:center;cursor:pointer;'+(b.haelfte==='a'||b.haelfte==='b'?'opacity:.82;':'')+'">'+(start?esc(pzKurz(b)):'')+'</span>';
      }).join('');
      h+='<td style="border-top:1px solid '+(vollStunde?'#D2DCD4':'#EAF0EB')+';border-left:1px solid #EAF0EB;height:14px;padding:0"><span style="display:flex;height:14px;gap:1px">'+inner+'</span></td>';
    });
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  return h;
}

async function platzRender(halterId, rolle, woche){
  var h=$(halterId);h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var mo=pzWochenStart(woche||S.platzWoche||heute());S.platzWoche=mo;

    var res=await Promise.all([
      api('plaetze?select=*&order=sortierung'),
      api('platz_belegung?select=*&datum=gte.'+mo+'&datum=lte.'+so+'&order=datum,von_zeit'),
      api('huette_anfragen?select=*&datum=gte.'+mo+'&datum=lte.'+so+'&order=datum')

    var bel=alleBel.filter(function(b){return b.platz_id===pid});

    var html='<div class="karte st st1" style="padding:10px 12px;display:flex;align-items:center;gap:8px">'+

    '<span style="flex:1;text-align:center"><b style="font-size:14.5px;color:var(--gd)">'+fmtDat(mo)+' \u2013 '+fmtDat(so)+'</b><br><span style="font-size:11.5px;color:var(--grau)">'+(mo<=heute()&&heute()<=so?'diese Woche':'Kalenderwoche')+'</span></span>'+
    '<button class="btn geist" id="pzNach" style="padding:8px 12px">\u203a</button></div>'+

      return '<button class="pzWahl'+(p.id===pid?' an':'')+'" data-p="'+p.id+'">'+esc(p.name)+'</button>';
    }).join('')+'</div>';

    if(pzWinter(mo)&&pid==='rasen'){
      html+='<div class="karte st st1" style="border-left:4px solid var(--amber);background:#FDF6E8;padding:10px 13px"><b style="font-size:13px;color:#8a6d3b">\u2744\ufe0f Winterzeit</b>'+
      '<div style="font-size:12px;color:#8a6d3b;margin-top:3px">Der Rasen ist von November bis M\u00e4rz bei Frost und N\u00e4sse oft gesperrt \u2013 plant lieber auf dem Kunstrasen.</div></div>';
    }

    html+='<div class="sec st st2">'+esc(pInfo.name)+(pInfo.huette?' \u00b7 mit H\u00fctte':'')+'</div>';
    html+=pzGitter(bel,mo);

    /* Legende */
    var benutzt=[];bel.forEach(function(b){if(b.jugend&&benutzt.indexOf(b.jugend)<0)benutzt.push(b.jugend)});
    var arten=[];bel.forEach(function(b){if(!b.jugend&&arten.indexOf(b.art)<0)arten.push(b.art)});
    if(benutzt.length||arten.length){
      html+='<div style="display:flex;gap:9px;flex-wrap:wrap;font-size:10.5px;color:var(--grau);margin-top:7px">'+
      benutzt.map(function(k){return '<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+jInfo(k).farbe+';vertical-align:-1px"></span> '+esc(jInfo(k).name)+'</span>'}).join('')+
      arten.map(function(a){return '<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+(PLATZ_FARBE[a]||'#59645B')+';vertical-align:-1px"></span> '+esc(PLATZ_ART[a]||a)+'</span>'}).join('')+'</div>';
    } else {
      html+='<div style="font-size:12.5px;color:var(--grau);margin-top:7px">Diese Woche ist auf dem '+esc(pInfo.name)+' noch nichts eingetragen.</div>';
    }

    /* Huette & Garage: Wochenzeile \u2013 auf einen Blick */
    (function(){
      var TAGE_K=['Mo','Di','Mi','Do','Fr','Sa','So'];
      var RES_Z=[['huette','H\u00fctte'],['garage','Garage/Wagen']];
      var relevant=anfr.filter(function(a){return a.status==='genehmigt'||a.status==='offen'});
      html+='<div class="sec st st2" style="margin-top:14px">H\u00fctte &amp; Garage \u00b7 Woche</div>'+
      '<div class="karte st st2" style="padding:8px 10px;overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:340px;table-layout:fixed"><thead><tr>'+
      '<th style="width:74px;font-size:9.5px;color:var(--grau);text-align:left;padding:3px 4px"></th>';
      for(var i=0;i<7;i++){

        html+=tb.map(function(b){
          var darfWeg=istLeitung||(b.trainer_id&&b.trainer_id===S.trainerId);
          return '<div class="lz" style="padding:6px 0"><span style="font-size:13px;flex:1"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+pzFarbe(b)+';margin-right:6px"></span><b>'+esc(b.titel)+'</b>'+

      }

    }

    /* Eintragen */
    html+='<div class="sec st st4">Platz belegen</div><div class="karte st st4">'+
    '<div class="zeile"><div><label>Tag</label><input id="pzDatum" type="date" value="'+(heute()>=mo&&heute()<=so?heute():mo)+'"></div>'+
    '<div><label>Platz</label><select id="pzPlatz">'+plaetze.map(function(p){return '<option value="'+p.id+'"'+(p.id===pid?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select></div></div>'+
    (pzKunstrasenZeit(heute()>=mo&&heute()<=so?heute():mo)?'<div style="font-size:11.5px;color:var(--amber);margin-top:4px">In dieser Jahreszeit ist der Kunstrasen die sichere Wahl.</div>':'')+
    '<div class="zeile" style="margin-top:8px"><div><label>Von</label><input id="pzVonZ" type="time" value="17:30"></div><div><label>Bis</label><input id="pzBisZ" type="time" value="19:00"></div></div>'+
    '<label style="margin-top:8px">Bereich</label><select id="pzHaelfte"><option value="a">H\u00e4lfte A</option><option value="b">H\u00e4lfte B</option><option value="ganz">Ganzer Platz</option></select>'+
    (istLeitung
      ? '<label>Art</label><select id="pzArt"><option value="fremd">Fremdnutzer (anderer Verein)</option><option value="event">Veranstaltung</option><option value="vermietung">Vermietung</option><option value="heimspiel">Heimspiel Aktive</option><option value="training">Training</option></select>'+
        '<label>Bezeichnung</label><input id="pzTitel" placeholder="z. B. TSV Nachbarort Herren">'

    '<button class="btn voll" id="pzAdd" style="margin-top:10px">Eintragen</button></div>';

    /* Zeitraum auf einen anderen Platz umlegen (nur Leitung) */
    if(istLeitung){
      var wJahr=parseInt(mo.slice(0,4),10);
      var wVon=(parseInt(mo.slice(5,7),10)>=8?wJahr:wJahr-1)+'-10-15';
      var wBis=(parseInt(mo.slice(5,7),10)>=8?wJahr+1:wJahr)+'-04-15';
      html+='<div class="sec st st4">Zeitraum umlegen</div><div class="karte st st4" style="border-left:4px solid var(--signal);background:#FBFDF3">'+
      '<div style="font-size:12.5px;color:var(--grau);margin-bottom:8px">Legt alle Eintr\u00e4ge eines Zeitraums auf einen anderen Platz \u2013 z.\u202fB. die komplette Winterrunde von Mitte Oktober bis Ostern auf den Kunstrasen. Einzeln nachbessern geht danach jederzeit.</div>'+
      '<div class="zeile"><div><label>Von</label><input id="umVon" type="date" value="'+wVon+'"></div><div><label>Bis</label><input id="umBis" type="date" value="'+wBis+'"></div></div>'+
      '<div class="zeile" style="margin-top:8px"><div><label>Von Platz</label><select id="umAlt">'+plaetze.map(function(p){return '<option value="'+p.id+'"'+(p.id==='rasen'?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select></div>'+
      '<div><label>Auf Platz</label><select id="umNeu">'+plaetze.map(function(p){return '<option value="'+p.id+'"'+(p.id==='kunstrasen'?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select></div></div>'+
      '<button class="btn hell voll" id="umGo" style="margin-top:10px">Eintr\u00e4ge umlegen</button></div>';
    }

    /* Huette & Garage/Verkaufswagen */
    var RES_NAME={huette:'H\u00fctte (Rasenplatz)',garage:'Garage / Verkaufswagen'};
    html+='<div class="sec st st5">H\u00fctte &amp; Garage</div>';
    html+='<div class="karte st st5">';
    if(!anfr.length){
      html+='<div style="font-size:13px;color:var(--grau)">In dieser Woche ist nichts angefragt oder belegt.</div>';
    } else {
      html+=anfr.map(function(a){
        var auto=a.entschieden_von==='automatisch';
        var darfWeg=istLeitung||(a.trainer_id&&a.trainer_id===S.trainerId&&a.status==='offen');
        return '<div class="lz" style="padding:8px 0;align-items:flex-start"><span style="font-size:13.5px;flex:1">'+

        '<br><b style="font-size:13.5px">'+esc(a.trainer_name||'\u2013')+'</b> '+(a.jugend?jBadge(a.jugend):'')+
        '<br><span style="font-size:11.5px;color:var(--grau)">'+fmtDat(a.datum)+(a.von_zeit?' \u00b7 '+esc(a.von_zeit)+'\u2013'+esc(a.bis_zeit||''):'')+' \u00b7 '+esc(a.grund||'ohne Angabe')+'</span>'+
        (a.status!=='offen'?'<br><span class="meta '+(a.status==='genehmigt'?'sig':'rot')+'">'+(a.status==='genehmigt'?(auto?'belegt (Heimspiel-Verkauf)':'genehmigt'):'abgelehnt')+(!auto&&a.entschieden_von?' \u00b7 '+esc(a.entschieden_von):'')+'</span>':'<br><span class="meta warn">wartet auf Freigabe</span>')+
        (a.antwort?'<br><span style="font-size:11px;color:var(--grau)">Antwort: '+esc(a.antwort)+'</span>':'')+'</span>'+
        '<span style="display:flex;gap:6px;flex-shrink:0">'+
        (istLeitung&&a.status==='offen'?'<button class="btn hell haJa" data-id="'+a.id+'" style="padding:6px 10px;font-size:12px">Ja</button><button class="btn geist haNein" data-id="'+a.id+'" style="padding:6px 10px;font-size:12px">Nein</button>':'')+
        (darfWeg&&a.status!=='offen'&&auto&&istLeitung?'<button class="haWeg" data-id="'+a.id+'" title="Kein Verkauf \u2013 freigeben" style="background:none;border:1px solid var(--linie);border-radius:8px;padding:4px 8px;font-size:11px;color:var(--rot)">Kein Verkauf \u2715</button>':(darfWeg&&(a.status==='offen'||istLeitung)?'<button class="haWeg" data-id="'+a.id+'" style="background:none;border:none;color:var(--rot);font-size:13px;font-weight:700">\u2715</button>':''))+
        '</span></div>';
      }).join('');
    }
    html+='</div>';

    /* Anfrage stellen (Trainer und Leitung) */
    html+='<div class="karte st st5">'+
    '<div style="font-size:12.5px;color:var(--grau);margin-bottom:8px">'+(istLeitung?'Ressource direkt belegen (gilt sofort als genehmigt).':'H\u00fctte oder Garage anfragen \u2013 Jugend- oder Abteilungsleitung gibt frei. Genehmigte Belegungen sehen alle hier in der Liste.')+'</div>'+
    '<label>Was wird gebraucht?</label><select id="haRes"><option value="huette">H\u00fctte (Rasenplatz)</option><option value="garage">Garage / Verkaufswagen</option></select>'+
    '<div class="zeile" style="margin-top:8px"><div><label>Tag</label><input id="haDatum" type="date" value="'+(heute()>=mo&&heute()<=so?heute():mo)+'"></div><div><label>Von</label><input id="haVon" type="time" value="17:00"></div></div>'+
    '<div class="zeile" style="margin-top:8px"><div><label>Bis</label><input id="haBis" type="time" value="19:30"></div><div><label>Wof\u00fcr?</label><input id="haGrund" placeholder="z. B. Elternabend, Verkauf"></div></div>'+
    '<button class="btn hell voll" id="haAdd" style="margin-top:10px">'+(istLeitung?'Belegung eintragen':'Anfrage senden')+'</button></div>';
    h.innerHTML=html;
    /* Gitter auf den Nachmittag scrollen */
    var sc=$('#pzScroll');if(sc)sc.scrollTop=15*2*14;

    function neu(w){platzRender(halterId,rolle,w)}
    $('#pzVor').onclick=function(){neu(pzTagPlus(mo,-7))};
    $('#pzNach').onclick=function(){neu(pzTagPlus(mo,7))};
    $('#pzHeute').onclick=function(){neu(heute())};
    $$('.pzWahl',h).forEach(function(b){b.onclick=function(){S.platzPlatz=b.getAttribute('data-p');neu(mo)}});

    $$('.haZelle',h).forEach(function(c){c.onclick=function(){
      var a=anfr.filter(function(x){return x.id===c.getAttribute('data-id')})[0];
      if(!a)return;
      var RES_NAME3={huette:'H\u00fctte',garage:'Garage / Verkaufswagen'};
      toast((RES_NAME3[a.ressource]||a.ressource)+' \u00b7 '+fmtDat(a.datum)+(a.von_zeit?' \u00b7 '+a.von_zeit+'\u2013'+(a.bis_zeit||''):'')+' \u00b7 '+(a.trainer_name||'')+(a.status==='offen'?' \u00b7 wartet auf Freigabe':''));
    }});
    $$('.pzZelle',h).forEach(function(c){c.onclick=function(){
      var b=bel.filter(function(x){return x.id===c.getAttribute('data-id')})[0];
      if(!b)return;
      if(istLeitung||(b.trainer_id&&b.trainer_id===S.trainerId))pzBearbeiten(b,plaetze,function(){neu(mo)});
      else toast(b.titel+' \u00b7 '+b.von_zeit+'\u2013'+b.bis_zeit+' Uhr \u00b7 '+pzHaelfte(b.haelfte));
    }});

    $('#pzAdd').onclick=async function(){
      var dat=$('#pzDatum').value, pl=$('#pzPlatz').value, hf=$('#pzHaelfte').value, v=$('#pzVonZ').value, b2=$('#pzBisZ').value;
      if(!dat){toast('Bitte einen Tag w\u00e4hlen.');return}
      if(!v||!b2||pzMin(b2)<=pzMin(v)){toast('Bitte g\u00fcltige Zeiten eintragen.');return}
      var art=istLeitung?$('#pzArt').value:'training';
      var titel=istLeitung?($('#pzTitel').value.trim()):(jInfo(S.trainerJugend).name+(S.trainerTeam?' \u00b7 '+S.trainerTeam:''));
      if(!titel){toast('Bitte eine Bezeichnung eintragen.');return}
      var konflikt=alleBel.filter(function(x){
        if(x.platz_id!==pl||x.datum!==dat)return false;
        if(pzMin(x.bis_zeit)<=pzMin(v)||pzMin(x.von_zeit)>=pzMin(b2))return false;
        if(hf!=='ganz'&&x.haelfte&&x.haelfte!=='ganz'&&x.haelfte!==hf)return false;
        return true;
      });
      if(konflikt.length&&!confirm('Achtung \u2013 \u00fcberschneidet sich mit: '+konflikt.map(function(x){return x.titel+' ('+x.von_zeit+'\u2013'+x.bis_zeit+')'}).join(', ')+'\n\nTrotzdem eintragen?'))return;
      if(pl==='rasen'&&pzWinter(dat)&&!confirm('Der Rasenplatz ist im Winter oft gesperrt. Lieber Kunstrasen?\n\nOK = trotzdem Rasen eintragen'))return;
      this.disabled=true;
      try{
        await api('platz_belegung',{method:'POST',body:{platz_id:pl,datum:dat,von_zeit:v,bis_zeit:b2,titel:titel,art:art,haelfte:hf,
          jugend:istLeitung?null:S.trainerJugend, team:istLeitung?null:(S.trainerTeam||null),
          trainer_id:istLeitung?null:S.trainerId, erstellt_von:istLeitung?(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung'):S.trainerName}});
        toast('Platz eingetragen.');S.platzPlatz=pl;neu(pzWochenStart(dat));
      }catch(e){toast('Eintragen fehlgeschlagen.');this.disabled=false}
    };
    $$('.pzWeg',h).forEach(function(b){b.onclick=async function(){
      if(!confirm('Eintrag entfernen?'))return;
      try{await api('platz_belegung?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});neu(mo)}catch(e){toast('Fehler.')}
    }});
    if($('#umGo'))$('#umGo').onclick=async function(){
      var v=$('#umVon').value, bs=$('#umBis').value, alt=$('#umAlt').value, nu=$('#umNeu').value;
      if(!v||!bs||bs<v){toast('Bitte einen g\u00fcltigen Zeitraum w\u00e4hlen.');return}
      if(alt===nu){toast('Die Pl\u00e4tze sind gleich.');return}
      this.disabled=true;
      try{
        var betroffen=await api('platz_belegung?select=id&platz_id=eq.'+alt+'&datum=gte.'+v+'&datum=lte.'+bs);
        if(!betroffen.length){toast('In dem Zeitraum liegt dort nichts.');this.disabled=false;return}
        if(!confirm(betroffen.length+' Eintr\u00e4ge vom '+fmtDat(v)+' bis '+fmtDat(bs)+' auf den anderen Platz legen?')){this.disabled=false;return}
        await api('platz_belegung?platz_id=eq.'+alt+'&datum=gte.'+v+'&datum=lte.'+bs,{method:'PATCH',body:{platz_id:nu}});
        toast(betroffen.length+' Eintr\u00e4ge umgelegt.');S.platzPlatz=nu;neu(mo);
      }catch(e){console.error(e);toast('Umlegen fehlgeschlagen.');this.disabled=false}
    };
    $$('.pzEdit',h).forEach(function(b){b.onclick=function(){
      var e=alleBel.filter(function(x){return x.id===b.getAttribute('data-id')})[0];
      if(e)pzBearbeiten(e,plaetze,function(){neu(mo)});
    }});
    if($('#haAdd'))$('#haAdd').onclick=async function(){
      var g=$('#haGrund').value.trim(), dat=$('#haDatum').value;
      if(!dat){toast('Bitte einen Tag w\u00e4hlen.');return}
      if(!g){toast('Bitte kurz angeben, wof\u00fcr.');return}
      this.disabled=true;
      /* Ist die Ressource an dem Tag schon vergeben? */
      try{
        var res2=$('#haRes').value, v2=$('#haVon').value, b2=$('#haBis').value;
        var daSchon=await api('huette_anfragen?select=*&ressource=eq.'+res2+'&datum=eq.'+dat+'&status=in.(genehmigt,offen)');
        var ueberlappt=daSchon.filter(function(x){
          if(!v2||!b2||!x.von_zeit||!x.bis_zeit)return true; /* ohne Zeiten: ganzer Tag zaehlt */
          return !(pzMin(x.bis_zeit)<=pzMin(v2)||pzMin(x.von_zeit)>=pzMin(b2));
        });
        var fest=ueberlappt.filter(function(x){return x.status==='genehmigt'});
        if(fest.length){
          var RES_NAME2={huette:'H\u00fctte',garage:'Garage / Verkaufswagen'};
          toast('Bereits belegt: '+(RES_NAME2[res2]||res2)+' am '+fmtDat(dat)+' \u2013 '+esc(fest[0].trainer_name||'')+(fest[0].von_zeit?' ('+fest[0].von_zeit+'\u2013'+(fest[0].bis_zeit||'')+')':''));
          this.disabled=false;return;
        }
        if(ueberlappt.length&&!confirm('F\u00fcr diesen Zeitraum wartet schon eine Anfrage von '+(ueberlappt[0].trainer_name||'jemandem')+'. Trotzdem anfragen?')){this.disabled=false;return}
      }catch(e){/* Pruefung darf das Anfragen nicht verhindern */}
      try{
        await api('huette_anfragen',{method:'POST',body:{
          ressource:$('#haRes').value, datum:dat,
          von_zeit:$('#haVon').value||null, bis_zeit:$('#haBis').value||null,
          jugend:istLeitung?null:S.trainerJugend, team:istLeitung?null:(S.trainerTeam||null),
          trainer_id:istLeitung?null:S.trainerId,
          trainer_name:istLeitung?(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung'):S.trainerName,
          grund:g,
          status:istLeitung?'genehmigt':'offen',
          entschieden_von:istLeitung?(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung'):null
        }});
        toast(istLeitung?'Belegung eingetragen.':'Anfrage ist raus \u2013 die Leitung entscheidet.');neu(pzWochenStart(dat));
      }catch(e){toast('Fehlgeschlagen.');this.disabled=false}
    };
    $$('.haWeg',h).forEach(function(b){b.onclick=async function(){
      if(!confirm('Eintrag entfernen? (z. B. wenn kein Verkauf stattfindet)'))return;
      var aid=b.getAttribute('data-id');
      try{
        await api('huette_anfragen?id=eq.'+aid,{method:'DELETE'});
        await api('termine?quelle_id=eq.'+encodeURIComponent('huette:'+aid),{method:'DELETE'});
        toast('Entfernt.');neu(mo);
      }catch(e){toast('Fehler.')}
    }});
    $$('.haJa',h).forEach(function(b){b.onclick=async function(){
      var aid=b.getAttribute('data-id');
      try{
        await api('huette_anfragen?id=eq.'+aid,{method:'PATCH',body:{status:'genehmigt',entschieden_von:(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung'),entschieden_am:new Date().toISOString()}});
        /* Genehmigte Jugend-Anfrage in den Kalender der Jugend */
        var a=anfr.filter(function(x){return x.id===aid})[0];
        if(a&&a.jugend){
          var RES_NAME2={huette:'H\u00fctte',garage:'Garage/Wagen'};
          var schon=await api('termine?select=id&quelle_id=eq.'+encodeURIComponent('huette:'+aid));
          if(!schon.length){
            await api('termine',{method:'POST',body:{typ:'event',titel:(RES_NAME2[a.ressource]||a.ressource)+': '+(a.grund||'reserviert'),datum:a.datum,uhrzeit:a.von_zeit||null,ort:a.ressource==='garage'?'Garage / Verkaufswagen':'H\u00fctte am Rasenplatz',jugend:a.jugend,team:a.team||null,trainer_name:a.trainer_name||null,quelle_id:'huette:'+aid}});
          }
        }
        toast('Genehmigt \u2013 steht jetzt im Kalender der Jugend.');neu(mo);
      }catch(e){console.error(e);toast('Fehler.')}
    }});
    $$('.haNein',h).forEach(function(b){b.onclick=async function(){
      var g=prompt('Kurze Begr\u00fcndung (optional):','');
      if(g===null)return;
      try{await api('huette_anfragen?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{status:'abgelehnt',antwort:g||null,entschieden_von:(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung'),entschieden_am:new Date().toISOString()}});toast('Abgelehnt.');neu(mo)}catch(e){toast('Fehler.')}
    }});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Platzbelegung konnte nicht geladen werden.</div>'}
}

function tPlatz(){ platzRender('#thalt','trainer',S.platzWoche); }
function jlPlatz(){

/* ================= SOFTWARE-INFOS / \u00c4NDERUNGEN ================= */
function clSchluessel(){return 'jz_cl_'+(S.trainerId||S.kindId||S.fRolle||'anon')}
function clRolle(){
  if(S.trainerId)return 'trainer';
  if(S.kindId)return 'eltern';
  if(S.fRolle==='AL')return 'al';
  if(S.fRolle==='JL')return 'jl';
  if(S.toAn)return 'to';
  return 'eltern';
}
function clKarte(c){
  var punkte=Array.isArray(c.punkte)?c.punkte:[];
  return '<div class="karte" style="padding:13px 16px'+(c.wichtig?';border-left:4px solid var(--signal)':'')+'">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'+
  '<span class="meta sig">Version '+esc(c.version)+'</span><span class="meta">'+fmtDat(c.datum)+'</span></div>'+
  '<b style="font-size:14.5px;color:var(--gd);display:block;margin-top:7px">'+esc(c.titel)+'</b>'+
  (c.text?'<p style="font-size:12.5px;color:var(--grau);margin-top:5px">'+esc(c.text)+'</p>':'')+
  (punkte.length?'<ul style="list-style:none;margin-top:8px">'+punkte.map(function(p){
    return '<li style="padding:3px 0 3px 16px;position:relative;font-size:12.5px;color:var(--gd)"><span style="position:absolute;left:0;color:var(--rasen);font-weight:800">\u203a</span>'+esc(p)+'</li>';
  }).join('')+'</ul>':'')+'</div>';
}
/* Einmaliger Hinweis beim ersten \u00d6ffnen nach einer \u00c4nderung */
async function clPruefen(){
  try{
    var rolle=clRolle();
    var alle=await api('changelog?select=*&order=datum.desc,created_at.desc&limit=10');
    var meine=alle.filter(function(c){return !Array.isArray(c.fuer)||c.fuer.indexOf(rolle)>=0});
    if(!meine.length)return;
    var neuste=meine[0];
    var gesehen=lsGet(clSchluessel());
    if(gesehen===neuste.version)return;
    var m=document.createElement('div');m.className='modal-bg';
    m.innerHTML='<div class="modal"><div class="griff"></div>'+
    '<span class="meta sig">Neu in der Jugend-Zentrale</span>'+
    '<div class="disp" style="font-size:19px;color:var(--gd);margin-top:6px">'+esc(neuste.titel)+'</div>'+
    '<div style="font-size:11.5px;color:var(--grau);margin-top:3px">Version '+esc(neuste.version)+' \u00b7 '+fmtDat(neuste.datum)+'</div>'+
    (neuste.text?'<p style="font-size:13px;color:var(--grau);margin-top:8px">'+esc(neuste.text)+'</p>':'')+
    ((Array.isArray(neuste.punkte)&&neuste.punkte.length)?'<ul style="list-style:none;margin-top:10px;max-height:40vh;overflow:auto">'+neuste.punkte.map(function(p){
      return '<li style="padding:4px 0 4px 17px;position:relative;font-size:13px;color:var(--gd)"><span style="position:absolute;left:0;color:var(--rasen);font-weight:800">\u203a</span>'+esc(p)+'</li>';
    }).join('')+'</ul>':'')+
    '<button class="btn voll" id="clOk" style="margin-top:13px">Verstanden</button>'+
    '<div style="font-size:11px;color:var(--grau);text-align:center;margin-top:7px">Alle \u00c4nderungen findest du jederzeit unter Software-Infos.</div></div>';
    document.body.appendChild(m);
    function weg(){try{lsSet(clSchluessel(),neuste.version)}catch(e){}m.remove()}
    $('#clOk').onclick=weg;
    m.onclick=function(e){if(e.target===m)weg()};
  }catch(e){/* Hinweis darf nie den Start blockieren */}
}
/* Liste aller \u00c4nderungen \u2013 f\u00fcr jeden Einstellungsbereich */
async function clListe(halterId){
  var h=$(halterId);if(!h)return;
  h.innerHTML='<div class="karte" style="color:var(--grau);font-size:13px"><span class="spinner gruen"></span> L\u00e4dt \u2026</div>';
  try{
    var rolle=clRolle();

/* Kompass-Logik: Abdeckung + Notizen-Signale */
function trainingsKompass(termine,tuRows,notizen){
  var zaehler={};KATEGORIEN.forEach(function(k){zaehler[k]=0});
  var terminIds={};termine.forEach(function(t){terminIds[t.id]=true});
  tuRows.forEach(function(r){
    if(!terminIds[r.termin_id]||!r.uebungen)return;
    (r.uebungen.kategorien||[]).forEach(function(k){if(k in zaehler)zaehler[k]++});
  });
  var werte=Object.keys(zaehler).map(function(k){return zaehler[k]});
  var max=Math.max.apply(null,[1].concat(werte));
  var summe=werte.reduce(function(a,b){return a+b},0);
  var notizText=notizen.map(function(n){return (n.text||'')+' '+(n.kategorie||'')}).join(' ');
  var tipps=[];
  KATEGORIEN.forEach(function(k){
    var n=zaehler[k];
    var kw=null;for(var i=0;i<KEYWORDS.length;i++)if(KEYWORDS[i][0]===k)kw=KEYWORDS[i][1];
    var notizTreffer=kw?(notizText.match(new RegExp(kw.source,'gi'))||[]).length:0;
    if(summe>=3&&n===0)tipps.push({kat:k,grund:'In den geplanten Trainings bisher gar nicht abgedeckt.',stufe:notizTreffer?'hoch':'mittel',score:3+notizTreffer});
    else if(summe>=5&&n<=max*0.25&&notizTreffer)tipps.push({kat:k,grund:'Wenig trainiert und '+notizTreffer+'× in Notizen aufgefallen.',stufe:'hoch',score:2+notizTreffer});
    else if(notizTreffer>=2&&n<=max*0.5)tipps.push({kat:k,grund:notizTreffer+'× in euren Notizen erwähnt – lohnt einen Schwerpunkt.',stufe:'mittel',score:notizTreffer});
  });
  tipps.sort(function(a,b){return b.score-a.score});
  return {zaehler:zaehler,max:max,summe:summe,tipps:tipps};
}

async function tTermine(){
  var h=$('#thalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var kz=S.trainerJugend;
  try{
    var res=await Promise.all([api('termine?select=*&order=datum.desc,uhrzeit.desc'),api('zusagen?select=termin_id,status'),api('anwesenheit?select=termin_id,da')]);
    var alleJugend=termineFuer(res[0],kz);
    var termine=S.trainerTeam?alleJugend.filter(function(t){return !t.team||t.team===S.trainerTeam}):alleJugend;
    var zus=res[1],anw=res[2];
    S.kalJM=S.kalJM||jmVon(heute());S.trTag=S.trTag||heute();
    function zeile(t){
      var ja=zus.filter(function(z){return z.termin_id===t.id&&z.status==='ja'}).length;
      var nein=zus.filter(function(z){return z.termin_id===t.id&&z.status==='nein'}).length;
      var da=anw.filter(function(a){return a.termin_id===t.id&&a.da}).length;
