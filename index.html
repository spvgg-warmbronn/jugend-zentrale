      return '<button class="kachel" data-tid="'+t.id+'"><span class="ic">'+(t.typ==='training'?IC.cone:(t.typ==='event'?IC.stern:IC.ball))+'</span><span style="flex:1"><span class="meta typ-'+t.typ+'" style="float:right">'+typName(t.typ)+'</span><b>'+esc(terminTitel(t))+'</b><small>'+fmtDat(t.datum)+(t.uhrzeit?' \u00b7 '+esc(t.uhrzeit):'')+' \u00b7 \u2713 '+ja+' \u00b7 \u2717 '+nein+(da?' \u00b7 '+da+' da':'')+(t.serie_id?' \u00b7 Serie':'')+(t.team?' \u00b7 '+esc(t.team):'')+(fremd?' \u00b7 Jugendleitung':'')+'</small></span></button>';
    }
    function render(){
      var ansicht=S.trAnsicht||'liste';
      var html='<div class="zeile st st1"><button class="btn" id="bNeuT">\uff0b Termin</button><button class="btn hell" id="bSerie">\u27f3 Trainings-Serie</button></div><div id="formNeu"></div>'+
      '<button class="btn geist voll st st1" id="bIcs" style="margin-top:8px">\ud83d\udcc5 Termine in meinen Kalender</button>';
      html+='<div class="seg" style="margin-top:12px"><button id="aL" class="'+(ansicht==='liste'?'an':'')+'">Liste</button><button id="aM" class="'+(ansicht==='monat'?'an':'')+'">Monatskalender</button></div>';
      if(ansicht==='monat'){
        html+='<div class="karte">'+kalenderHtml(S.kalJM,termine,typFarbe,S.trTag)+'</div><div id="kalTag">'+kalTagListe(termine,S.trTag,null,true)+'</div>';
      } else {
        var kommend=termine.filter(function(t){return t.datum>=heute()}).sort(function(a,b){return a.datum<b.datum?-1:1});
        var vergangen=termine.filter(function(t){return t.datum<heute()});
        html+='<div class="sec">Kommend</div>';
        if(!kommend.length)html+='<div class="karte leer"><div class="disp">Nichts geplant</div>Leg oben einen Termin oder gleich eine ganze Trainings-Serie an.</div>';
        var letzterMonat='';
        kommend.forEach(function(t){var mon=fmtMonat(t.datum);if(mon!==letzterMonat){html+='<div class="monat">'+esc(mon)+'</div>';letzterMonat=mon}html+=zeile(t)});
        if(vergangen.length){html+='<div class="sec">Vergangen</div>'+vergangen.map(zeile).join('')}
      }
      h.innerHTML=html;
      $('#bNeuT').onclick=function(){neuTerminForm()};
      if($('#bIcs'))$('#bIcs').onclick=function(){icsDialog(termine,'termine-'+(S.trainerJugend||'jugend').toLowerCase()+'.ics')};
      $('#bSerie').onclick=function(){serieForm()};
      $('#aL').onclick=function(){S.trAnsicht='liste';render()};
      $('#aM').onclick=function(){S.trAnsicht='monat';render()};
      if((S.trAnsicht||'liste')==='monat'){
        $('#kalZur').onclick=function(){S.kalJM=jmPlus(S.kalJM,-1);render()};
        $('#kalVor').onclick=function(){S.kalJM=jmPlus(S.kalJM,1);render()};
        $$('.kal-tag[data-datum]',h).forEach(function(b){b.onclick=function(){S.trTag=b.getAttribute('data-datum');render()}});
      }
      $$('[data-tid]',h).forEach(function(b){b.onclick=function(){terminDetail(b.getAttribute('data-tid'))}});
    }
    render();
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Termine konnten nicht geladen werden.</div>'}
}

/* Dauerauftrag: woechentliches Training bis Saisonende, Ferien werden uebersprungen */
function serieForm(){
  var f=$('#formNeu');
  var ferienListe=KONF.ferien.map(function(x){return '<span class="ferienchip">'+esc(x.name)+'</span>'}).join('');
  f.innerHTML='<div class="karte" style="margin-top:12px"><span class="meta sig">Trainings-Serie</span>'+
    '<p style="font-size:13px;color:var(--grau);margin-top:6px">Legt jede Woche automatisch ein Training an – bis zum Saisonende ('+fmtDat(saisonEnde(KONF.saison))+'). Termine in den Ferien werden übersprungen:</p>'+
    '<div style="margin-top:8px">'+ferienListe+'</div>'+
    '<div class="zeile"><div><label>Wochentag</label><select id="sW">'+[1,2,3,4,5,6,0].map(function(w){return '<option value="'+w+'">'+WOCHENTAGE[w]+'</option>'}).join('')+'</select></div>'+
    '<div><label>Uhrzeit</label><input id="sU" type="time" value="17:30"></div></div>'+
    '<div class="zeile"><div><label>Ab Datum</label><input id="sV" type="date" value="'+heute()+'"></div>'+
    '<div><label>Bis (Standard: Saisonende)</label><input id="sB" type="date" value="'+saisonEnde(KONF.saison)+'"></div></div>'+
    '<label>Schwerpunkt (optional, für alle)</label><input id="sS" placeholder="leer lassen und später pro Woche eintragen">'+
    '<div id="sVorschau" style="margin-top:10px"></div>'+
    '<div class="zeile" style="margin-top:12px"><button class="btn geist" id="sAbbr">Abbrechen</button><button class="btn" id="sOk">Serie anlegen</button></div></div>';
  function daten(){
    var w=parseInt($('#sW').value,10),von=$('#sV').value,bis=$('#sB').value;
    var aus=[],uebersprungen=0;
    var d=new Date(von+'T12:00:00');
    while(d.getDay()!==w)d.setDate(d.getDate()+1);
    while(true){
      var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(iso>bis)break;
      if(inFerien(iso))uebersprungen++;else aus.push(iso);
      d.setDate(d.getDate()+7);
      if(aus.length+uebersprungen>120)break;
    }
    return {termine:aus,uebersprungen:uebersprungen};
  }
  function vorschau(){var x=daten();$('#sVorschau').innerHTML='<div class="hinweis">'+x.termine.length+' Trainings werden angelegt · '+x.uebersprungen+' Ferienwochen übersprungen.</div>'}
  vorschau();
  ['sW','sV','sB'].forEach(function(id){$('#'+id).onchange=vorschau});
  $('#sAbbr').onclick=function(){f.innerHTML=''};
  $('#sOk').onclick=async function(){
    var x=daten();if(!x.termine.length){toast('Kein Termin im Zeitraum.');return}
    this.disabled=true;this.innerHTML='<span class="spinner"></span> Lege '+x.termine.length+' Trainings an …';
    var sid=uuid(),uhr=$('#sU').value,schwer=$('#sS').value.trim()||null;
    var rows=x.termine.map(function(iso){return {typ:'training',datum:iso,uhrzeit:uhr,schwerpunkt:schwer,jugend:S.trainerJugend,team:S.trainerTeam||null,serie_id:sid,trainer_name:S.trainerName}});
    try{await api('termine',{method:'POST',body:rows});toast(x.termine.length+' Trainings angelegt. ⚽');tTermine()}
    catch(e){console.error(e);toast('Serie konnte nicht angelegt werden.');this.disabled=false;this.textContent='Serie anlegen'}
  };
}

      api('zusagen?select=kind_id,status,grund&termin_id=eq.'+id),

      api('notizen?select=*&termin_id=eq.'+id+'&order=created_at.desc'),
      api('termin_uebungen?select=uebung_id,uebungen(id,name,kategorien,material,pdf_pfad,video_url)&termin_id=eq.'+id),
      api('uebungen?select=id,name,kategorien,schwerpunkte,beschreibung,material,pdf_pfad,video_url&order=name'),

      api('notizen?select=kind_id,text,kategorie,created_at&order=created_at.desc'),
      api('helfer_anfragen?select=*&termin_id=eq.'+id+'&order=created_at'),
      api('termine?select=id,datum,team,schwerpunkt,trainer_name,typ&jugend=eq.'+kz+'&typ=eq.training&order=datum'),
      api('uebung_bewertungen?select=uebung_id,wert,team&jugend=eq.'+kz),
      api('waesche?select=*&jugend=eq.'+kz+'&order=created_at.desc')
    ]);
    var t=res[0][0];if(!t){toast('Termin nicht gefunden.');tTermine();return}
    var fremd=t.typ==='event'&&!t.jugend;
    var kinder=res[1],zus={},anw={};
    res[2].forEach(function(z){zus[z.kind_id]=z.status});
    var absageGrund={};res[2].forEach(function(z){if(z.status==='nein'&&z.grund)absageGrund[z.kind_id]=z.grund});

/* ---------- Trainer: Übungen + Kompass + PDF-Analyse ---------- */
async function tUebungen(){
  var h=$('#thalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  var kz=S.trainerJugend;
  try{
    var res=await Promise.all([
      api('uebungen?select=*&order=created_at.desc'),
      api('termin_uebungen?select=termin_id,uebung_id,uebungen(kategorien)'),
      api('termine?select=*'),
      api('notizen?select=text,kategorie,created_at&order=created_at.desc&limit=60'),
      api('uebung_bewertungen?select=uebung_id,wert,team&jugend=eq.'+kz)
    ]);
    var uebungen=res[0];
    var meineTermine=termineFuer(res[2],kz);
    var meineIds={};meineTermine.forEach(function(t){meineIds[t.id]=true});
    var nutz={};res[1].forEach(function(r){if(meineIds[r.termin_id])nutz[r.uebung_id]=(nutz[r.uebung_id]||0)+1});
    var kompass=trainingsKompass(meineTermine,res[1],res[3]);
    var zaehler=kompass.zaehler,maxZ=kompass.max;
    var bewMap={};var bewTeam={};res[4].forEach(function(b){(bewMap[b.uebung_id]=bewMap[b.uebung_id]||[]).push(b.wert);var tm=b.team||'ganze Jugend';(bewTeam[b.uebung_id]=bewTeam[b.uebung_id]||{});(bewTeam[b.uebung_id][tm]=bewTeam[b.uebung_id][tm]||[]).push(b.wert)});
    function uAvg(uid){var a=bewMap[uid];if(!a||!a.length)return null;var su=0;a.forEach(function(x){su+=x});return su/a.length}
    function uTeamText(uid){var g=bewTeam[uid];if(!g)return '';return Object.keys(g).map(function(tm){var arr=g[tm];var su=0;arr.forEach(function(x){su+=x});return tm+': ★ '+noteFmt(su/arr.length)+' ('+arr.length+')'}).join(' · ')}
    var tn=meineTermine.filter(function(t){return t.typ==='training'&&t.training_note});
    var tnAvg=null;if(tn.length){var su=0;tn.forEach(function(t){su+=t.training_note});tnAvg=su/tn.length}

    var html='<div class="karte dunkel st st1"><span class="meta sig">Advance Football → App</span>'+
    '<div class="disp" style="font-size:17px;margin-top:8px">Übungs-PDF hochladen &amp; automatisch auswerten</div>'+
    '<p style="font-size:13px;color:rgba(255,255,255,.75);margin-top:6px">Die App liest Ablauf, Coaching-Punkte, Variationen und Anpassungen aus der PDF, erkennt Kategorien und speichert alles fürs ganze Trainerteam – jugendübergreifend. Neue Trainer sehen so sofort, was sich bewährt hat.</p>'+
    '<label class="btn sig voll" style="margin-top:12px;position:relative;overflow:hidden" id="upLbl">PDF auswählen'+
    '<input type="file" id="pdfIn" accept="application/pdf" style="position:absolute;inset:0;opacity:0"></label>'+
    '<button class="btn voll" id="manuellBtn" style="margin-top:8px;background:rgba(255,255,255,.1);color:#fff">Übung von Hand anlegen</button></div>';

    /* Schnellzugriff auf Advanced Football */
    var afLink=(KONF.links&&KONF.links.advanced)||'';
    html+='<button class="kachel st st1" id="afBtn" style="width:100%;text-align:left;cursor:pointer;border:1px solid var(--linie)">'+
    '<span class="ic" style="background:#eaf5ec;color:var(--gd)">'+IC.cone+'</span>'+
    '<span style="flex:1"><b>Advanced Football öffnen</b><small>'+(afLink?'Trainingsplanung – öffnet in einem neuen Fenster':'Noch kein Link hinterlegt – antippen und einmal eintragen')+'</small></span><span style="color:var(--rasen);font-weight:800">›</span></button>'+
    '<div style="font-size:11.5px;color:var(--grau);margin:6px 0 4px">Dort das Übungs-PDF herunterladen und hier oben hochladen. Video-Links kannst du bei jeder Übung hinterlegen.</div>';

    /* Nachtragen der Video-Links aus bereits hochgeladenen PDFs */
    var ohneVideo=uebungen.filter(function(u){return u.pdf_pfad&&!u.video_url});
    if(ohneVideo.length){
      html+='<div class="karte st st1" style="border-left:4px solid var(--amber)">'+
      '<b style="font-size:14px;color:var(--gd)">Video-Links nachtragen</b>'+
      '<div style="font-size:12.5px;color:var(--grau);margin-top:5px">Bei '+ohneVideo.length+' \u00dcbung'+(ohneVideo.length===1?'':'en')+' ist noch kein Video hinterlegt. Die App kann den Link automatisch aus dem QR-Code der bereits hochgeladenen PDFs holen.</div>'+
      '<button class="btn hell voll" id="vidNach" style="margin-top:9px">Links aus den PDFs auslesen</button></div>';

      html+='<div class="sec st st2">Kompass · Vorschläge für die nächsten Wochen</div><div class="karte st st2">'+
      kompass.tipps.slice(0,4).map(function(t){
        var passende=uebungen.filter(function(u){return (u.kategorien||[]).indexOf(t.kat)>=0}).slice(0,2);
        return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;gap:8px"><b style="font-size:14px">'+esc(t.kat)+'</b><span class="meta '+(t.stufe==='hoch'?'rot':'warn')+'">'+(t.stufe==='hoch'?'Priorität':'Empfohlen')+'</span></div>'+
        '<div style="font-size:12.5px;color:var(--grau)">'+esc(t.grund)+'</div>'+

      }).join('')+'</div>';
    }

    var top=[],flop=[];
    uebungen.forEach(function(u){
      var a=uAvg(u.id),n=(bewMap[u.id]||[]).length;
      if(a==null||n<2)return;

/* PDF im Browser lesen und in Abschnitte zerlegen (Advance-Football-Layout) */
async function pdfAnalysieren(file){
  var buf=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:buf}).promise;
  var seite=await pdf.getPage(1);
  var tc=await seite.getTextContent();
  /* Video-Link finden: 1. eingebettete Verkn\u00fcpfung, 2. Klartext-URL, 3. QR-Code */
  var videoUrl=await linkAusPdf(seite,tc);
  var items=tc.items.map(function(i){return {str:(i.str||'').trim(),x:i.transform[4],y:i.transform[5]}}).filter(function(i){return i.str});
  items=items.filter(function(i){return !/©|copyright|urheberrecht|vervielfältigung|schadensersatz|abgemahnt|strafbar|urhg|bleiben\s*vorbehalten|advance\.?football gmbh/i.test(i.str)});
  var SEK=/^(ABLAUF|COACHING|VARIATIONEN|ANPASSUNGEN|ORGANISATION|ZIELE?)$/i;
  var header=items.filter(function(i){return SEK.test(i.str)});
  var maxHy=header.length?Math.max.apply(null,header.map(function(h){return h.y})):-1;
  var titelItems=items.filter(function(i){return i.y>maxHy+2&&!SEK.test(i.str)&&!/advance\.?football/i.test(i.str)});
  titelItems.sort(function(a,b){return b.y-a.y||a.x-b.x});
  var titelZeilen=zeilen(titelItems);
  var name=titelZeilen[0]||file.name.replace(/\.pdf$/i,'');
  var untertitel=titelZeilen[1]||'';
  var cluster=[];
  header.forEach(function(hd){
    var c=cluster.find(function(c){return Math.abs(c.x-hd.x)<60});
    if(c){c.h.push(hd)}else{cluster.push({x:hd.x,h:[hd]})}
  });
  cluster.sort(function(a,b){return a.x-b.x});
  var grenzen=cluster.map(function(c,i){
    var links=i===0?-1e9:(cluster[i-1].x+c.x)/2;
    var rechts=i===cluster.length-1?1e9:(c.x+cluster[i+1].x)/2;
    return {links:links,rechts:rechts,c:c};
  });
  var sektionen={};
  items.forEach(function(it){
    if(SEK.test(it.str))return;
    var g=grenzen.find(function(g){return it.x>=g.links&&it.x<g.rechts});
    if(!g)return;
    var kandidaten=g.c.h.filter(function(hd){return hd.y>it.y});
    if(!kandidaten.length)return;
    kandidaten.sort(function(a,b){return a.y-b.y});
    var hd=kandidaten[0];
    var key=hd.str.toUpperCase();
    (sektionen[key]=sektionen[key]||[]).push(it);
  });
  function zeilen(arr){
    var out=[];var akt=[];var letztY=null;
    arr.slice().sort(function(a,b){return b.y-a.y||a.x-b.x}).forEach(function(i){
      if(letztY===null||Math.abs(i.y-letztY)<4.5){akt.push(i.str)}
      else{out.push(akt.join(' '));akt=[i.str]}
      letztY=i.y;
    });
    if(akt.length)out.push(akt.join(' '));
    return out.map(function(z){return z.replace(/\s+/g,' ').trim()}).filter(Boolean);
  }
  function block(key){return sektionen[key]?zeilen(sektionen[key]).join('\n'):''}
  var ablauf=block('ABLAUF'),coaching=block('COACHING'),variationen=block('VARIATIONEN'),anpassungen=block('ANPASSUNGEN');
  var orga=block('ORGANISATION');if(orga)ablauf=(orga+'\n'+ablauf).trim();
  var ziele=block('ZIELE')||block('ZIEL');
  var gesamt=[name,untertitel,ablauf,coaching,variationen,anpassungen,ziele].join('\n');
  var treffer=[];
  KEYWORDS.forEach(function(kw){
    var m=gesamt.match(new RegExp(kw[1].source,'gi'));
    if(m)treffer.push({k:kw[0],n:m.length});
  });
  treffer.sort(function(a,b){return b.n-a.n});
  var kategorien=treffer.slice(0,3).map(function(t){return t.k});
  var schwerpunkte=coaching.split('\n').map(function(z){return z.replace(/^[►▶\-–\s]+/,'').trim()}).filter(Boolean).slice(0,4);
  var beschreibung=(untertitel?untertitel+'. ':'')+(ziele?ziele.split('\n').join(' '):'');
  var material=materialAusText(gesamt);
  return {name:name,kategorien:kategorien,beschreibung:beschreibung.trim(),schwerpunkte:schwerpunkte,ablauf:ablauf,coaching:coaching,variationen:variationen,anpassungen:anpassungen,material:material,video_url:videoUrl};
}

/* L\u00e4dt den QR-Leser nur bei Bedarf, mit mehreren Quellen als R\u00fcckfallebene */
var jsqrLade=null;
function ladeJsQR(){
  if(window.jsQR)return Promise.resolve(true);
  if(jsqrLade)return jsqrLade;
  var quellen=['https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js','https://unpkg.com/jsqr@1.4.0/dist/jsQR.js','https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js'];
  jsqrLade=new Promise(function(fertig){
    var i=0;
    (function weiter(){
      if(window.jsQR)return fertig(true);
      if(i>=quellen.length)return fertig(false);
      var sc=document.createElement('script');
      sc.src=quellen[i++];
      sc.onload=function(){fertig(!!window.jsQR)};
      sc.onerror=weiter;
      document.head.appendChild(sc);
    })();
  });
  return jsqrLade;
}

/* Holt den Video-Link aus einer PDF-Seite: Verkn\u00fcpfung > Klartext > QR-Code */
async function linkAusPdf(seite,tc){
  function brauchbar(u){
    if(!u||!/^https?:\/\//i.test(u))return false;
    if(/adobe\.com|acrobat|w3\.org|fontawesome|schema\.org/i.test(u))return false;
    return true;
  }
  /* 1. Eingebettete Verkn\u00fcpfungen (Advance Football legt den Link hinter den QR-Code) */
  try{
    var anns=await seite.getAnnotations();
    for(var i=0;i<anns.length;i++){
      var a=anns[i];
      var u=a.url||a.unsafeUrl||(a.A&&a.A.URI)||null;
      if(brauchbar(u))return u;
    }
  }catch(e){}
  /* 2. URL im sichtbaren Text */
  try{
    var txt=(tc.items||[]).map(function(i){return i.str||''}).join(' ');
    var m=txt.match(/https?:\/\/[^\s)"'<>]+/);
    if(m&&brauchbar(m[0]))return m[0].replace(/[.,;]+$/,'');
  }catch(e){}
  /* 3. QR-Code aus dem Seitenbild lesen */
  try{
    var da=await ladeJsQR();
    if(!da||!window.jsQR)return null;
    var vp=seite.getViewport({scale:2});
    var cv=document.createElement('canvas');
    cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
    await seite.render({canvasContext:ctx,viewport:vp}).promise;
    var bild=ctx.getImageData(0,0,cv.width,cv.height);
    var qr=jsQR(bild.data,bild.width,bild.height,{inversionAttempts:'attemptBoth'});
    if(qr&&brauchbar(qr.data))return qr.data.trim();
  }catch(e){}
  return null;
}

  '<label>Name der Übung</label><input id="uN" value="'+esc(u.name)+'">'+
  '<label>Kategorien (antippen)</label><div id="uK">'+KATEGORIEN.map(function(k){return '<button class="chip'+(u.kategorien.indexOf(k)>=0?' an':'')+'" data-k="'+esc(k)+'">'+esc(k)+'</button>'}).join('')+'</div>'+
  '<label>Wofür ist die Übung gut? (Beschreibung)</label><textarea id="uB" rows="2">'+esc(u.beschreibung)+'</textarea>'+

/* Übersichtskalender über alle Jugenden */
async function jlKalender(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var alle=await api('termine?select=*&order=datum.asc,uhrzeit.asc');
    S.kalJM=S.kalJM||jmVon(heute());S.jlTag=S.jlTag||heute();
    function badge(t){return t.jugend?jBadge(t.jugend):(Array.isArray(t.jugenden)?t.jugenden.map(jBadge).join(' '):'')}
    function farbe(t){return t.jugend?jInfo(t.jugend).farbe:'#5E35B1'}
    function render(){
      var filter=S.jlFilter||'alle';
      var ansicht=S.jlAnsicht||'monat';
      var sicht=alle.filter(function(t){
        if(filter==='alle')return true;
        return t.jugend===filter||(t.typ==='event'&&!t.jugend&&Array.isArray(t.jugenden)&&t.jugenden.indexOf(filter)>=0);
      });
      var html=fbBanner()+'<div class="seg"><button id="aM" class="'+(ansicht==='monat'?'an':'')+'">Monatskalender</button><button id="aL" class="'+(ansicht==='liste'?'an':'')+'">Liste</button></div>';
      html+='<div id="jlFilter" style="margin-bottom:4px"><button class="chip'+(filter==='alle'?' an':'')+'" data-f="alle">Alle</button>'+JUGENDEN.map(function(j){
        return '<button class="chip'+(filter===j.kz?' an':'')+'" data-f="'+j.kz+'">'+esc(j.kz==='G'?'Bambini':j.name)+'</button>';
      }).join('')+'</div>';
      if(ansicht==='monat'){
        html+='<div class="karte">'+kalenderHtml(S.kalJM,sicht,farbe,S.jlTag)+'</div><div id="kalTag">'+kalTagListe(sicht,S.jlTag,badge,false)+'</div>';
      } else {
        var kommend=sicht.filter(function(t){return t.datum>=heute()});
        if(!kommend.length)html+='<div class="karte leer"><div class="disp">Nichts geplant</div>Für diese Auswahl stehen keine Termine an.</div>';
        var letzterMonat='';
        kommend.forEach(function(t){
          var mon=fmtMonat(t.datum);
          if(mon!==letzterMonat){html+='<div class="monat">'+esc(mon)+'</div>';letzterMonat=mon}
          var fer=inFerien(t.datum);
          html+='<div class="karte" style="padding:12px 16px"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+badge(t)+'<span class="meta typ-'+t.typ+'">'+typName(t.typ)+'</span><span class="meta">'+fmtDat(t.datum)+(t.uhrzeit?' · '+esc(t.uhrzeit):'')+'</span>'+(fer?'<span class="ferienchip">'+esc(fer)+'</span>':'')+'</div>'+
          '<b style="font-size:14.5px;display:block;margin-top:5px">'+esc(terminTitel(t))+'</b>'+(t.ort?'<span style="font-size:12.5px;color:var(--grau)">\ud83d\udccd '+esc(t.ort)+'</span>':'')+'</div>';
        });
      }
      h.innerHTML=html;
      $('#aM').onclick=function(){S.jlAnsicht='monat';render()};
      $('#aL').onclick=function(){S.jlAnsicht='liste';render()};
      $$('#jlFilter .chip').forEach(function(c){c.onclick=function(){S.jlFilter=c.getAttribute('data-f');render()}});
      if((S.jlAnsicht||'monat')==='monat'){
        $('#kalZur').onclick=function(){S.kalJM=jmPlus(S.kalJM,-1);render()};
        $('#kalVor').onclick=function(){S.kalJM=jmPlus(S.kalJM,1);render()};
        $$('.kal-tag[data-datum]',h).forEach(function(b){b.onclick=function(){S.jlTag=b.getAttribute('data-datum');render()}});
      }
    }
    render();
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Kalender konnte nicht geladen werden.</div>'}
}

/* Aufgaben-Board + Postfach der Trainer */
async function jlAufgaben(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var res=await Promise.all([
      api('aufgaben?select=*&order=status.asc,faellig.asc.nullslast,created_at.desc'),
      api('nachrichten?select=*&order=created_at.desc')
    ]);
    var aufgaben=res[0], nachrichten=res[1];
    var offeneMsg=nachrichten.filter(function(n){return !n.erledigt});
    S.aufFilter=S.aufFilter||'alle';

    var html='<div class="seg st st1" id="aufTabs"><button data-x="board" class="'+((S.aufView||'board')==='board'?'an':'')+'">Aufgaben</button><button data-x="post" class="'+(S.aufView==='post'?'an':'')+'">Postfach'+(offeneMsg.length?' \u00b7 '+offeneMsg.length:'')+'</button><button data-x="senden" class="'+(S.aufView==='senden'?'an':'')+'">Anfragen</button></div>';
    html+='<div id="aufInhalt"></div>';
    h.innerHTML=html;
    $$('#aufTabs button').forEach(function(b){b.onclick=function(){S.aufView=b.getAttribute('data-x');jlAufgaben()}});

    var box=$('#aufInhalt');
    if((S.aufView||'board')==='board'){
      var f=S.aufFilter;
      var sicht=aufgaben.filter(function(a){return f==='alle'?true:(f==='gesamt'?!a.jugend:a.jugend===f)});
      var offen=sicht.filter(function(a){return a.status!=='erledigt'});
      var fertig=sicht.filter(function(a){return a.status==='erledigt'});
      var vorhanden={};aufgaben.forEach(function(a){if(a.quelle&&a.quelle.indexOf('wfv:')===0)vorhanden[a.quelle]=true});
      var monat=new Date().getMonth()+1;
      var vorschlag=WFV_VORSCHLAEGE.filter(function(v){return (v.monat===monat||v.monat===(monat%12)+1)&&!vorhanden['wfv:'+v.titel]});

      var bh='<button class="btn voll" id="bNeuAuf">\uff0b Neue Aufgabe</button><div id="formAuf"></div>';
      bh+='<div id="aufFilter" style="margin:10px 0 4px"><button class="chip'+(f==='alle'?' an':'')+'" data-f="alle">Alle</button><button class="chip'+(f==='gesamt'?' an':'')+'" data-f="gesamt">Verein gesamt</button>'+JUGENDEN.map(function(j){return '<button class="chip'+(f===j.kz?' an':'')+'" data-f="'+j.kz+'">'+esc(j.kz==='G'?'Bambini':j.name)+'</button>'}).join('')+'</div>';

      if(vorschlag.length){
        bh+='<div class="karte st st1" style="border-left:4px solid var(--amber)"><span class="meta warn">Saison-Vorschlag \u00b7 Orientierung wfv-Vereinsjahr</span>';
        vorschlag.forEach(function(v){
          bh+='<div class="lz"><span style="font-size:13.5px"><b>'+esc(v.titel)+'</b><br><span style="font-size:12px;color:var(--grau)">'+esc(v.hinweis)+'</span></span><button class="btn sig vAdd" data-t="'+esc(v.titel)+'" data-d="'+esc(v.hinweis)+'">\u00dcbernehmen</button></div>';
        });
        bh+='</div>';
      }

      bh+='<div class="sec">Offen \u00b7 '+offen.length+'</div>';
      if(!offen.length)bh+='<div class="karte leer"><div class="disp">Nichts offen</div>Neue Aufgabe anlegen oder einen Saison-Vorschlag \u00fcbernehmen.</div>';
      offen.forEach(function(a){bh+=aufKarte(a)});
      if(fertig.length){bh+='<div class="sec">Erledigt \u00b7 '+fertig.length+'</div>';fertig.forEach(function(a){bh+=aufKarte(a)})}
      box.innerHTML=bh;

      $('#bNeuAuf').onclick=function(){aufForm(null)};
      $$('#aufFilter .chip').forEach(function(c){c.onclick=function(){S.aufFilter=c.getAttribute('data-f');jlAufgaben()}});
      $$('.vAdd',box).forEach(function(b){b.onclick=async function(){
        try{await api('aufgaben',{method:'POST',body:{titel:b.getAttribute('data-t'),details:b.getAttribute('data-d'),quelle:'wfv:'+b.getAttribute('data-t')}});toast('Als Aufgabe \u00fcbernommen.');jlAufgaben()}catch(e){toast('Fehler.')}
      }});
      bindAufKarten(box);
    } else {
      var ph='<div class="hinweis">W\u00fcnsche &amp; Anregungen aus dem Trainerteam. Du kannst antworten, erledigen \u2013 oder mit einem Tipp in eine Aufgabe umwandeln.</div>';
      var offenP=nachrichten.filter(function(n){return !n.erledigt});
      var fertigP=nachrichten.filter(function(n){return n.erledigt});
      ph+='<div class="sec">Offen \u00b7 '+offenP.length+'</div>';
      if(!offenP.length)ph+='<div class="karte leer"><div class="disp">Nichts offen</div>Aktuell keine unbearbeiteten Anliegen.</div>';
      ph+=offenP.map(postKarte).join('');
      if(fertigP.length)ph+='<div class="sec">Erledigt \u00b7 '+fertigP.length+'</div>'+fertigP.map(postKarte).join('');
      box.innerHTML=ph;
      bindPost(box);
    }
    if(S.aufView==='senden'){
      var absender=(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung');
      var sh='<div class="hinweis">Sende eine Anfrage oder Info an das Trainerteam. Trainer sehen sie in ihrem Postfach und k\u00f6nnen antworten.</div>'+
      '<div class="karte"><label>Empf\u00e4nger</label><select id="snZiel"><option value="alle_trainer">Alle Trainer</option>'+JUGENDEN.map(function(j){return '<option value="TR:'+j.kz+'">Nur Trainer '+esc(j.name)+'</option>'}).join('')+'</select>'+
      '<label>Betreff</label><input id="snTitel" placeholder="z. B. R\u00fcckmeldung Hallenzeiten">'+
      '<label>Nachricht (optional)</label><textarea id="snText" rows="3"></textarea>'+
      '<button class="btn voll" id="snSend" style="margin-top:10px">Anfrage senden</button></div>';
      /* eigene gesendete Mitteilungen */
      var meine=(await api('mitteilungen?select=*,mitteilung_antworten(autor,text,created_at)&von_rolle=eq.'+encodeURIComponent(absender)+'&order=created_at.desc&limit=20').catch(function(){return[]}));
      if(meine.length){
        sh+='<div class="sec">Gesendet</div>';
        meine.forEach(function(m){
          var ant=(m.mitteilung_antworten||[]);
          sh+='<div class="karte" style="padding:13px 16px"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="meta sig">'+(m.ziel==='trainer_jugend'?esc(jInfo(m.ziel_jugend).name):'alle Trainer')+'</span><span style="font-size:11px;color:var(--grau)">'+fmtDat((m.created_at||'').slice(0,10))+'</span></div>'+
          '<div style="font-size:14px;font-weight:600;margin-top:5px">'+esc(m.titel)+'</div>'+(m.text?'<p style="font-size:12.5px;color:var(--grau);margin-top:3px">'+esc(m.text)+'</p>':'')+
          (ant.length?'<div style="margin-top:8px;border-top:1px solid var(--linie);padding-top:6px">'+ant.map(function(a){return '<div style="font-size:12.5px;margin-bottom:4px"><b>'+esc(a.autor||'?')+':</b> '+esc(a.text)+'</div>'}).join('')+'</div>':'<div style="font-size:11.5px;color:var(--grau);margin-top:6px">Noch keine Antwort</div>')+
          '<button class="snWeg btn geist" data-id="'+m.id+'" style="margin-top:8px;padding:6px 12px;font-size:12px">L\u00f6schen</button></div>';
        });
      }
      box.innerHTML=sh;
      $('#snSend').onclick=async function(){
        var titel=$('#snTitel').value.trim();if(!titel){toast('Bitte Betreff eintragen.');return}
        var z=$('#snZiel').value;var ziel='alle_trainer',zj=null;
        if(z.indexOf('TR:')===0){ziel='trainer_jugend';zj=z.slice(3)}
        this.disabled=true;
        try{await api('mitteilungen',{method:'POST',body:{von_rolle:absender,von_name:absender,ziel:ziel,ziel_jugend:zj,titel:titel,text:$('#snText').value.trim()||null}});toast('Anfrage gesendet.');jlAufgaben()}
        catch(e){toast('Senden fehlgeschlagen.');this.disabled=false}
      };
      $$('.snWeg',box).forEach(function(b){b.onclick=async function(){if(!confirm('Mitteilung l\u00f6schen?'))return;try{await api('mitteilungen?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});jlAufgaben()}catch(e){toast('Fehler.')}}});
    }
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Aufgaben konnten nicht geladen werden.</div>'}
}
function aufKarte(a){
  var fael=a.faellig?fmtDat(a.faellig):null;
  var spaet=a.faellig&&a.faellig<heute()&&a.status!=='erledigt';
  return '<div class="karte"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+
    (a.jugend?jBadge(a.jugend):'<span class="meta">Verein</span>')+(fael?'<span class="meta '+(spaet?'rot':'')+'">bis '+fael+'</span>':'')+(a.quelle&&a.quelle.indexOf('wfv:')===0?'<span class="meta warn">wfv</span>':'')+(a.quelle&&a.quelle.indexOf('post:')===0?'<span class="meta sig">aus Postfach</span>':'')+'</div>'+
    '<button class="aWeg" data-id="'+a.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button></div>'+
    '<div class="disp" style="font-size:15.5px;color:var(--gd);margin-top:7px'+(a.status==='erledigt'?';text-decoration:line-through;opacity:.6':'')+'">'+esc(a.titel)+'</div>'+
    (a.details?'<p style="font-size:13px;color:var(--grau);margin-top:4px">'+esc(a.details)+'</p>':'')+
    '<div class="zeile" style="margin-top:10px"><button class="btn '+(a.status==='erledigt'?'geist':'sig')+' aFertig" data-id="'+a.id+'" data-z="'+(a.status==='erledigt'?'offen':'erledigt')+'">'+(a.status==='erledigt'?'Wieder \u00f6ffnen':'Erledigt \u2713')+'</button><button class="btn geist aEdit" data-id="'+a.id+'">Bearbeiten</button></div></div>';
}
function bindAufKarten(box){
  $$('.aFertig',box).forEach(function(b){b.onclick=async function(){
    var z=b.getAttribute('data-z');
    try{await api('aufgaben?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{status:z,erledigt_am:z==='erledigt'?new Date().toISOString():null}});jlAufgaben()}catch(e){toast('Fehler.')}
  }});
  $$('.aWeg',box).forEach(function(b){b.onclick=async function(){if(!confirm('Aufgabe l\u00f6schen?'))return;try{await api('aufgaben?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});jlAufgaben()}catch(e){toast('Fehler.')}}});
  $$('.aEdit',box).forEach(function(b){b.onclick=async function(){
    try{var r=await api('aufgaben?select=*&id=eq.'+b.getAttribute('data-id'));aufForm(r[0])}catch(e){toast('Fehler.')}
  }});
}
function aufForm(a){
  var f=$('#formAuf');if(!f){return}
  f.innerHTML='<div class="karte" style="margin-top:10px"><label>Titel</label><input id="afT" value="'+esc(a?a.titel:'')+'" placeholder="z. B. Hallenzeiten anfragen">'+
  '<label>Details (optional)</label><textarea id="afD" rows="2">'+esc(a?a.details:'')+'</textarea>'+
  '<div class="zeile"><div><label>F\u00fcr</label><select id="afJ"><option value="">Verein gesamt</option>'+JUGENDEN.map(function(j){return '<option value="'+j.kz+'"'+(a&&a.jugend===j.kz?' selected':'')+'>'+esc(j.name)+'</option>'}).join('')+'</select></div>'+
  '<div><label>F\u00e4llig bis (optional)</label><input id="afF" type="date" value="'+esc(a&&a.faellig?a.faellig:'')+'"></div></div>'+
  '<div class="zeile" style="margin-top:12px"><button class="btn geist" id="afAbbr">Abbrechen</button><button class="btn" id="afOk">Speichern</button></div></div>';
  $('#afAbbr').onclick=function(){f.innerHTML=''};
  $('#afOk').onclick=async function(){
    var titel=$('#afT').value.trim();if(!titel){toast('Bitte Titel eintragen.');return}
    var body={titel:titel,details:$('#afD').value.trim()||null,jugend:$('#afJ').value||null,faellig:$('#afF').value||null};
    this.disabled=true;
    try{
      if(a)await api('aufgaben?id=eq.'+a.id,{method:'PATCH',body:body});
      else await api('aufgaben',{method:'POST',body:body});
      toast('Gespeichert.');jlAufgaben();
    }catch(e){toast('Speichern fehlgeschlagen.');this.disabled=false}
  };
}
function postKarte(n){
  return '<div class="karte"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+(n.jugend?jBadge(n.jugend):'')+'<b style="font-size:13.5px">'+esc(n.trainer_name||'Trainer')+'</b><span style="font-size:11.5px;color:var(--grau)">'+fmtDat((n.created_at||'').slice(0,10))+'</span>'+(n.erledigt?'<span class="meta">erledigt</span>':'<span class="meta warn">offen</span>')+'</div>'+
  '<button class="pWeg" data-id="'+n.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button></div>'+
  '<p style="font-size:14px;margin-top:8px">'+esc(n.text)+'</p>'+
  '<textarea class="pAnt" data-id="'+n.id+'" rows="2" placeholder="Kurze Antwort an das Trainerteam \u2026" style="margin-top:8px">'+esc(n.antwort||'')+'</textarea>'+
  '<div class="zeile" style="margin-top:8px"><button class="btn hell pSpeich" data-id="'+n.id+'">Antwort</button><button class="btn geist pAufg" data-id="'+n.id+'" data-t="'+esc(n.text)+'" data-j="'+esc(n.jugend||'')+'">\u2192 Aufgabe</button><button class="btn '+(n.erledigt?'geist':'sig')+' pFertig" data-id="'+n.id+'" data-z="'+(n.erledigt?'0':'1')+'">'+(n.erledigt?'\u00d6ffnen':'Erledigt \u2713')+'</button></div></div>';
}
function bindPost(box){
  $$('.pSpeich',box).forEach(function(b){b.onclick=async function(){
    var id=b.getAttribute('data-id');var ta=$('.pAnt[data-id="'+id+'"]',box);
    try{await api('nachrichten?id=eq.'+id,{method:'PATCH',body:{antwort:ta.value.trim()||null}});toast('Antwort gespeichert.')}catch(e){toast('Fehler.')}
  }});
  $$('.pFertig',box).forEach(function(b){b.onclick=async function(){
    try{await api('nachrichten?id=eq.'+b.getAttribute('data-id'),{method:'PATCH',body:{erledigt:b.getAttribute('data-z')==='1'}});jlAufgaben()}catch(e){toast('Fehler.')}
  }});
  $$('.pAufg',box).forEach(function(b){b.onclick=async function(){
    try{await api('aufgaben',{method:'POST',body:{titel:b.getAttribute('data-t').slice(0,120),jugend:b.getAttribute('data-j')||null,quelle:'post:'+b.getAttribute('data-id')}});toast('In Aufgaben \u00fcbernommen.');S.aufView='board';jlAufgaben()}catch(e){toast('Fehler.')}
  }});
  $$('.pWeg',box).forEach(function(b){b.onclick=async function(){if(!confirm('Anliegen l\u00f6schen?'))return;try{await api('nachrichten?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});jlAufgaben()}catch(e){toast('Fehler.')}}});
}
/* Turniere-Uebersicht fuer die Jugendleitung */
async function jlTurniere(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var res=await Promise.all([
      api('turniere?select=*&order=datum.asc.nullslast,created_at.desc'),
      api('turnier_kategorien?select=turnier_id,name,jugend,mannschaften'),
      api('turnier_helferbedarf?select=id,turnier_id,jugend,aufgabe,plaetze'),
      api('turnier_helfer?select=bedarf_id,turnier_id,name')
    ]);
    var turniere=res[0],kats=res[1],bedarf=res[2],helfer=res[3];
    var kommend=turniere.filter(function(t){return t.status!=='archiv'&&(!t.datum||t.datum>=heute())});
    var html='<div class="hinweis st st1">Tippe ein Turnier an, um Details zu sehen und der Turnierleitung \u00c4nderungen vorzuschlagen (sie best\u00e4tigt oder lehnt sie ab).</div>';
    if(!kommend.length)html+='<div class="karte leer st st1"><div class="disp">Keine Turniere geplant</div>Die Turnierorganisation legt Turniere im eigenen Bereich an.</div>';
    kommend.forEach(function(t){
      var tk=kats.filter(function(k){return k.turnier_id===t.id});
      var tb=bedarf.filter(function(b){return b.turnier_id===t.id});
      var th=helfer.filter(function(x){return x.turnier_id===t.id});
      var plaetze=tb.reduce(function(a,b){return a+(b.plaetze||0)},0);
      html+='<button class="karte jlTk st st1" data-id="'+t.id+'" style="width:100%;text-align:left;cursor:pointer;border:none"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><b style="font-size:16px;color:var(--gd)">'+esc(t.name)+'</b><span class="meta '+(t.freigegeben?'sig':'warn')+'">'+(t.freigegeben?'freigegeben':'in Planung')+'</span></div>'+
      '<div style="font-size:13px;color:var(--grau);margin-top:5px">'+(t.datum?fmtDat(t.datum):'Datum offen')+(t.von_zeit?' \u00b7 '+esc(t.von_zeit)+' Uhr':'')+(t.ort?' \u00b7 '+esc(t.ort):'')+'</div>'+
      (tk.length?'<div style="margin-top:8px;font-size:13px">'+tk.map(function(k){return (k.jugend?jBadge(k.jugend):'<span class="meta">'+esc(k.name)+'</span>')+(k.mannschaften?' <span style="color:var(--grau)">'+k.mannschaften+'</span>':'')}).join(' ')+'</div>':'')+
      '<div class="lz" style="margin-top:8px"><span style="font-size:13px">Helfer eingetragen</span><b>'+th.length+' / '+plaetze+' \u203a</b></div></button>';
    });
    var archiv=turniere.filter(function(t){return t.status==='archiv'||(t.datum&&t.datum<heute())});
    if(archiv.length){
      html+='<div class="sec">Vergangene \u00b7 '+archiv.length+'</div>';
      archiv.forEach(function(t){
        html+='<button class="karte jlTk" data-id="'+t.id+'" style="width:100%;text-align:left;cursor:pointer;padding:12px 16px"><b style="font-size:14px">'+esc(t.name)+'</b> <span class="meta">'+(t.datum?fmtDat(t.datum):'')+'</span>'+
        (t.nb_teilnehmer||t.nb_umsatz||t.nb_mannschaften?'<div style="font-size:12.5px;color:var(--grau);margin-top:4px">'+(t.nb_mannschaften?t.nb_mannschaften+' Mannschaften \u00b7 ':'')+(t.nb_teilnehmer?'~'+t.nb_teilnehmer+' Teilnehmer \u00b7 ':'')+(t.nb_umsatz?'Umsatz '+esc(t.nb_umsatz):'')+'</div>':'')+
        (t.nb_text?'<p style="font-size:13px;margin-top:6px">'+esc(t.nb_text)+'</p>':'')+'</button>';
      });
    }
    h.innerHTML=html;
    $$('.jlTk',h).forEach(function(b){b.onclick=function(){jlTurnierDetail(b.getAttribute('data-id'))}});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Turniere konnten nicht geladen werden.</div>'}
}
/* JL/AL: Turnier-Detail ansehen + Aenderungen vorschlagen */
async function jlTurnierDetail(id){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var res=await Promise.all([
      api('turniere?select=*&id=eq.'+id),
      api('turnier_kategorien?select=*&turnier_id=eq.'+id+'&order=sortier,created_at'),
      api('turnier_helferbedarf?select=*&turnier_id=eq.'+id+'&order=created_at'),
      api('turnier_helfer?select=*&turnier_id=eq.'+id),
      api('turnier_vorschlaege?select=*&turnier_id=eq.'+id+'&order=created_at.desc'),
      api('turnier_punkte?select=*&turnier_id=eq.'+id+'&order=created_at.desc')
    ]);
    var t=res[0][0];if(!t){jlTurniere();return}
    var kats=res[1],bedarf=res[2],helfer=res[3],vorschlaege=res[4],punkte=res[5];
    var absender=(S.fRolle==='AL'?'Abteilungsleitung':'Jugendleitung');

    var html='<button class="btn geist st st1" id="bZur">'+IC.zurueck+' Alle Turniere</button>';
    html+='<div class="karte st st1" style="margin-top:12px"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><div class="disp" style="font-size:20px;color:var(--gd)">'+esc(t.name)+'</div><span class="meta '+(t.freigegeben?'sig':'warn')+'">'+(t.freigegeben?'freigegeben':'in Planung')+'</span></div>'+
    '<div style="font-size:13px;color:var(--grau);margin-top:6px">'+(t.datum?'\ud83d\udcc5 '+fmtDat(t.datum):'Datum offen')+(t.von_zeit?' \u00b7 '+esc(t.von_zeit)+(t.bis_zeit?'\u2013'+esc(t.bis_zeit):'')+' Uhr':'')+(t.ort?' \u00b7 \ud83d\udccd '+esc(t.ort):'')+'</div>'+
    '<div class="stat-g" style="margin-top:12px"><div class="stat"><b>'+(t.spielfelder||'\u2013')+'</b><span>Spielfelder</span></div><div class="stat"><b>'+(t.teams_geplant||'\u2013')+'</b><span>Teams</span></div><div class="stat"><b>'+kats.length+'</b><span>Kategorien</span></div></div>'+
    (t.benoetigt?'<div style="font-size:13px;margin-top:10px"><b>Ben\u00f6tigt:</b> <span style="color:var(--grau)">'+esc(t.benoetigt)+'</span></div>':'')+'</div>';

    /* Freigabe: Jugendleitung UND Abteilungsleitung muessen bestaetigen */
    if(t.freigegeben){
      var meinFeld=(S.fRolle==='AL')?'freigabe_al':'freigabe_jl';
      var meineFrei=!!t[meinFeld];
      var beide=t.freigabe_jl&&t.freigabe_al;
      html+='<div class="karte st st1" style="'+(beide?'background:#0E3B17;color:#fff;border:none':'border-left:4px solid var(--amber);background:#FDF6E8')+'">'+

    '<label>Bereich</label><select id="vsBereich"><option>Eckdaten</option><option>Kategorien</option><option>Helfer</option><option>Allgemein</option></select>'+
    '<label>Dein Vorschlag</label><textarea id="vsText" rows="3" placeholder="z. B. Anstoss lieber 9:30 statt 9:00"></textarea>'+

    if(vorschlaege.length){
      html+=vorschlaege.map(function(v){
        var farbe=v.status==='angenommen'?'sig':(v.status==='abgelehnt'?'rot':'warn');
        var label=v.status==='angenommen'?'angenommen':(v.status==='abgelehnt'?'abgelehnt':'wartet');
        return '<div class="karte" style="padding:12px 16px"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div style="flex:1"><span class="meta">'+esc(v.bereich||'Allgemein')+'</span> <span class="meta '+farbe+'">'+label+'</span><div style="font-size:13.5px;margin-top:5px">'+esc(v.text)+'</div>'+(v.antwort?'<div style="font-size:12px;color:var(--grau);margin-top:4px">Antwort: '+esc(v.antwort)+'</div>':'')+'<div style="font-size:11px;color:var(--grau);margin-top:3px">'+esc(v.von_name||v.von_rolle||'')+'</div></div>'+(v.status==='offen'?'<button class="vsWeg" data-id="'+v.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">\u2715</button>':'')+'</div></div>';

    if($('#jlFrei'))$('#jlFrei').onclick=async function(){

        await api('turniere?id=eq.'+id,{method:'PATCH',body:body});
        var frisch=(await api('turniere?select=freigabe_jl,freigabe_al,datum,von_zeit,ort,name&id=eq.'+id))[0];
        if(frisch&&frisch.freigabe_jl&&frisch.freigabe_al){
          /* Beide bestaetigt: Kalendereintrag fuer alle beteiligten Jugenden (einmalig) */

            await api('termine',{method:'POST',body:{typ:'turnier',titel:frisch.name,datum:frisch.datum,uhrzeit:frisch.von_zeit||null,ort:frisch.ort||null,jugend:null,jugenden:jz.length?jz:null,quelle_id:'turnier:'+id,trainer_name:'Turnierorganisation'}});

    };
    if($('#jlFreiWeg'))$('#jlFreiWeg').onclick=async function(){
      if(!confirm('Deine Freigabe zur\u00fccknehmen? Das Turnier verschwindet dann bei Eltern und Trainern, der Kalendereintrag wird entfernt.'))return;
      var meinFeld=(S.fRolle==='AL')?'freigabe_al':'freigabe_jl';

    $$('.vsWeg',h).forEach(function(b){b.onclick=async function(){try{await api('turnier_vorschlaege?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});jlTurnierDetail(id)}catch(e){toast('Fehler.')}}});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Turnier konnte nicht geladen werden.</div>'}
}
/* ================= JAHRES-AUSWERTUNG (Kader & Prognose) ================= */
var KADER_BEDARF={
  'G':{feld:3,  min:6,  gut:8 },
  'F':{feld:5,  min:8,  gut:10},
  'E':{feld:7,  min:10, gut:12},
  'D':{feld:10, min:13, gut:15},
  'C':{feld:11, min:15, gut:18},
  'B':{feld:11, min:15, gut:18},
  'A':{feld:11, min:15, gut:18}
};

/* Kleines SVG-Balkendiagramm mit zwei Reihen (Zug\u00e4nge/Abg\u00e4nge) */
function svgBalken(labels,reiheA,reiheB,nameA,nameB,farbeA,farbeB){
  var W=320,H=150,padL=26,padB=22,padT=10;
  var maxV=Math.max(1,Math.max.apply(null,reiheA.concat(reiheB)));
  var innerW=W-padL-8, innerH=H-padB-padT;
  var n=labels.length||1, grp=innerW/n, bw=Math.min(14,(grp-6)/2);
  var teile='';
  [0,0.5,1].forEach(function(f){
    var y=padT+innerH-innerH*f;
    teile+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-8)+'" y2="'+y+'" stroke="#D9E1DA" stroke-width="1"/>';
    teile+='<text x="'+(padL-4)+'" y="'+(y+3.5)+'" font-size="8" fill="#59645B" text-anchor="end">'+Math.round(maxV*f)+'</text>';
  });
  labels.forEach(function(lb,i){
    var x0=padL+i*grp+grp/2;
    var hA=innerH*(reiheA[i]/maxV), hB=innerH*(reiheB[i]/maxV);
    teile+='<rect x="'+(x0-bw-1)+'" y="'+(padT+innerH-hA)+'" width="'+bw+'" height="'+Math.max(0,hA)+'" fill="'+farbeA+'" rx="2"/>';
    teile+='<rect x="'+(x0+1)+'" y="'+(padT+innerH-hB)+'" width="'+bw+'" height="'+Math.max(0,hB)+'" fill="'+farbeB+'" rx="2"/>';
    if(reiheA[i])teile+='<text x="'+(x0-bw/2-1)+'" y="'+(padT+innerH-hA-2)+'" font-size="8" fill="#0E3B17" text-anchor="middle" font-weight="700">'+reiheA[i]+'</text>';
    if(reiheB[i])teile+='<text x="'+(x0+bw/2+1)+'" y="'+(padT+innerH-hB-2)+'" font-size="8" fill="#C0392B" text-anchor="middle" font-weight="700">'+reiheB[i]+'</text>';
    teile+='<text x="'+x0+'" y="'+(H-8)+'" font-size="8" fill="#59645B" text-anchor="middle">'+esc(lb)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+teile+'</svg>'+
  '<div style="display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--grau);margin-top:2px">'+
  '<span><span style="display:inline-block;width:9px;height:9px;background:'+farbeA+';border-radius:2px"></span> '+esc(nameA)+'</span>'+
  '<span><span style="display:inline-block;width:9px;height:9px;background:'+farbeB+';border-radius:2px"></span> '+esc(nameB)+'</span></div>';
}

/* Waagerechte Balken je Jugend mit Sollmarke */
function svgJugendBalken(daten){
  var zeilenH=24, W=320, padL=26, H=daten.length*zeilenH+10;
  var maxV=Math.max(1,Math.max.apply(null,daten.map(function(d){return Math.max(d.ist,d.gut)})));
  var innerW=W-padL-30;
  var teile='';
  daten.forEach(function(d,i){
    var y=i*zeilenH+6;
    var bw=innerW*(d.ist/maxV);
    var farbe=d.ist>=d.gut?'#3E9142':(d.ist>=d.min?'#D99A2B':'#C0392B');
    teile+='<text x="0" y="'+(y+11)+'" font-size="10" font-weight="700" fill="#0E3B17">'+esc(d.kz)+'</text>';
    teile+='<rect x="'+padL+'" y="'+y+'" width="'+innerW+'" height="14" fill="#EEF3EE" rx="3"/>';
    teile+='<rect x="'+padL+'" y="'+y+'" width="'+Math.max(0,bw)+'" height="14" fill="'+farbe+'" rx="3"/>';
    var mx=padL+innerW*(d.min/maxV);
    teile+='<line x1="'+mx+'" y1="'+(y-2)+'" x2="'+mx+'" y2="'+(y+16)+'" stroke="#0E3B17" stroke-width="1.4" stroke-dasharray="2,2"/>';
    teile+='<text x="'+(padL+innerW+4)+'" y="'+(y+11)+'" font-size="10" font-weight="700" fill="'+farbe+'">'+d.ist+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+teile+'</svg>'+
  '<div style="font-size:11px;color:var(--grau);margin-top:4px">Gestrichelt = Mindestkader f\u00fcr die Spielform \u00b7 gr\u00fcn = komfortabel, gelb = knapp, rot = zu wenig</div>';
}

async function jlAuswertung(){
  var h=$('#jlhalt');h.innerHTML='<div class="leer"><span class="spinner gruen"></span></div>';
  try{
    var kinder=await api('kinder?select=id,vorname,nachname,jahrgang,jugend,beitritt,austritt,aktiv&order=beitritt');
    var saisonJetzt=KONF.saison;
    var jahre=[];
    var start=saisonJetzt-4;
    kinder.forEach(function(k){
      if(k.beitritt){var y=parseInt(k.beitritt.slice(0,4),10);var sj=(k.beitritt.slice(5,7)>='08')?y:y-1;if(sj<start)start=sj}
    });
    if(start>saisonJetzt-1)start=saisonJetzt-1;
    for(var y=start;y<=saisonJetzt;y++)jahre.push(y);

    function inSaison(datum,y){ if(!datum)return false; return datum>=(y+'-08-01')&&datum<=saisonEnde(y); }
    var zug=[],abg=[],bestand=[];
    jahre.forEach(function(y){
      zug.push(kinder.filter(function(k){return inSaison(k.beitritt,y)}).length);
      abg.push(kinder.filter(function(k){return inSaison(k.austritt,y)}).length);
      var ende=saisonEnde(y);
      bestand.push(kinder.filter(function(k){return k.beitritt&&k.beitritt<=ende&&(!k.austritt||k.austritt>ende)}).length);
    });

    var aktive=kinder.filter(function(k){return k.aktiv!==false&&!k.austritt});
    var zugJetzt=zug[zug.length-1]||0, abgJetzt=abg[abg.length-1]||0;

    /* Kader je Jugend */
    var jugDaten=JUGENDEN.filter(function(j){return KADER_BEDARF[j.kz]}).map(function(j){
      var b=KADER_BEDARF[j.kz];
      return {kz:j.kz,name:j.name,ist:aktive.filter(function(k){return k.jugend===j.kz}).length,min:b.min,gut:b.gut,feld:b.feld,form:(TU_REGELN[j.kz]||{}).spielform||''};
    });

    /* Prognose n\u00e4chste Saison */
    var prog=JUGENDEN.filter(function(j){return KADER_BEDARF[j.kz]}).map(function(j){
      var b=KADER_BEDARF[j.kz];
      var anz=aktive.filter(function(k){return k.jahrgang&&jugendAusJahrgang(k.jahrgang,saisonJetzt+1)===j.kz}).length;
      return {kz:j.kz,name:j.name,ist:anz,min:b.min,gut:b.gut,form:(TU_REGELN[j.kz]||{}).spielform||''};
    });
    var rausAlt=aktive.filter(function(k){return k.jahrgang&&(saisonJetzt+1-k.jahrgang)>=19}).length;

    var html='<button class="btn geist st st1" id="bZur">'+IC.zurueck+' Zur\u00fcck</button>';
    html+='<div class="karte st st1" style="background:#0E3B17;color:#fff;border:none;margin-top:12px">'+
    '<div style="font-size:12.5px;color:rgba(255,255,255,.75)">Jugendabteilung \u00b7 Saison '+saisonName(saisonJetzt)+'</div>'+
    '<div class="stat-g" style="margin-top:10px">'+
    '<div class="stat" style="background:rgba(255,255,255,.1)"><b style="color:#C8E63C">'+aktive.length+'</b><span style="color:rgba(255,255,255,.7)">Aktive Spieler</span></div>'+
    '<div class="stat" style="background:rgba(255,255,255,.1)"><b style="color:#C8E63C">+'+zugJetzt+'</b><span style="color:rgba(255,255,255,.7)">Zug\u00e4nge</span></div>'+
    '<div class="stat" style="background:rgba(255,255,255,.1)"><b style="color:#ff9a9a">\u2212'+abgJetzt+'</b><span style="color:rgba(255,255,255,.7)">Abg\u00e4nge</span></div>'+
    '</div></div>';

    html+='<div class="sec st st2">Entwicklung \u00fcber die Saisons</div><div class="karte st st2">'+
    svgBalken(jahre.map(function(y){return String(y).slice(2)+'/'+String((y+1)%100).padStart(2,'0')}),zug,abg,'Zug\u00e4nge','Abg\u00e4nge','#3E9142','#C0392B')+
    '<div class="lz" style="border-top:1px solid var(--linie);margin-top:8px;padding-top:8px"><span style="font-size:13px">Bestand am Saisonende</span><b style="font-size:13px">'+bestand.map(function(b){return b}).join(' \u00b7 ')+'</b></div></div>';

    html+='<div class="sec st st3">Kader je Jugend \u00b7 heute</div><div class="karte st st3">'+svgJugendBalken(jugDaten)+'</div>';

    html+='<div class="sec st st3">Spielform &amp; Bedarf</div><div class="karte st st3" style="padding:0;overflow:hidden">'+
    '<div style="display:grid;grid-template-columns:0.5fr 1.1fr 0.5fr 0.6fr 0.5fr;font-size:10.5px;font-weight:800;text-transform:uppercase;color:#fff;background:var(--gd);padding:9px 12px"><span>Jug.</span><span>Spielform</span><span style="text-align:center">Feld</span><span style="text-align:center">Mind.</span><span style="text-align:right">Ist</span></div>'+
    jugDaten.map(function(d,i){
      var farbe=d.ist>=d.gut?'var(--rasen)':(d.ist>=d.min?'var(--amber)':'var(--rot)');
      return '<div style="display:grid;grid-template-columns:0.5fr 1.1fr 0.5fr 0.6fr 0.5fr;padding:9px 12px;font-size:12.5px;'+(i%2?'background:#f4f8f4;':'')+'align-items:center"><b>'+esc(d.kz)+'</b><span style="color:var(--grau)">'+esc(d.form)+'</span><span style="text-align:center">'+d.feld+'</span><span style="text-align:center">'+d.min+'</span><b style="text-align:right;color:'+farbe+'">'+d.ist+'</b></div>';
    }).join('')+'</div>';

    html+='<div class="sec st st4">Prognose Saison '+saisonName(saisonJetzt+1)+'</div>'+
    '<div class="hinweis st st4">So sieht es n\u00e4chste Saison aus, wenn alle dabei bleiben \u2013 gerechnet nach Jahrgang.</div>'+
    '<div class="karte st st4">'+svgJugendBalken(prog)+
    (rausAlt?'<div style="font-size:12px;color:var(--amber);margin-top:6px">'+rausAlt+' Spieler wachsen aus der A-Jugend heraus.</div>':'')+'</div>';

    var eng=prog.filter(function(d){return d.ist>0&&d.ist<d.min});
    if(eng.length){
      html+='<div class="karte st st4" style="border-left:4px solid var(--rot)"><b style="font-size:14px;color:var(--rot)">Achtung n\u00e4chste Saison</b>'+
      eng.map(function(d){return '<div style="font-size:13px;margin-top:5px">'+jBadge(d.kz)+' nur <b>'+d.ist+'</b> Spieler \u2013 f\u00fcr '+esc(d.form)+' werden mindestens <b>'+d.min+'</b> gebraucht (fehlen '+(d.min-d.ist)+').</div>'}).join('')+'</div>';
    }

    html+='<div class="sec st st5">Bericht verschicken</div><div class="karte st st5">'+
    '<div style="font-size:12.5px;color:var(--grau);margin-bottom:8px">Fasst alle Zahlen dieser Seite als Text zusammen \u2013 zum Weiterleiten an Vorstand oder Trainerteam.</div>'+
    '<label>An (E-Mail, optional)</label><input id="awMail" type="email" placeholder="name@verein.de">'+
    '<div class="zeile" style="margin-top:9px"><button class="btn" id="awMailBtn">Per E-Mail</button><button class="btn hell" id="awKopie">Text kopieren</button></div>'+
    '<textarea id="awText" rows="6" style="margin-top:10px;font-size:12px" readonly></textarea></div>';

    h.innerHTML=html;

    /* Berichtstext bauen */
    var t=[];
    t.push('Jugendabteilung Spvgg 1910 Warmbronn \u2013 Auswertung Saison '+saisonName(saisonJetzt));
    t.push('Stand: '+fmtDat(heute()));
    t.push('');
    t.push('AKTUELL');
    t.push('Aktive Spieler gesamt: '+aktive.length);
    t.push('Zug\u00e4nge diese Saison: '+zugJetzt+' \u00b7 Abg\u00e4nge: '+abgJetzt+' \u00b7 Netto: '+(zugJetzt-abgJetzt>=0?'+':'')+(zugJetzt-abgJetzt));
    t.push('');
    t.push('ENTWICKLUNG');
    jahre.forEach(function(y,i){ t.push('  '+saisonName(y)+': +'+zug[i]+' / \u2212'+abg[i]+'  (Bestand Saisonende: '+bestand[i]+')'); });
    t.push('');
    t.push('KADER JE JUGEND (Spielform \u00b7 Mindestkader \u00b7 Ist)');
    jugDaten.forEach(function(d){ t.push('  '+d.kz+' \u2013 '+d.name+': '+d.form+' \u00b7 mind. '+d.min+' \u00b7 aktuell '+d.ist+(d.ist<d.min?'  ACHTUNG zu wenig':'')); });
    t.push('');
    t.push('PROGNOSE '+saisonName(saisonJetzt+1)+' (nach Jahrgang, wenn alle bleiben)');
    prog.forEach(function(d){ t.push('  '+d.kz+': '+d.ist+' Spieler'+(d.ist>0&&d.ist<d.min?'  \u2013 fehlen '+(d.min-d.ist)+' f\u00fcr '+d.form:'')); });
    if(rausAlt)t.push('  '+rausAlt+' Spieler wachsen aus der A-Jugend heraus.');
    t.push('');
    t.push('Mindestkader sind Richtwerte f\u00fcr die jeweilige Spielform inkl. Auswechselspielern.');

    function karte(p){
      var spaet=p.faellig&&p.faellig<heute()&&p.status!=='erledigt';

      (p.prioritaet==='hoch'?'<span class="meta rot">hoch</span>':(p.prioritaet==='niedrig'?'<span class="meta">niedrig</span>':'<span class="meta sig">normal</span>'))+
      (p.faellig?'<span class="meta '+(spaet?'rot':'')+'">bis '+fmtDat(p.faellig)+'</span>':'')+(p.status==='erledigt'?'<span class="meta">erledigt</span>':'')+'</div>'+
      (!istAL?'<button class="pkWeg" data-id="'+p.id+'" style="background:none;border:none;color:var(--rot);font-size:12px;font-weight:700">L\u00f6schen</button>':'')+'</div>'+

      (p.details?'<p style="font-size:13px;color:var(--grau);margin-top:4px">'+esc(p.details)+'</p>':'')+
      (p.antwort?'<div class="hinweis" style="margin-top:8px">R\u00fcckmeldung: '+esc(p.antwort)+'</div>':'')+
      (istAL?'<textarea class="pkAnt" data-id="'+p.id+'" rows="2" placeholder="R\u00fcckmeldung an die Jugendleitung \u2026" style="margin-top:8px">'+esc(p.antwort||'')+'</textarea>':'')+
      '<div class="zeile" style="margin-top:9px">'+(istAL?'<button class="btn hell pkSave" data-id="'+p.id+'">R\u00fcckmeldung</button>':'')+
      '<button class="btn '+(p.status==='erledigt'?'geist':'sig')+' pkFertig" data-id="'+p.id+'" data-z="'+(p.status==='erledigt'?'offen':'erledigt')+'">'+(p.status==='erledigt'?'Wieder \u00f6ffnen':'Erledigt \u2713')+'</button></div></div>';
    }
    html+='<div class="sec">Offen \u00b7 '+offen.length+'</div>';
    if(!offen.length)html+='<div class="karte leer"><div class="disp">Nichts offen</div>'+(istAL?'Aktuell hat die Jugendleitung dir keine Punkte zugewiesen.':'Lege oben den ersten Punkt an.')+'</div>';

    }});

      var z=b.getAttribute('data-z');

    }});
    $$('.pkWeg').forEach(function(b){b.onclick=async function(){if(!confirm('Punkt l\u00f6schen?'))return;try{await api('al_punkte?id=eq.'+b.getAttribute('data-id'),{method:'DELETE'});alPunkte()}catch(e){toast('Fehler.')}}});
  }catch(e){console.error(e);h.innerHTML='<div class="karte leer">Punkte konnten nicht geladen werden.</div>'}
}

async function berichtErstellen(von,bis){
  if(!von||!bis||von>bis){toast('Bitte g\u00fcltigen Zeitraum w\u00e4hlen.');return}
  var box=$('#bErgebnis');box.innerHTML='<div class="karte"><span class="spinner gruen"></span> Werte aus \u2026</div>';
  try{
    var res=await Promise.all([
      api('termine?select=typ,datum,jugend,titel,ergebnis,heim,training_note&datum=gte.'+von+'&datum=lte.'+bis),
      api('anwesenheit?select=da,termine!inner(datum,typ)&termine.datum=gte.'+von+'&termine.datum=lte.'+bis),
      api('kinder?select=vorname,nachname,jugend,beitritt,austritt'),
      api('kind_historie?select=ereignis,jugend,created_at,kinder(vorname,nachname)&created_at=gte.'+von+'&created_at=lte.'+bis+'T23:59:59'),
      api('aufgaben?select=titel,jugend,status,erledigt_am&erledigt_am=gte.'+von+'&erledigt_am=lte.'+bis+'T23:59:59')
    ]);
    var termine=res[0],anw=res[1],kinder=res[2],hist=res[3],aufg=res[4];
    var proJugend={};
    JUGENDEN.forEach(function(j){proJugend[j.kz]={tr:0,sp:0,ev:0}});
    var spiele=[];
    termine.forEach(function(t){
      var g=t.jugend&&proJugend[t.jugend];
      if(t.typ==='training'){if(g)g.tr++}
      else if(t.typ==='spiel'){if(g)g.sp++;spiele.push(t)}
      else if(t.typ==='turnier'){if(g)g.sp++;spiele.push(t)}
      else if(t.typ==='event'){if(g)g.ev++}
    });
    var trAnw=anw.filter(function(a){return a.termine&&a.termine.typ==='training'});
    var daQuote=trAnw.length?Math.round(trAnw.filter(function(a){return a.da}).length/trAnw.length*100):null;
    var neue=kinder.filter(function(k){return k.beitritt&&k.beitritt>=von&&k.beitritt<=bis});
    var weg=kinder.filter(function(k){return k.austritt&&k.austritt>=von&&k.austritt<=bis});
    var noten=termine.filter(function(t){return t.typ==='training'&&t.training_note});
    var notenAvg=noten.length?(noten.reduce(function(a,t){return a+t.training_note},0)/noten.length):null;

    var L=[];
    L.push('BERICHT JUGENDABTEILUNG FUSSBALL');
    L.push('Spvgg 1910 Warmbronn \u00b7 Zeitraum '+fmtDat(von)+' bis '+fmtDat(bis));
    L.push('');
    L.push('\u00dcBERBLICK');
    L.push('\u2022 Termine gesamt: '+termine.length+' (davon '+termine.filter(function(t){return t.typ==='training'}).length+' Trainings, '+spiele.length+' Spiele/Turniere, '+termine.filter(function(t){return t.typ==='event'}).length+' Events)');
    if(daQuote!=null)L.push('\u2022 Durchschnittliche Trainingsbeteiligung: '+daQuote+'%');
    if(notenAvg!=null)L.push('\u2022 Durchschnittliche Trainingsbewertung: '+noteFmt(notenAvg)+' / 10');
    L.push('\u2022 Neue Spieler: '+neue.length+' \u00b7 Ausgeschieden: '+weg.length+' \u00b7 Erledigte Aufgaben: '+aufg.length);
    L.push('');
    L.push('NACH JUGEND');
    JUGENDEN.forEach(function(j){var g=proJugend[j.kz];if(g.tr||g.sp||g.ev)L.push('\u2022 '+j.name+': '+g.tr+' Trainings, '+g.sp+' Spiele/Turniere, '+g.ev+' Events')});
    if(spiele.length){
      L.push('');L.push('SPIELE & TURNIERE');
      spiele.sort(function(a,b){return a.datum<b.datum?-1:1}).forEach(function(t){
        L.push('\u2022 '+fmtDat(t.datum)+' \u00b7 '+(t.jugend?jInfo(t.jugend).name:'')+' \u2013 '+(t.titel||typName(t.typ))+(t.ergebnis?' ('+t.ergebnis+')':''));
      });
    }
    if(neue.length||weg.length){
      L.push('');L.push('KADER-VER\u00c4NDERUNGEN');
      neue.forEach(function(k){L.push('\u2022 Neu: '+k.vorname+' '+k.nachname+(k.jugend?' ('+jInfo(k.jugend).name+')':''))});
      weg.forEach(function(k){L.push('\u2022 Ausgeschieden: '+k.vorname+' '+k.nachname+(k.jugend?' ('+jInfo(k.jugend).name+')':''))});
    }

/* Saisonwechsel-Assistent: Trainer-Uebergaenge + Kinder automatisch nach Jahrgang */
async function saisonWechselAssistent(){
  var alt=KONF.saison, neu=alt+1;
  var m=document.createElement('div');m.className='modal-bg';
  m.innerHTML='<div class="modal"><div class="griff"></div><div class="leer"><span class="spinner gruen"></span></div></div>';
  document.body.appendChild(m);
  try{
    var res=await Promise.all([
      api('trainer?select=id,name,jugend&order=jugend'),
      api('kinder?select=id,vorname,nachname,jahrgang,jugend,aktiv,austritt')
    ]);
    var trainer=res[0];
    var kinder=res[1].filter(function(k){return !(k.aktiv===false||k.austritt)});
    /* Entscheidungen je Trainer: 'hoch' (naechsthoehere Jugend), 'bleibt', konkrete kz, oder 'stop' */
    var wahl={};trainer.forEach(function(t){wahl[t.id]='hoch'});
    function hoeherJugend(kz){var idx=jugendIndex(kz);return idx>0?JUGENDEN[idx-1].kz:kz;} /* JUGENDEN: A(0)..G(6), hoeher = kleinerer Index */
    function zielVon(t){var w=wahl[t.id];if(w==='hoch')return hoeherJugend(t.jugend);if(w==='bleibt')return t.jugend;if(w==='stop')return null;return w;}

    function render(){
      var kinderVorschau={};JUGENDEN.forEach(function(j){kinderVorschau[j.kz]=0});
      kinder.forEach(function(k){if(!k.jahrgang)return;var z=jugendAusJahrgang(k.jahrgang,neu);kinderVorschau[z]++});
      var html='<div class="disp" style="font-size:18px;color:var(--gd)">Neue Saison '+saisonName(neu)+'</div>'+
      '<p style="font-size:13px;color:var(--grau);margin-top:6px">Aktuell: '+saisonName(alt)+' \u2192 neu: '+saisonName(neu)+'. Die Kinder r\u00fccken automatisch nach Jahrgang eine Jugend hoch. Entscheide unten, was mit jedem Trainer passiert.</p>';

      html+='<div class="sec" style="margin-top:14px">Trainer-\u00dcberg\u00e4nge</div>';
      if(!trainer.length)html+='<div class="karte" style="color:var(--grau);font-size:13px">Keine Trainer angelegt.</div>';
      trainer.forEach(function(t){
        var w=wahl[t.id];
        var hoch=hoeherJugend(t.jugend);
        html+='<div class="karte" style="padding:12px 16px"><b style="font-size:14px">'+esc(t.name)+'</b> <span class="meta">'+esc(jInfo(t.jugend).name)+'</span>'+
        '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">'+
        '<button class="btn '+(w==='hoch'?'sig':'geist')+' twSet" data-id="'+t.id+'" data-w="hoch" style="padding:7px 11px;font-size:12px">Geht hoch \u2192 '+esc(jInfo(hoch).name)+'</button>'+
        '<button class="btn '+(w==='bleibt'?'sig':'geist')+' twSet" data-id="'+t.id+'" data-w="bleibt" style="padding:7px 11px;font-size:12px">Bleibt '+esc(jInfo(t.jugend).name)+'</button>'+
        '<button class="btn '+(w==='stop'?'sig':'geist')+' twSet" data-id="'+t.id+'" data-w="stop" style="padding:7px 11px;font-size:12px">H\u00f6rt auf</button>'+
        '</div>'+
        '<div style="margin-top:6px"><label style="font-size:11px">oder wechselt zu</label><select class="twJug" data-id="'+t.id+'"><option value="">\u2013</option>'+JUGENDEN.map(function(j){return '<option value="'+j.kz+'"'+(w===j.kz?' selected':'')+'>'+esc(j.name)+'</option>'}).join('')+'</select></div></div>';
      });

      html+='<div class="sec">Kinder nach dem Wechsel</div><div class="karte"><div style="font-size:12.5px;color:var(--grau);margin-bottom:6px">Automatisch nach Jahrgang \u2013 danach im Team-Bereich einzeln anpassbar.</div>'+
      JUGENDEN.map(function(j){return '<div class="lz"><span>'+esc(j.name)+'</span><b>'+kinderVorschau[j.kz]+'</b></div>'}).join('')+'</div>';

      html+='<button class="btn voll" id="swOk" style="margin-top:14px">Saison '+saisonName(neu)+' jetzt starten</button>'+
      '<button class="btn geist voll" id="swAbbr" style="margin-top:8px">Abbrechen</button>';
      m.querySelector('.modal').innerHTML='<div class="griff"></div>'+html;

      $$('.twSet',m).forEach(function(b){b.onclick=function(){wahl[b.getAttribute('data-id')]=b.getAttribute('data-w');render()}});
      $$('.twJug',m).forEach(function(sel){sel.onchange=function(){if(this.value)wahl[this.getAttribute('data-id')]=this.value;render()}});
      $('#swAbbr',m).onclick=function(){m.remove()};
      $('#swOk',m).onclick=async function(){
        this.disabled=true;this.innerHTML='<span class="spinner"></span> Wird umgestellt \u2026';
        try{
          /* 1) Trainer verschieben/entfernen */
          for(var i=0;i<trainer.length;i++){
            var t=trainer[i];var z=zielVon(t);
            if(z===null){await api('trainer?id=eq.'+t.id,{method:'DELETE'});}
            else if(z!==t.jugend){await api('trainer?id=eq.'+t.id,{method:'PATCH',body:{jugend:z}});}
          }
          /* 2) Kinder automatisch nach Jahrgang; Historie-Eintrag bei Jugendwechsel */
          for(var j=0;j<kinder.length;j++){
            var k=kinder[j];if(!k.jahrgang)continue;
            var ziel=jugendAusJahrgang(k.jahrgang,neu);
            if(ziel!==k.jugend){
              await api('kinder?id=eq.'+k.id,{method:'PATCH',body:{jugend:ziel,rolle:null}});
              await api('kind_historie',{method:'POST',body:{kind_id:k.id,saison:neu,jugend:ziel,ereignis:'Aufgestiegen in '+jInfo(ziel).name}});
            }
          }
          /* 3) Saison hochzaehlen */
          KONF.saison=neu;await konfSpeichern('saison',{startjahr:neu});
          m.remove();toast('Saison '+saisonName(neu)+' gestartet. \u26bd');jlVerwaltung();
        }catch(e){console.error(e);toast('Fehler beim Umstellen.');this.disabled=false;this.textContent='Saison jetzt starten'}
      };
    }
    render();
  }catch(e){console.error(e);m.remove();toast('Konnte nicht laden.')}
}
